}

// =====================================================
// INLINE EDIT helpers
// =====================================================

function makeEditable(el, bookId, field) {
  if (el.contentEditable === 'true') return;
  el.contentEditable = 'true';
  el.focus();
  // selecteer alles
  setTimeout(() => {
    const range = document.createRange();
    range.selectNodeContents(el);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  }, 50);

  const finish = () => {
    el.contentEditable = 'false';
    el.removeEventListener('blur', finish);
    el.removeEventListener('keydown', onKey);
    updateField(bookId, field, el.textContent.trim());
  };
  const onKey = (e) => {
    if (e.key === 'Enter' || e.key === 'Escape') { e.preventDefault(); el.blur(); }
  };
  el.addEventListener('blur', finish);
  el.addEventListener('keydown', onKey);
}

function updateField(id, field, value) {
  const idx = state.books.findIndex(b => b.id === id);
  if (idx < 0) return;
  state.books[idx][field] = value;
  state.books[idx].updatedAt = new Date().toISOString();
  save();
  // Geen full re-render voor inline updates
}

function setFase(id, fase) {
  const idx = state.books.findIndex(b => b.id === id);
  if (idx < 0) return;
  const b = state.books[idx];
  const wasActive = b.fase;
  b.fase = fase;
  b.updatedAt = new Date().toISOString();
  if (fase === 'lezen' && !b.startedAt) b.startedAt = b.updatedAt;
  if (fase === 'gelezen' && !b.finishedAt) b.finishedAt = b.updatedAt;
  if (fase === 'uitgeleend' && !b.loanedAt) b.loanedAt = b.updatedAt;
  if (fase !== 'uitgeleend' && wasActive === 'uitgeleend') {
    b.loanedTo = '';
    b.loanedAt = null;
  }
  save();
  renderBookPage(b);
  showToast(FASES[fase].label);
}

function setSpaceForBook(id, space) {
  const idx = state.books.findIndex(b => b.id === id);
  if (idx < 0) return;
  state.books[idx].space = space;
  if (!SPACES[space] || !SPACES[space].hasSubs) delete state.books[idx].subcat;
  state.books[idx].updatedAt = new Date().toISOString();
  save();
  renderSpaces();
  renderBookPage(state.books[idx]);
  showToast('Verplaatst naar ' + (SPACES[space] ? SPACES[space].label : space));
}

function setSubcatForBook(id, subcat) {
  const idx = state.books.findIndex(b => b.id === id);
  if (idx < 0) return;
  state.books[idx].subcat = subcat || null;
  state.books[idx].updatedAt = new Date().toISOString();
  save();
  showToast(subcat ? 'Subcategorie: ' + subcat : 'Subcategorie verwijderd');
}

function toggleHerleeswaardig(id) {
  const idx = state.books.findIndex(b => b.id === id);
  if (idx < 0) return;
  state.books[idx].herleeswaardig = !state.books[idx].herleeswaardig;
  state.books[idx].updatedAt = new Date().toISOString();
  save();
  renderBookPage(state.books[idx]);
  showToast(state.books[idx].herleeswaardig ? 'Gemarkeerd als herleeswaardig' : 'Herleeswaardig verwijderd');
}

function setEffort(id, n) {
  const idx = state.books.findIndex(b => b.id === id);
  if (idx < 0) return;
  state.books[idx].effort = state.books[idx].effort === n ? null : n;
  state.books[idx].updatedAt = new Date().toISOString();
  save();
  renderBookPage(state.books[idx]);
}

function updatePage(id, val) {
  const idx = state.books.findIndex(b => b.id === id);
  if (idx < 0) return;
  const page = parseInt(val);
  if (isNaN(page)) { state.books[idx].currentPage = null; }
  else { state.books[idx].currentPage = page; }
  state.books[idx].updatedAt = new Date().toISOString();

  // Auto-completion
  if (state.books[idx].totalPages && page >= state.books[idx].totalPages) {
    if (confirm('Laatste pagina bereikt — markeren als uitgelezen?')) {
      state.books[idx].fase = 'gelezen';
      state.books[idx].finishedAt = new Date().toISOString();
    }
  }
  save();
  renderBookPage(state.books[idx]);
}

function updateTotal(id, val) {
  const idx = state.books.findIndex(b => b.id === id);
  if (idx < 0) return;
  const total = parseInt(val);
  state.books[idx].totalPages = isNaN(total) ? null : total;
  state.books[idx].updatedAt = new Date().toISOString();
  save();
  renderBookPage(state.books[idx]);
}

function addPassage(id) {
  const idx = state.books.findIndex(b => b.id === id);
  if (idx < 0) return;
  if (!state.books[idx].passages) state.books[idx].passages = [];
  state.books[idx].passages.push({ page: '', note: '', addedAt: new Date().toISOString() });
  state.books[idx].updatedAt = new Date().toISOString();
  save();
  renderBookPage(state.books[idx]);
  // Focus de nieuwe passage
  setTimeout(() => {
    const passages = document.querySelectorAll('.passage');
    if (passages.length > 0) {
      const last = passages[passages.length - 1];
      const input = last.querySelector('.passage-page');
      if (input) input.focus();
    }
  }, 100);
}

function updatePassage(id, idx, field, val) {
  const bIdx = state.books.findIndex(b => b.id === id);
  if (bIdx < 0) return;
  if (!state.books[bIdx].passages[idx]) return;
  state.books[bIdx].passages[idx][field] = field === 'page' ? (val ? parseInt(val) : null) : val;
  if (!state.books[bIdx].passages[idx].addedAt) state.books[bIdx].passages[idx].addedAt = new Date().toISOString();
  state.books[bIdx].updatedAt = new Date().toISOString();
  save();
}

function removePassage(id, idx) {
  const bIdx = state.books.findIndex(b => b.id === id);
  if (bIdx < 0) return;
  state.books[bIdx].passages.splice(idx, 1);
  state.books[bIdx].updatedAt = new Date().toISOString();
  save();
  renderBookPage(state.books[bIdx]);
}

function promptPage(id) {
  const b = state.books.find(x => x.id === id);
  if (!b) return;
  const page = prompt(`Op welke pagina ben je nu?${b.totalPages ? ' (van ' + b.totalPages + ')' : ''}`, b.currentPage || '');
  if (page === null) return;
  updatePage(id, page);
  showToast(`pagina ${page}`);
}

function promptPassage(id) {
  const b = state.books.find(x => x.id === id);
  if (!b) return;
  const page = prompt('Welke pagina?', b.currentPage || '');
  if (page === null) return;
  const note = prompt('Wat is opmerkelijk aan deze pagina?');
  if (note === null) return;
  if (!b.passages) b.passages = [];
  b.passages.push({ page: page ? parseInt(page) : null, note, addedAt: new Date().toISOString() });
  b.updatedAt = new Date().toISOString();
  save();
  showToast('Markering toegevoegd');
  // re-render leeskamer to show new passage
  renderMain();
}

function addConnection(bookId) {
  const b = state.books.find(x => x.id === bookId);
  if (!b) return;
  const others = state.books.filter(x => x.id !== bookId);
  if (others.length === 0) {
    showToast('geen andere boeken om mee te verbinden');
    return;
  }
  const list = others.map((o, i) => `${i + 1}. ${o.title}${o.author ? ' — ' + o.author : ''}`).join('\n');
  const choice = prompt(`Verbind dit boek met (typ nummer):\n\n${list.slice(0, 1500)}`);
  if (!choice) return;
  const n = parseInt(choice);
  if (isNaN(n) || n < 1 || n > others.length) return;
  const targetId = others[n-1].id;
  if (!b.connections) b.connections = [];
  if (b.connections.includes(targetId)) {
    showToast('reeds verbonden');
    return;
  }
  b.connections.push(targetId);
  // bilateraal
  const other = state.books.find(x => x.id === targetId);
  if (other) {
    if (!other.connections) other.connections = [];
    if (!other.connections.includes(bookId)) other.connections.push(bookId);
  }
  b.updatedAt = new Date().toISOString();
  save();
  renderBookPage(b);
  showToast('verbonden');
}

function removeConnection(bookId, otherId) {
  const b = state.books.find(x => x.id === bookId);
  if (!b || !b.connections) return;
  b.connections = b.connections.filter(c => c !== otherId);
  // bilateraal verwijderen
  const other = state.books.find(x => x.id === otherId);
  if (other && other.connections) {
    other.connections = other.connections.filter(c => c !== bookId);
  }
  b.updatedAt = new Date().toISOString();
  save();
  renderBookPage(b);
}

function deleteBookConfirm(id) {
  const b = state.books.find(x => x.id === id);
  if (!b) return;
  if (!confirm(`"${b.title}" definitief verwijderen?`)) return;
  // verwijder ook uit connections van anderen
  state.books.forEach(other => {
    if (other.connections) other.connections = other.connections.filter(c => c !== id);
  });
  state.books = state.books.filter(x => x.id !== id);
  save();
  closeBookPage();
  renderSpaces();
  renderMain();
  showToast('verwijderd');
}

function isValidISBN(code) {
  if (!code) return false;
  const clean = String(code).replace(/[^0-9X]/gi, '');
  if (clean.length === 13 && (clean.startsWith('978') || clean.startsWith('979'))) return true;
  if (clean.length === 10) return true;
  return false;
}

let lookupDebounce = null;
let lookupAbort = null;
let lookupCurrentResults = [];

function onLookupInput(value) {
  const trimmed = value.trim();
  const status = document.getElementById('lookup-status');
  const results = document.getElementById('lookup-results');
  const spinner = document.getElementById('lookup-spinner');

  // Annuleer eerdere
  if (lookupDebounce) clearTimeout(lookupDebounce);
  if (lookupAbort) { try { lookupAbort.abort(); } catch(e){} }

  if (trimmed.length === 0) {
    status.textContent = 'Begin met typen — ik zoek voor je';
    status.className = 'lookup-status';
    results.classList.remove('show');
    results.innerHTML = '';
    spinner.classList.remove('active');
    return;
  }

  if (trimmed.length < 3 && !/^\d/.test(trimmed)) {
    status.textContent = 'typ wat meer…';
    status.className = 'lookup-status';
    results.classList.remove('show');
    results.innerHTML = '';
    spinner.classList.remove('active');
    return;
  }

  spinner.classList.add('active');
  status.textContent = 'zoeken…';
  status.className = 'lookup-status';

  // Debounce 400ms
  lookupDebounce = setTimeout(() => {
    runLookup(trimmed);
  }, 400);
}

function onLookupKey(event) {
  if (event.key === 'Enter') {
    event.preventDefault();
    // Als er resultaten zijn, kies eerste
    if (lookupCurrentResults.length > 0) {
      chooseLookupResult(0);
    }
  } else if (event.key === 'ArrowDown') {
    event.preventDefault();
    const first = document.querySelector('.lookup-result');
    if (first) first.focus();
  }
}

async function runLookup(query) {
  const status = document.getElementById('lookup-status');
  const results = document.getElementById('lookup-results');
  const spinner = document.getElementById('lookup-spinner');

  lookupAbort = new AbortController();
  const cleanDigits = query.replace(/[^0-9X]/gi, '');
  const isISBN = (cleanDigits.length === 10 || cleanDigits.length === 13) && cleanDigits.length === query.replace(/[\s-]/g, '').length;

  try {
    let items = [];
    if (isISBN) {
      items = await lookupByISBN(cleanDigits, lookupAbort.signal);
    } else {
      items = await lookupByText(query, lookupAbort.signal);
    }

    spinner.classList.remove('active');
    lookupCurrentResults = items;

    if (items.length === 0) {
      status.textContent = isISBN
        ? `geen treffer voor ISBN ${cleanDigits} — vul handmatig in`
        : 'geen treffers — vul handmatig in';
      status.className = 'lookup-status error';
      results.classList.remove('show');
      results.innerHTML = '';
      return;
    }

    status.textContent = items.length === 1
      ? '1 boek gevonden — klik om in te vullen'
      : `${items.length} mogelijke boeken — klik om te kiezen`;
    status.className = 'lookup-status success';

    results.innerHTML = items.map((item, idx) => {
      const coverHtml = item.coverUrl
        ? `<img src="${esc(item.coverUrl)}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'lookup-result-cover-placeholder\\'>'+${JSON.stringify(item.title.charAt(0).toUpperCase())}+'</div>'">`
        : `<div class="lookup-result-cover-placeholder">${esc(item.title.slice(0, 12))}</div>`;
      const metaParts = [];
      if (item.author) metaParts.push(esc(item.author));
      if (item.year) metaParts.push(esc(item.year));
      if (item.totalPages) metaParts.push(`${item.totalPages} p.`);
      return `
        <button type="button" class="lookup-result" onclick="chooseLookupResult(${idx})" tabindex="0">
          <div class="lookup-result-cover">${coverHtml}</div>
          <div class="lookup-result-body">
            <div class="lookup-result-title">${esc(item.title)}</div>
            <div class="lookup-result-meta">${metaParts.join(' · ') || 'geen extra gegevens'}</div>
          </div>
        </button>
      `;
    }).join('');
    results.classList.add('show');
  } catch (e) {
    spinner.classList.remove('active');
    if (e.name === 'AbortError') return; // user typed more
    console.warn('[lookup]', e);
    status.textContent = 'kon niet zoeken (geen internet?) — vul handmatig in';
    status.className = 'lookup-status error';
    results.classList.remove('show');
    results.innerHTML = '';
  }
}

async function lookupByISBN(isbn, signal) {
  const items = [];

  // 1. Google Books
  try {
    const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${isbn}`, { signal });
    if (res.ok) {
      const data = await res.json();
      if (data.items && data.items.length > 0) {
        for (const v of data.items.slice(0, 3)) {
          const info = v.volumeInfo || {};
          items.push(parseGoogleBook(info, isbn));
        }
        if (items.length > 0) return items;
      }
    }
  } catch (e) { if (e.name === 'AbortError') throw e; console.warn('[lookup] GB ISBN err', e); }

  // 2. Open Library
  try {
    const res = await fetch(`https://openlibrary.org/api/books?bibkeys=ISBN:${isbn}&format=json&jscmd=data`, { signal });
    if (res.ok) {
      const data = await res.json();
      const b = data[`ISBN:${isbn}`];
      if (b) {
        items.push(parseOpenLibBook(b, isbn));
      }
    }
  } catch (e) { if (e.name === 'AbortError') throw e; console.warn('[lookup] OL ISBN err', e); }

  return items;
}

async function lookupByText(query, signal) {
  const items = [];

  // Google Books eerst — beste voor Nederlandse boeken
  try {
    const q = encodeURIComponent(query);
    const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${q}&maxResults=5&langRestrict=nl,en`, { signal });
    if (res.ok) {
      const data = await res.json();
      if (data.items && data.items.length > 0) {
        for (const v of data.items) {
          const info = v.volumeInfo || {};
          // Vind ISBN
          let isbn = '';
          if (info.industryIdentifiers) {
            const i13 = info.industryIdentifiers.find(x => x.type === 'ISBN_13');
            const i10 = info.industryIdentifiers.find(x => x.type === 'ISBN_10');
            isbn = (i13 && i13.identifier) || (i10 && i10.identifier) || '';
          }
          items.push(parseGoogleBook(info, isbn));
        }
        return items;
      }
    }
  } catch (e) { if (e.name === 'AbortError') throw e; console.warn('[lookup] GB text err', e); }

  // Open Library fallback (search.json)
  try {
    const q = encodeURIComponent(query);
    const res = await fetch(`https://openlibrary.org/search.json?q=${q}&limit=5`, { signal });
    if (res.ok) {
      const data = await res.json();
      if (data.docs && data.docs.length > 0) {
        for (const d of data.docs) {
          items.push({
            title: d.title || '',
            author: (d.author_name && d.author_name.join(', ')) || '',
            year: d.first_publish_year || null,
            totalPages: d.number_of_pages_median || null,
            isbn: (d.isbn && d.isbn[0]) || '',
            coverUrl: d.cover_i ? `https://covers.openlibrary.org/b/id/${d.cover_i}-M.jpg` : null
          });
        }
        return items;
      }
    }
  } catch (e) { if (e.name === 'AbortError') throw e; console.warn('[lookup] OL text err', e); }

  return items;
}

function parseGoogleBook(info, isbn) {
  let year = null;
  if (info.publishedDate) {
    const m = String(info.publishedDate).match(/\b(\d{4})\b/);
    if (m) year = parseInt(m[1]);
  }
  const cover = (info.imageLinks && (info.imageLinks.thumbnail || info.imageLinks.smallThumbnail)) || (isbn ? coverUrl(isbn, 'M') : null);
  return {
    title: info.title || '',
    author: (info.authors && info.authors.join(', ')) || '',
    year,
    totalPages: info.pageCount || null,
    isbn: isbn || '',
    coverUrl: cover ? cover.replace('http://', 'https://') : null
  };
}

function parseOpenLibBook(b, isbn) {
  let year = null;
  if (b.publish_date) {
    const m = String(b.publish_date).match(/\b(\d{4})\b/);
    if (m) year = parseInt(m[1]);
  }
  return {
    title: b.title || '',
    author: (b.authors && b.authors.map(a => a.name).join(', ')) || '',
    year,
    totalPages: b.number_of_pages || null,
    isbn: isbn || '',
    coverUrl: (b.cover && (b.cover.medium || b.cover.large)) || coverUrl(isbn, 'M')
  };
}

function chooseLookupResult(idx) {
  const item = lookupCurrentResults[idx];
  if (!item) return;

  const body = document.getElementById('add-modal-body');
  // Vul velden in (overschrijf alleen lege velden, behalve title/author die we wel updaten)
  const setField = (name, val, force) => {
    const el = body.querySelector(`[name="${name}"]`);
    if (el && val != null && val !== '' && (force || !el.value.trim())) {
      el.value = val;
    }
  };
  setField('title', item.title, true);
  setField('author', item.author, true);
  setField('year', item.year, true);
  setField('totalPages', item.totalPages, true);
  setField('isbn', item.isbn, true);

  // Verberg resultaten, toon bevestiging
  const status = document.getElementById('lookup-status');
  const results = document.getElementById('lookup-results');
  results.classList.remove('show');
  status.textContent = `✓ ${item.title}${item.author ? ' — ' + item.author : ''}`;
  status.className = 'lookup-status success';

  // Scroll naar titel om eventueel te corrigeren
  const titleField = body.querySelector('[name="title"]');
  if (titleField && typeof titleField.scrollIntoView === 'function') {
    titleField.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

      })

      const err = await resp.json().catch(() => ({}));

async function recogniseBookPhoto(event) {
  const file = event.target.files && event.target.files[0];
  if (!file) return;
  event.target.value = '';

  if (!hasApiKey()) {
    showToast('API-key nodig — open Instellingen');
    return;
  }

  const statusEl = document.getElementById('lookup-photo-status');
  const labelEl = document.querySelector('.lookup-photo-btn span');
  if (statusEl) { statusEl.textContent = 'Foto wordt geladen…'; statusEl.className = 'lookup-status'; }

  // Resize afbeelding naar max 1200px voor snelheid
  let base64, mediaType;
  try {
    const result = await resizeImageToBase64(file, 1200);
    base64 = result.base64;
    mediaType = result.mediaType;
  } catch(e) {
    if (statusEl) { statusEl.textContent = 'Foto kon niet worden geladen'; statusEl.className = 'lookup-status error'; }
    return;
  }

  if (statusEl) { statusEl.textContent = 'Claude bekijkt de omslag…'; statusEl.className = 'lookup-status'; }
  if (labelEl) labelEl.textContent = 'Bezig…';

  try {
    const prompt = [
      'Bekijk deze boekomslag en geef ALLEEN JSON terug, geen uitleg, geen markdown backticks.',
      'Formaat: {"title":"volledige boektitel","author":"auteur(s)","year":2024,"pages":null,"isbn":""}',
      'Gebruik null als je een waarde niet kunt lezen. ISBN alleen als duidelijk zichtbaar. Jaar als geheel getal of null.'
    ].join(' ');

    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': settings.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: settings.model || 'claude-sonnet-4-6',
        max_tokens: 300,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
            { type: 'text', text: prompt }
          ]
        }]
      })
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error && err.error.message ? err.error.message : 'HTTP ' + resp.status);
    }

    const data = await resp.json();
    const text = (data.content && data.content[0] && data.content[0].text) || '';

    // Extraheer JSON — zelfs als er iets omheen staat
    const jsonMatch = text.match(/\{[\s\S]*?\}/);
    if (!jsonMatch) throw new Error('Onverwacht antwoord van Claude');

    const book = JSON.parse(jsonMatch[0]);

    // Vul velden in de modal
    const body = document.getElementById('add-modal-body');
    const setField = (name, val) => {
      const el = body && body.querySelector('[name="' + name + '"]');
      if (el && val != null && val !== '') el.value = val;
    };
    setField('title', book.title);
    setField('author', book.author);
    setField('year', book.year);
    setField('totalPages', book.pages);
    setField('isbn', book.isbn);

    if (statusEl) {
      statusEl.textContent = '✓ ' + (book.title || 'boek') + (book.author ? ' — ' + book.author : '');
      statusEl.className = 'lookup-status success';
    }
    showToast('Boek herkend');

  } catch(e) {
    console.error('[foto-herkenning]', e);
    if (statusEl) {
      statusEl.textContent = 'Niet herkend: ' + (e.message || 'onbekende fout') + ' — vul handmatig in';
      statusEl.className = 'lookup-status error';
    }
  }

  if (labelEl) labelEl.textContent = 'Maak of kies een foto';
}

function resizeImageToBase64(file, maxPx) {
  return new Promise((resolve, reject) => {
    const mediaType = file.type || 'image/jpeg';
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      let w = img.naturalWidth, h = img.naturalHeight;
      if (w > maxPx || h > maxPx) {
        const scale = maxPx / Math.max(w, h);
        w = Math.round(w * scale);
        h = Math.round(h * scale);
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.88);
      resolve({ base64: dataUrl.split(',')[1], mediaType: 'image/jpeg' });
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('afbeelding niet leesbaar')); };
    img.src = url;
  });
}

      <h3 style="font-family: var(--display); font-size: 20px; font-weight: 400; margin-bottom: 12px; font-variation-settings: 'opsz' 36;">Backup</h3>
      <p style="font-family: var(--display); font-style: italic; font-size: 14px; color: var(--ink-fade); margin-bottom: 14px; font-variation-settings: 'opsz' 14;">

function saveApiSettings() {
  const key = document.getElementById('set_apiKey').value.trim();
  const model = document.getElementById('set_model').value;
  settings.apiKey = key;
  settings.model = model;
  saveSettings();
  closeSettings();
  showToast(key ? 'API-key opgeslagen — Claude is nu beschikbaar' : 'API-key verwijderd');
}

function closeSettings() {
  document.getElementById('settings-modal').classList.remove('active');
}

function exportBackup() {
  const payload = {
    schema: SCHEMA,
    exportedAt: new Date().toISOString(),
    bookCount: state.books.length,
    books: state.books
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `leeskamer-${new Date().toISOString().split('T')[0]}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  state.saveCount = 0;
  showToast('backup gedownload');
}

function importBackup(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const parsed = JSON.parse(e.target.result);
      const imported = Array.isArray(parsed) ? parsed : (parsed.books || []);
      if (imported.length === 0) {
        showToast('geen boeken in dit bestand');
        return;
      }
      if (!confirm(`${imported.length} boeken importeren? Dit voegt toe aan wat je al hebt.`)) return;
      let added = 0;
      imported.forEach(b => {
        if (!b.id) b.id = uid();
        if (!state.books.find(x => x.id === b.id)) {
          state.books.push({ ...b, space: b.space || 'persoonlijk', fase: b.fase || b.status || 'bezit' });
          added++;
        }
      });
      save();
      renderSpaces();
      renderMain();
      closeSettings();
      showToast(`${added} ${added === 1 ? 'boek' : 'boeken'} geïmporteerd`);
    } catch (err) {
      showToast('importeren mislukt');
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

document.getElementById('add-modal').addEventListener('click', (e) => {

});

document.addEventListener('keydown', (e) => {
  if (e.target.matches('input, textarea, [contenteditable]')) return;
  if (e.key === 'Escape') {
    if (document.getElementById('book-page').classList.contains('active')) closeBookPage();
    else closeAddModal();
    closeSettings();
  }
  if (e.key === 'n') openAddModal();
  if (e.key === '/') {
    e.preventDefault();
    if (state.currentSection !== 'catalogus') setSection('catalogus');
    setTimeout(() => {
      const s = document.querySelector('.search-field input');
      if (s) s.focus();
    }, 100);
  }
});

// CLAUDE AI — directe gesprekken vanuit boekpagina

const CLAUDE_PROMPTS = {
  reflectie: (b) => {
    const essencePart = b.essence ? '\nWat blijft hangen: "' + b.essence + '"' : '';
    const pp = (b.passages || []).filter(p => p.note);
    const passagePart = pp.length > 0
      ? '\nGemarkeerde passages:\n' + pp.slice(0,4).map(p => '- p.' + (p.page||'?') + ': "' + p.note + '"').join('\n')
      : '';
    return 'Je spreekt met de eigenaar van dit boek. Stel drie scherpe reflectievragen die verder gaan dan de oppervlakte.\n\n'
      + 'Boek: "' + b.title + '"\n'
      + 'Auteur: ' + (b.author || 'onbekend')
      + essencePart + passagePart + '\n\n'
      + 'Stel drie vragen die de lezer uitdagen om dieper na te denken. Geen open deuren. Geen algemeenheden. Wees concreet en scherp. Schrijf in het Nederlands.';
  },

  verwant: (b) => {
    const essencePart = b.essence ? '\nKern: "' + b.essence + '"' : '';
    return 'Geef vijf boeken die goed aansluiten bij dit boek, met voor elk één zin waarom.\n\n'
      + 'Boek: "' + b.title + '"\n'
      + 'Auteur: ' + (b.author || 'onbekend')
      + essencePart + '\n\n'
      + 'Geen voor de hand liggende bestsellers. Denk aan minder bekende maar waardevolle titels. Mix genres als dat past. Schrijf in het Nederlands.';
  },

  samenvatting: (b) => {
    const essencePart = b.essence ? '\nDe lezer noteerde: "' + b.essence + '"' : '';
    return 'Schrijf de kern van dit boek in één compacte alinea van maximaal 80 woorden. Geen opsomming, geen bullet points, gewoon proza. Wat is de centrale gedachte?\n\n'
      + 'Boek: "' + b.title + '"\n'
      + 'Auteur: ' + (b.author || 'onbekend')
      + essencePart + '\n\n'
      + 'Schrijf in het Nederlands. Schrijf alsof je het uitlegt aan een intelligente vriend die het boek niet kent.';
  },

  passages: (b) => {
    const pp = (b.passages || []).filter(p => p.note);
    if (pp.length === 0) return 'Er zijn nog geen passages gemarkeerd voor "' + b.title + '". Geef algemeen advies over wat de moeite waard is om te markeren bij dit soort boek. Schrijf in het Nederlands.';
    return 'Bespreek deze passages uit "' + b.title + '" door ' + (b.author || 'onbekend') + '.\n\n'
      + pp.slice(0,6).map(p => 'Pagina ' + (p.page || '?') + ': "' + p.note + '"').join('\n\n')
      + '\n\nWat valt op? Zijn er verbindingen tussen de passages? Wat zeggen de keuzes over de lezer? Schrijf in het Nederlands, maximaal 200 woorden.';
  }
};

async function askClaude(type, bookId) {
  const b = state.books.find(x => x.id === bookId);
  if (!b) return;
  if (!hasApiKey()) {
    showToast('API-key nodig — open Instellingen');
    return;
  }

  const responseEl = document.getElementById(`claude-response-${bookId}`);
  if (!responseEl) return;

  responseEl.style.display = 'block';
  responseEl.innerHTML = `
    <div class="claude-loading">
      <div class="claude-loading-dot"></div>
      <div class="claude-loading-dot"></div>
      <div class="claude-loading-dot"></div>
      <span style="margin-left: 4px;">Claude denkt na…</span>
    </div>
  `;

  const promptFn = CLAUDE_PROMPTS[type];
  if (!promptFn) return;
  const prompt = typeof promptFn === 'function' ? promptFn(b) : promptFn;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': settings.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: settings.model || 'claude-sonnet-4-6',
        max_tokens: 600,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${resp.status}`);
    }

    const data = await resp.json();
    const text = (data.content && data.content[0] && data.content[0].text) || '';

    const labels = {
      reflectie: 'REFLECTIEVRAGEN',
      verwant: 'VERWANTE BOEKEN',
      samenvatting: 'KERN IN ÉÉN ALINEA',
      passages: 'OVER JE PASSAGES'
    };

    // Format tekst: regelafbrekingen behouden, nummers als losse regels
    const formatted = text
      .replace(/\*\*(.*?)\*\*/g, '$1')
      .trim();

    responseEl.innerHTML = `
      <button class="claude-response-close" onclick="document.getElementById('claude-response-${escJs(bookId)}').style.display='none'">×</button>
      <div class="claude-response-header">CLAUDE · ${labels[type] || type.toUpperCase()}</div>
      <div class="claude-response-text">${esc(formatted)}</div>
    `;

  } catch (e) {
    console.error('[Claude]', e);
    responseEl.innerHTML = `
      <button class="claude-response-close" onclick="document.getElementById('claude-response-${escJs(bookId)}').style.display='none'">×</button>
      <div class="claude-response-header" style="color: var(--bordeaux);">FOUT</div>
      <div class="claude-response-text" style="color: var(--ink-fade);">${esc(e.message || 'onbekende fout')}</div>
    `;
  }
}
