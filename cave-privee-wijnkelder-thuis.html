function getViewCount(v) {
  if (v === 'kelder') return state.wines.filter(w => w.status === 'kelder').reduce((s,w) => s + (Number(w.bottles) || 0), 0);
  if (v === 'interesse' || v === 'wensenlijst') return state.wines.filter(w => w.status === 'interesse').length;
  if (v === 'bestellingen') return state.wines.filter(w => w.status === 'interesse').length;
  if (v === 'dagboek') return state.wines.filter(w => w.status === 'gedronken' || (w.tastings && w.tastings.length)).length;
  if (v === 'verkoop') return state.sales.length + state.wines.filter(w => w.status === 'te-verkopen').length;
  if (v === 'producenten') return new Set(state.wines.map(w => (w.producer || '').trim().toLowerCase()).filter(Boolean)).size;
  if (v === 'leveranciers') return state.suppliers.length;
  if (v === 'service') return state.openBottles.filter(b => !b.closedAt).length;
  if (v === 'flights') return state.flights.length;
  if (v === 'blind') return state.blindSessions.length;
  return '';
}

function renderTabs() {
  const views = VIEWS_BY_MODE[state.currentMode];
  const nav = document.getElementById('tabsNav');
  let html = '';
  views.forEach(v => {
    const count = getViewCount(v);
    html += `<button class="tab ${state.currentView === v ? 'active' : ''}" data-view="${v}" onclick="switchView('${v}')">${VIEW_LABELS[v]}${count !== '' ? ` <span class="tab-count">${count}</span>` : ''}</button>`;
  });
  nav.innerHTML = html;
  // Also render bottom-nav (mobile only via CSS)
  renderBottomNav();
}

function renderBottomNav() {
  const nav = document.getElementById('bottomNav');
  if (!nav) return;
  const primary = BOTTOM_NAV_PRIMARY[state.currentMode] || BOTTOM_NAV_PRIMARY.home;
  const allViews = VIEWS_BY_MODE[state.currentMode];
  const secondaryViews = allViews.filter(v => !primary.includes(v));
  const currentInPrimary = primary.includes(state.currentView);

  let html = '';
  primary.forEach(v => {
    const count = getViewCount(v);
    const isActive = state.currentView === v;
    const badge = (count !== '' && count > 0) ? `<span class="bnav-badge">${count}</span>` : '';
    html += `<button class="bottom-nav-item ${isActive ? 'active' : ''}" onclick="switchView('${v}')" aria-label="${VIEW_LABELS[v]}">
      <span class="bnav-icon">${VIEW_ICONS[v] || '·'}</span>
      <span>${VIEW_LABELS[v]}</span>
      ${badge}
    </button>`;
  });
  // "Meer" button — active if current view is in the secondary set
  const isMoreActive = !currentInPrimary;
  html += `<button class="bottom-nav-item ${isMoreActive ? 'active' : ''}" onclick="openMobileDrawer()" aria-label="Meer opties">
    <span class="bnav-icon">☰</span>
    <span>Meer</span>
  </button>`;
  nav.innerHTML = html;
}

function openMobileDrawer() {
  const drawer = document.getElementById('mobileDrawer');
  const backdrop = document.getElementById('mobileDrawerBackdrop');
  if (!drawer || !backdrop) return;
  renderMobileDrawerContent();
  drawer.classList.add('active');
  backdrop.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeMobileDrawer() {
  const drawer = document.getElementById('mobileDrawer');
  const backdrop = document.getElementById('mobileDrawerBackdrop');
  if (drawer) drawer.classList.remove('active');
  if (backdrop) backdrop.classList.remove('active');
  document.body.style.overflow = '';
}

function renderMobileDrawerContent() {
  const body = document.getElementById('mobileDrawerBody');
  if (!body) return;
  const allViews = VIEWS_BY_MODE[state.currentMode];
  const primary = BOTTOM_NAV_PRIMARY[state.currentMode] || BOTTOM_NAV_PRIMARY.home;
  const secondaryViews = allViews.filter(v => !primary.includes(v));

  let html = '';

  // Secondary views
  if (secondaryViews.length > 0) {
    html += `<div class="drawer-section-label">Meer pagina's</div>`;
    secondaryViews.forEach(v => {
      const count = getViewCount(v);
      const isActive = state.currentView === v;
      const badge = (count !== '' && count > 0) ? `<span class="drawer-item-badge">${count}</span>` : '';
      html += `<button class="drawer-item ${isActive ? 'active' : ''}" onclick="navigateFromDrawer('${v}')">
        <span class="drawer-item-icon">${VIEW_ICONS[v] || '·'}</span>
        <span class="drawer-item-label">${VIEW_LABELS[v]}</span>
        ${badge}
      </button>`;
    });
    html += `<div class="drawer-divider"></div>`;
  }

  // Actions
  html += `<div class="drawer-section-label">Acties</div>`;
  html += `<button class="drawer-item" onclick="closeMobileDrawer(); openQuickAdd();">
    <span class="drawer-item-icon">⚡</span>
    <span class="drawer-item-label">Snel toevoegen</span>
  </button>`;
  html += `<button class="drawer-item" onclick="closeMobileDrawer(); exportData();">
    <span class="drawer-item-icon">⬇</span>
    <span class="drawer-item-label">Bewaar als bestand</span>
  </button>`;
  html += `<button class="drawer-item" onclick="closeMobileDrawer(); importData();">
    <span class="drawer-item-icon">⬆</span>
    <span class="drawer-item-label">Open bestand</span>
  </button>`;
  html += `<div class="drawer-divider"></div>`;

  // Settings + theme
  html += `<div class="drawer-section-label">Instellingen</div>`;
  const currentTheme = document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
  html += `<button class="drawer-item" onclick="toggleTheme(); renderMobileDrawerContent();">
    <span class="drawer-item-icon">${currentTheme === 'light' ? '☾' : '☀'}</span>
    <span class="drawer-item-label">${currentTheme === 'light' ? 'Schakel naar donker' : 'Schakel naar licht'}</span>
  </button>`;
  html += `<button class="drawer-item" onclick="closeMobileDrawer(); openSettings();">
    <span class="drawer-item-icon">⚙</span>
    <span class="drawer-item-label">Alle instellingen</span>
  </button>`;

  body.innerHTML = html;
}

function navigateFromDrawer(view) {
  closeMobileDrawer();
  switchView(view);
}

function switchModeFromDrawer(mode) {
  closeMobileDrawer();
  switchMode(mode);
}

function switchMode(mode) {
  state.currentMode = mode;
  // Reset to dashboard
  state.currentView = 'dashboard';
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  saveData();
  renderTabs();
  render();
}

function switchView(view) {
  state.currentView = view;
  renderTabs();
  render();
}

function render() {
  renderTabs();
  const m = state.currentMode, v = state.currentView;
  const main = document.getElementById('mainContent');
  // Alleen Thuis-views; onbekende/oude handelsviews vallen terug op dashboard
  if (!VIEWS_BY_MODE.home.includes(v)) { state.currentView = 'dashboard'; }
  const view = state.currentView;
  if (view === 'dashboard') renderDashboard(main);
  else if (view === 'kelder') renderKelder(main);
  else if (view === 'interesse' || view === 'wensenlijst') renderInteresse(main);
  else if (view === 'dagboek') renderDagboek(main);
  else if (view === 'service') renderService(main);
  else if (view === 'pairing') renderPairing(main);
  else if (view === 'flights') renderFlights(main);
  else if (view === 'blind') renderBlind(main);
  else if (view === 'advies') renderInzichten(main);
  else renderDashboard(main);
  // Update AI button visual state after rendering
  if (typeof updateAIButtonStates === 'function') updateAIButtonStates();
  if (typeof updateExportWarnIndicator === 'function') updateExportWarnIndicator();
}

function renderWineCard(w) {
  const dw = getDrinkWindow(w);
  const typeBadge = w.type ? `<div class="wine-type-badge">${escapeHtml(w.type)}</div>` : '';
  const hasCorked = (w.tastings || []).some(t => t.corked) || w.corked;
  const corkedBadge = hasCorked ? `<div class="wine-corked-badge">⚠ kurk</div>` : '';
  const statusBadge = w.status === 'te-verkopen' ? `<div class="wine-status-badge for-sale">Te verkopen</div>`
    : w.status === 'verkocht' ? `<div class="wine-status-badge sold">Verkocht</div>` : '';

  const wantsRebuy = (w.tastings || []).some(t => t.rebuy === 'yes') || w.rebuy === 'yes';

  const imgHtml = w.photo
    ? `<img src="${w.photo}" alt="">`
    : `<div class="wine-image-placeholder">${escapeHtml((w.producer || w.name || '?')[0]).toUpperCase()}</div>`;

  // Score-logica: toon de MEEST RECENTE beoordeling (richting is informatiever dan
  // het historische maximum), met een trendpijl t.o.v. de vorige sessie.
  const ratedTastings = (w.tastings || [])
    .filter(t => Number(t.rating) > 0)
    .slice()
    .sort((a, b) => new Date(a.date || 0) - new Date(b.date || 0));
  let latestRating = ratedTastings.length ? Number(ratedTastings[ratedTastings.length - 1].rating) : (Number(w.rating) || 0);
  let trendArrow = '';
  if (ratedTastings.length >= 2) {
    const prev = Number(ratedTastings[ratedTastings.length - 2].rating);
    if (latestRating > prev) trendArrow = '<span class="rating-trend up" title="Stijgend t.o.v. vorige proefbeurt">↑</span>';
    else if (latestRating < prev) trendArrow = '<span class="rating-trend down" title="Dalend t.o.v. vorige proefbeurt">↓</span>';
    else trendArrow = '<span class="rating-trend flat" title="Gelijk aan vorige proefbeurt">→</span>';
  }
  const bestRating = latestRating;
  const rating = bestRating ? Array.from({length: 5}, (_, i) =>
    `<span class="star ${i < bestRating ? '' : 'empty'}">★</span>`).join('') + trendArrow : '';

  let footer = '';
  if (w.status === 'kelder' || w.status === 'te-verkopen') {
    let priceInfo = '';
    if (state.currentMode === 'restaurant') {
      const prices = calcRestaurantPrices(w);
      priceInfo = `<div class="wine-location" style="color:var(--gold);">${fmtPrice(prices.sellInVat, false)} kaart</div>`;
    } else if (state.currentMode === 'trader' && w.marketPrice) {
      priceInfo = `<div class="wine-location" style="color:var(--gold);">${fmtPrice(w.marketPrice, false)}</div>`;
    } else if (w.location) {
      priceInfo = `<div class="wine-location">${escapeHtml(w.location)}</div>`;
    }
    footer = `
      <div class="wine-bottles">${w.bottles || 0}<small>fl</small></div>
      <div style="text-align:right;">
        <span class="window-status window-${dw.status}">${dw.label}</span>
        ${priceInfo}
      </div>`;
  } else if (w.status === 'interesse') {
    const prio = { '1': 'Hoge prioriteit', '2': 'Gemiddeld', '3': 'Laag' }[w.priority] || '';
    const allocBadge = w.allocation === 'allocated' ? '<span class="allocation-badge">allocatie</span>' : '';
    footer = `
      <div style="font-size:11px; color:var(--gold);">${escapeHtml(prio)} ${allocBadge}</div>
      ${w.source ? `<div class="wine-location">via ${escapeHtml(w.source)}</div>` : ''}`;
  } else if (w.status === 'verkocht') {
    const sale = state.sales.find(s => s.wineId === w.id);
    footer = `
      <div style="font-size:11px; color:var(--green);">Verkocht</div>
      ${sale ? `<div class="wine-location">${fmtPrice(sale.pricePerBottle, false)}/fl</div>` : ''}`;
  } else if (w.status === 'gedronken' || (w.tastings && w.tastings.length > 0)) {
    const tastingCount = (w.tastings || []).length;
    const lastDate = tastingCount > 0 ? w.tastings[w.tastings.length-1].date : w.drinkDate;
    footer = `
      <div class="wine-rating">${rating}${wantsRebuy ? '<span class="rebuy-badge">↻</span>' : ''}</div>
      <div class="wine-location">${fmtDateShort(lastDate)}${tastingCount > 1 ? ` · ${tastingCount}×` : ''}</div>`;
  }

  return `<div class="wine-card" onclick="openDetail('${w.id}')">
    <div class="wine-image">${imgHtml}${typeBadge}${corkedBadge}${statusBadge}</div>
    <div class="wine-body">
      ${w.producer ? `<div class="wine-producer">${escapeHtml(w.producer)}</div>` : ''}
      <div class="wine-name">${escapeHtml(w.name || 'Onbekend')} ${w.vintage ? `<span style="color:var(--gold-dim);">· ${w.vintage}</span>` : ''}</div>
      <div class="wine-meta">
        ${w.region ? `<span>${escapeHtml(w.region)}</span>` : ''}
        ${w.region && w.country ? '<span class="wine-meta-divider"></span>' : ''}
        ${w.country ? `<span>${escapeHtml(w.country)}</span>` : ''}
      </div>
      <div class="wine-footer">${footer}</div>
    </div>
  </div>`;
}

function renderDashboard(main) {
  renderHomeDashboard(main);
}

function renderHomeDashboard(main) {
  const kelder = state.wines.filter(w => w.status === 'kelder');
  const allTastings = [];
  state.wines.forEach(w => { (w.tastings || []).forEach(t => allTastings.push({ ...t, wine: w })); });
  const interesse = state.wines.filter(w => w.status === 'interesse');

  const totaalFlessen = kelder.reduce((s, w) => s + (Number(w.bottles) || 0), 0);
  const totaleWaarde = kelder.reduce((s, w) => s + wineTotalValue(w), 0);
  const totaleAankoop = kelder.reduce((s, w) => s + wineTotalCost(w), 0);
  const rendement = totaleAankoop > 0 ? ((totaleWaarde - totaleAankoop) / totaleAankoop * 100) : 0;

  const ratedTastings = allTastings.filter(t => t.rating);
  const gemScore = ratedTastings.length > 0
    ? (ratedTastings.reduce((s, t) => s + Number(t.rating), 0) / ratedTastings.length).toFixed(1) : '—';

  const now = new Date().getFullYear();
  const drinkNu = kelder.filter(w => {
    const dw = getDrinkWindow(w);
    return dw.status === 'ready' || dw.status === 'peak' || dw.status === 'past';
  }).sort((a, b) => {
    const order = { past: 0, peak: 1, ready: 2 };
    return (order[getDrinkWindow(a).status] || 3) - (order[getDrinkWindow(b).status] || 3);
  });

  const binnenkort = kelder.filter(w => {
    const from = Number(w.drinkFrom);
    return from && from > now && from <= now + 2;
  }).sort((a,b) => Number(a.drinkFrom) - Number(b.drinkFrom));

  let html = `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Kelder</div>
        <div class="stat-value">${totaalFlessen}<small>flessen</small></div>
        <div class="stat-trend">${kelder.length} unieke wijnen</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Waarde</div>
        <div class="stat-value">${fmtPrice(totaleWaarde, false)}</div>
        <div class="stat-trend">geschatte kelderwaarde</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Proefnotities</div>
        <div class="stat-value">${allTastings.length}<small>×</small></div>
        <div class="stat-trend">Gemiddeld ${gemScore} ★</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Wensenlijst</div>
        <div class="stat-value">${interesse.length}<small>wijnen</small></div>
        <div class="stat-trend">${interesse.filter(w => w.priority == 1).length} hoge prioriteit</div>
      </div>
    </div>
  `;

  // Open flessen vandaag (sommelier feature)
  const openNow = state.openBottles.filter(b => !b.closedAt);
  if (openNow.length > 0) {
    html += `<div class="dashboard-section">
      <h2>Vanavond open <small>${openNow.length} actieve fles${openNow.length > 1 ? 'sen' : ''}</small><button class="btn btn-sm section-action" onclick="switchView('service')">→ Service</button></h2>
      <div class="notification-list">`;
    openNow.slice(0, 4).forEach(b => {
      const w = state.wines.find(x => x.id === b.wineId);
      if (!w) return;
      const days = Math.floor((new Date() - new Date(b.openedAt)) / (1000 * 60 * 60 * 24));
      const expectedDays = b.expectedDays || getRecommendedOpenDays(w);
      const isOver = days >= expectedDays;
      const isWarning = days >= expectedDays - 1 && days < expectedDays;
      const cls = isOver ? 'urgent' : isWarning ? 'aging' : 'success';
      const remaining = b.totalGlasses ? `${Math.max(0, b.totalGlasses - (b.glassesPoured || 0))} glazen resterend` : '';
      html += `<div class="notification ${cls}" onclick="switchView('service')">
        <div class="notification-text">
          ${escapeHtml(w.producer || '')} ${escapeHtml(w.name || '')} ${w.vintage || ''}
          <small>${isOver ? 'Houdbaarheid voorbij' : `Dag ${days} van ${expectedDays}`}${remaining ? ' · ' + remaining : ''}</small>
        </div>
        <div class="notification-meta">${fmtDateShort(b.openedAt)}</div>
      </div>`;

function renderTraderDashboard(main) {
  const kelder = state.wines.filter(w => w.status === 'kelder');
  const forSale = state.wines.filter(w => w.status === 'te-verkopen');
  const wachtlijst = state.wines.filter(w => w.status === 'interesse');

  const totaalFlessen = kelder.reduce((s, w) => s + (Number(w.bottles) || 0), 0);
  const totaleWaarde = kelder.reduce((s, w) => s + wineTotalValue(w), 0);
  const totaleAankoop = kelder.reduce((s, w) => s + wineTotalCost(w), 0);
  const rendement = totaleAankoop > 0 ? ((totaleWaarde - totaleAankoop) / totaleAankoop * 100) : 0;
  const rendementEur = totaleWaarde - totaleAankoop;

  const currentYear = new Date().getFullYear();
  const yearBudget = state.budgets.find(b => Number(b.year) === currentYear);
  const yearSpent = kelder.filter(w => w.purchaseDate && new Date(w.purchaseDate).getFullYear() === currentYear)
    .reduce((s, w) => s + wineTotalCost(w), 0);
  const yearRevenue = state.sales.filter(s => s.date && new Date(s.date).getFullYear() === currentYear)
    .reduce((sum, s) => sum + (Number(s.qty) * Number(s.pricePerBottle)), 0);

  // Top performers (highest value gain)
  const topGainers = kelder.filter(w => w.purchasePrice && w.marketPrice)
    .map(w => ({ w, gainPct: (Number(w.marketPrice) - Number(w.purchasePrice)) / Number(w.purchasePrice) * 100, gainEur: (Number(w.marketPrice) - Number(w.purchasePrice)) * Number(w.bottles) }))
    .sort((a,b) => b.gainPct - a.gainPct).slice(0, 5);

  // Allocaties die binnenkort komen
  const allocations = wachtlijst.filter(w => w.allocation === 'allocated');

  let html = `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Portfolio waarde</div>
        <div class="stat-value">${fmtPrice(totaleWaarde, false)}</div>
        <div class="stat-trend ${rendement >= 0 ? 'up' : 'down'}">${rendement >= 0 ? '↑' : '↓'} ${Math.abs(rendement).toFixed(1)}% (${rendement >= 0 ? '+' : ''}${fmtPrice(rendementEur, false)})</div>
      </div>
      <div class="stat-card accent-blue">
        <div class="stat-label">Voorraad</div>
        <div class="stat-value">${totaalFlessen}<small>flessen</small></div>
        <div class="stat-trend">${kelder.length} unieke wijnen</div>
      </div>
      <div class="stat-card accent-green">
        <div class="stat-label">Aankopen ${currentYear}</div>
        <div class="stat-value">${fmtPrice(yearSpent, false)}</div>
        <div class="stat-trend">${yearBudget ? `Budget ${fmtPrice(yearBudget.targetEur, false)} (${Math.round(yearSpent/yearBudget.targetEur*100)}%)` : 'Geen budget gezet'}</div>
      </div>
      <div class="stat-card accent-amber">
        <div class="stat-label">Verkopen ${currentYear}</div>
        <div class="stat-value">${fmtPrice(yearRevenue, false)}</div>
        <div class="stat-trend">${state.sales.filter(s => s.date && new Date(s.date).getFullYear() === currentYear).length} transacties</div>
      </div>
    </div>
  `;

  // Top performers
  if (topGainers.length > 0) {
    html += `<div class="dashboard-section"><h2>Top performers <small>waardestijging</small></h2>
      <table class="data-table">
        <thead><tr><th>Wijn</th><th>Aankoop</th><th>Markt</th><th class="num">%</th><th class="num">€ winst</th></tr></thead>
        <tbody>`;
    topGainers.forEach(({w, gainPct, gainEur}) => {

        <td class="num ${gainEur >= 0 ? 'pos' : 'neg'}">${gainEur >= 0 ? '+' : ''}${fmtPrice(gainEur, false)}</td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  }

  // Te verkopen
  if (forSale.length > 0) {
    html += `<div class="dashboard-section"><h2>Te verkopen <small>${forSale.length} wijnen</small></h2><div class="wine-grid">`;
    forSale.slice(0, 6).forEach(w => html += renderWineCard(w));

function renderRestaurantDashboard(main) {
  const kelder = state.wines.filter(w => w.status === 'kelder');
  const totaalFlessen = kelder.reduce((s, w) => s + (Number(w.bottles) || 0), 0);
  const totaleInkoopWaarde = kelder.reduce((s, w) => s + wineTotalCost(w), 0);

  // Theoretische verkoopwaarde
  const totaleVerkoopWaarde = kelder.reduce((s, w) => {
    const prices = calcRestaurantPrices(w);
    return s + (prices.sellInVat * (Number(w.bottles) || 0));
  }, 0);

  const currentYear = new Date().getFullYear();
  const currentMonth = new Date().getMonth();
  const monthSales = state.sales.filter(s => {
    const d = new Date(s.date);
    return d.getFullYear() === currentYear && d.getMonth() === currentMonth;
  });
  const monthRevenue = monthSales.reduce((sum, s) => sum + (Number(s.qty) * Number(s.pricePerBottle)), 0);
  const monthBottles = monthSales.reduce((sum, s) => sum + Number(s.qty), 0);

  // Turnover ratio approximation: sales last 6 months / current stock
  const sixMonthsAgo = new Date(); sixMonthsAgo.setMonth(sixMonthsAgo.getMonth() - 6);
  const sixMonthSold = state.sales.filter(s => new Date(s.date) >= sixMonthsAgo).reduce((sum, s) => sum + Number(s.qty), 0);
  const turnoverRatio = totaalFlessen > 0 ? (sixMonthSold * 2 / totaalFlessen).toFixed(2) : '—'; // annualized

  // Best sellers (last 90 days)
  const ninetyDaysAgo = new Date(); ninetyDaysAgo.setDate(ninetyDaysAgo.getDate() - 90);
  const recentSales = state.sales.filter(s => new Date(s.date) >= ninetyDaysAgo);
  const salesByWine = {};
  recentSales.forEach(s => {
    if (!salesByWine[s.wineId]) salesByWine[s.wineId] = { qty: 0, revenue: 0 };
    salesByWine[s.wineId].qty += Number(s.qty);
    salesByWine[s.wineId].revenue += Number(s.qty) * Number(s.pricePerBottle);
  });
  const bestSellers = Object.entries(salesByWine)
    .map(([id, data]) => ({ wine: state.wines.find(w => w.id === id), ...data }))
    .filter(x => x.wine)
    .sort((a,b) => b.qty - a.qty).slice(0, 5);

  // Slow movers: stock but no sales in 90 days
  const slowMovers = kelder.filter(w => !salesByWine[w.id] && (Number(w.bottles) || 0) > 0).slice(0, 5);

  let html = `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Voorraad</div>
        <div class="stat-value">${totaalFlessen}<small>flessen</small></div>
        <div class="stat-trend">${kelder.length} referenties</div>
      </div>
      <div class="stat-card accent-blue">
        <div class="stat-label">Inkoopwaarde excl. BTW</div>
        <div class="stat-value">${fmtPrice(totaleInkoopWaarde, false)}</div>
        <div class="stat-trend">Verkoop incl: ${fmtPrice(totaleVerkoopWaarde, false)}</div>
      </div>
      <div class="stat-card accent-green">
        <div class="stat-label">Omzet deze maand</div>
        <div class="stat-value">${fmtPrice(monthRevenue, false)}</div>
        <div class="stat-trend">${monthBottles} flessen verkocht</div>
      </div>
      <div class="stat-card accent-amber">
        <div class="stat-label">Stockrotatie</div>
        <div class="stat-value">${turnoverRatio}<small>×/jaar</small></div>
        <div class="stat-trend">Laatste 6 mnd → geannualiseerd</div>
      </div>
    </div>
  `;

  if (bestSellers.length > 0) {
    html += `<div class="dashboard-section"><h2>Best sellers <small>laatste 90 dagen</small></h2>
      <table class="data-table">
        <thead><tr><th>Wijn</th><th class="num">Flessen</th><th class="num">Omzet</th><th class="num">Voorraad</th></tr></thead>
        <tbody>`;
    bestSellers.forEach(({wine, qty, revenue}) => {
      html += `<tr onclick="openDetail('${wine.id}')" style="cursor:pointer;">
        <td>${escapeHtml(wine.producer || '')} ${escapeHtml(wine.name || '')} ${wine.vintage || ''}</td>
        <td class="num">${qty}</td>
        <td class="num">${fmtPrice(revenue, false)}</td>
        <td class="num ${(wine.bottles || 0) <= 2 ? 'neg' : ''}">${wine.bottles || 0}</td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  }

  if (slowMovers.length > 0) {
    html += `<div class="dashboard-section"><h2>Slow movers <small>geen verkoop in 90 dagen</small></h2><div class="notification-list">`;
    slowMovers.forEach(w => {
      const prices = calcRestaurantPrices(w);
      html += `<div class="notification aging" onclick="openDetail('${w.id}')">
        <div class="notification-text">
          ${escapeHtml(w.producer || '')} ${escapeHtml(w.name || '')} ${w.vintage || ''}
          <small>${w.bottles} flessen op voorraad · kaartprijs ${fmtPrice(prices.sellInVat, false)}</small>
        </div>
        <div class="notification-meta">${fmtPrice(prices.buyPriceExVat * (Number(w.bottles) || 0), false)} kapitaal</div>
      </div>`;
    });
    html += `</div></div>`;
  }

  // Low stock alert
  const lowStock = kelder.filter(w => (Number(w.bottles) || 0) > 0 && (Number(w.bottles) || 0) <= (Number(w.minStock) || 2));
  if (lowStock.length > 0) {
    html += `<div class="dashboard-section"><h2>Lage voorraad <small>bijbestellen?</small></h2><div class="notification-list">`;
    lowStock.slice(0, 6).forEach(w => {
      html += `<div class="notification urgent" onclick="openDetail('${w.id}')">
        <div class="notification-text">
          ${escapeHtml(w.producer || '')} ${escapeHtml(w.name || '')} ${w.vintage || ''}
          <small>Nog ${w.bottles} fles${w.bottles == 1 ? '' : 'sen'} · min ${w.minStock || 2}</small>
        </div>
        <div class="notification-meta">${w.purchasedAt ? escapeHtml(w.purchasedAt) : ''}</div>
      </div>`;
    });
    html += `</div></div>`;
  }

  if (state.wines.length === 0) {
    html = emptyStateHtml('◈', 'De wijnkaart wacht', 'Voeg uw eerste wijn toe en componeer een wijnkaart die uw keuken waardig is.', 'Wijn toevoegen');
  }

  main.innerHTML = html;
}

function applySorting(wines, sortBy) {
  const sorted = [...wines];
  switch(sortBy) {
    case 'producer': sorted.sort((a,b) => (a.producer||'').localeCompare(b.producer||'')); break;
    case 'vintage': sorted.sort((a,b) => (Number(a.vintage)||0) - (Number(b.vintage)||0)); break;
    case 'vintage-desc': sorted.sort((a,b) => (Number(b.vintage)||0) - (Number(a.vintage)||0)); break;
    case 'price': sorted.sort((a,b) => wineValue(a) - wineValue(b)); break;
    case 'price-desc': sorted.sort((a,b) => wineValue(b) - wineValue(a)); break;
    case 'drinkTo': sorted.sort((a,b) => (Number(a.drinkTo)||9999) - (Number(b.drinkTo)||9999)); break;
    case 'bottles-desc': sorted.sort((a,b) => (Number(b.bottles)||0) - (Number(a.bottles)||0)); break;
    case 'rating': sorted.sort((a,b) => (Number(b.rating)||0) - (Number(a.rating)||0)); break;
    case 'recent':
    default: sorted.sort((a,b) => new Date(b.createdAt||0) - new Date(a.createdAt||0));
  }
  return sorted;
}

function filterKelder() {
  const q = (document.getElementById('searchKelder')?.value || '').toLowerCase();
  const active = document.querySelector('.toolbar .filter-pill.active');
  const filter = active ? active.dataset.filter : 'all';
  const sortBy = document.getElementById('sortKelder')?.value || 'recent';

  let wines = state.wines.filter(w => w.status === 'kelder' || w.status === 'te-verkopen');

  if (filter !== 'all') {
    wines = wines.filter(w => {
      if (filter === 'rood' || filter === 'wit') return w.type === filter;
      if (filter === 'low') return (Number(w.bottles) || 0) > 0 && (Number(w.bottles) || 0) <= (Number(w.minStock) || 2);
      const dw = getDrinkWindow(w);
      return dw.status === filter;
    });
  }

  if (q) {
    wines = wines.filter(w =>
      (w.producer || '').toLowerCase().includes(q) ||
      (w.name || '').toLowerCase().includes(q) ||
      (w.region || '').toLowerCase().includes(q) ||
      (w.country || '').toLowerCase().includes(q) ||
      (w.grapes || '').toLowerCase().includes(q) ||
      String(w.vintage || '').includes(q)
    );
  }

  wines = applySorting(wines, sortBy);
  const grid = document.getElementById('kelderGrid');
  if (wines.length === 0) {
    grid.outerHTML = `<div id="kelderGrid">` + emptyStateHtml('◈', 'Geen wijnen', 'Geen wijnen voldoen aan deze filters.', 'Wijn toevoegen') + `</div>`;
  } else {
    grid.innerHTML = wines.map(renderWineCard).join('');
  }
}

function toggleFilter(el, viewType) {
  el.parentElement.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  if (viewType === 'kelder') filterKelder();
  else if (viewType === 'interesse') filterInteresse();
  else if (viewType === 'dagboek') filterDagboek();
  updateMobileFilterCount();
}

function toggleKelderFilters(btn) {
  const toolbar = btn.closest('.toolbar');
  if (!toolbar) return;
  const expanded = toolbar.classList.toggle('filters-expanded');
  btn.setAttribute('aria-expanded', expanded ? 'true' : 'false');
}

function updateMobileFilterCount() {
  const counter = document.getElementById('kelderFilterCount');
  if (!counter) return;
  const toolbar = document.getElementById('kelderToolbar');
  if (!toolbar) return;
  // Count non-"all" active pills
  const activePills = toolbar.querySelectorAll('.filter-pill.active');
  let count = 0;
  activePills.forEach(p => { if (p.dataset.filter !== 'all') count++; });
  const btn = toolbar.querySelector('.filter-bar-mobile-toggle');
  if (count > 0) {
    counter.textContent = count;
    counter.style.display = '';
    if (btn) btn.classList.add('has-active');
  } else {
    counter.style.display = 'none';
    if (btn) btn.classList.remove('has-active');
  }
}

function filterInteresse() {
  const q = (document.getElementById('searchInteresse')?.value || '').toLowerCase();
  const active = document.querySelector('.toolbar .filter-pill.active');
  const filter = active ? active.dataset.filter : 'all';
  let wines = state.wines.filter(w => w.status === 'interesse');

  if (filter !== 'all') {
    if (filter === 'allocated') wines = wines.filter(w => w.allocation === 'allocated');
    else wines = wines.filter(w => String(w.priority) === filter);
  }

  if (q) {
    wines = wines.filter(w =>
      (w.producer || '').toLowerCase().includes(q) ||
      (w.name || '').toLowerCase().includes(q) ||
      (w.source || '').toLowerCase().includes(q)
    );
  }
  wines.sort((a,b) => (Number(a.priority) || 3) - (Number(b.priority) || 3));

  const grid = document.getElementById('interesseGrid');
  if (wines.length === 0) {
    grid.outerHTML = `<div id="interesseGrid">` + emptyStateHtml('◈', 'Geen wijnen', 'Voeg wijnen toe aan je wens-/wachtlijst.', 'Wijn toevoegen') + `</div>`;
  } else {
    grid.innerHTML = wines.map(renderWineCard).join('');
  }
}

// ============ DAGBOEK ============
function renderDagboek(main) {
  let html = `
    <div class="toolbar">
      <div class="search-box"><input type="text" id="searchDagboek" placeholder="Zoek..." oninput="filterDagboek()"></div>
      <div class="filter-pill active" data-filter="all" onclick="toggleFilter(this, 'dagboek')">Alle</div>
      <div class="filter-pill" data-filter="5" onclick="toggleFilter(this, 'dagboek')">5 ★</div>
      <div class="filter-pill" data-filter="4" onclick="toggleFilter(this, 'dagboek')">4+ ★</div>
      <div class="filter-pill" data-filter="3" onclick="toggleFilter(this, 'dagboek')">3+ ★</div>
      <div class="filter-pill" data-filter="rebuy" onclick="toggleFilter(this, 'dagboek')">Herhaal-aankoop</div>
    </div>
    <div class="wine-grid" id="dagboekGrid"></div>
  `;
  main.innerHTML = html;
  filterDagboek();
}

function filterDagboek() {
  const q = (document.getElementById('searchDagboek')?.value || '').toLowerCase();
  const active = document.querySelector('.toolbar .filter-pill.active');
  const filter = active ? active.dataset.filter : 'all';
  let wines = state.wines.filter(w => w.status === 'gedronken' || (w.tastings && w.tastings.length > 0));

  if (filter !== 'all') {
    if (filter === 'rebuy') {
      wines = wines.filter(w => (w.tastings || []).some(t => t.rebuy === 'yes') || w.rebuy === 'yes');
    } else {
      const min = Number(filter);
      wines = wines.filter(w => {
        const maxRating = Math.max(Number(w.rating) || 0, ...(w.tastings || []).map(t => Number(t.rating) || 0));
        return maxRating >= min;
      });
    }
  }

  if (q) {
    wines = wines.filter(w =>
      (w.producer || '').toLowerCase().includes(q) ||
      (w.name || '').toLowerCase().includes(q) ||
      (w.notes || '').toLowerCase().includes(q) ||
      (w.tastings || []).some(t => (t.nose||'').toLowerCase().includes(q) || (t.palate||'').toLowerCase().includes(q) || (t.occasion||'').toLowerCase().includes(q))
    );
  }

  wines.sort((a,b) => {
    const dA = Math.max(new Date(a.drinkDate || 0).getTime(), ...((a.tastings || []).map(t => new Date(t.date || 0).getTime())));
    const dB = Math.max(new Date(b.drinkDate || 0).getTime(), ...((b.tastings || []).map(t => new Date(t.date || 0).getTime())));
    return dB - dA;
  });

  const grid = document.getElementById('dagboekGrid');
  if (wines.length === 0) {
    grid.outerHTML = `<div id="dagboekGrid">` + emptyStateHtml('◈', 'Geen proefnotities', 'Drink een fles, voeg een proefnotitie toe.', 'Wijn toevoegen') + `</div>`;
  } else {
    grid.innerHTML = wines.map(renderWineCard).join('');
  }
}

// ============ VERKOOP ============
function renderVerkoop(main) {
  const teVerkopen = state.wines.filter(w => w.status === 'te-verkopen');
  const verkocht = state.wines.filter(w => w.status === 'verkocht');

  let totalRevenue = 0;
  let totalCost = 0;
  state.sales.forEach(s => {
    totalRevenue += Number(s.qty) * Number(s.pricePerBottle);
    const w = state.wines.find(x => x.id === s.wineId);
    if (w) totalCost += Number(s.qty) * (Number(w.purchasePrice) || 0);
  });
  const totalProfit = totalRevenue - totalCost;
  const totalMargin = totalCost > 0 ? (totalProfit / totalCost * 100) : 0;

  let html = `
    <div class="stats-grid">
      <div class="stat-card accent-green">
        <div class="stat-label">Totale omzet</div>
        <div class="stat-value">${fmtPrice(totalRevenue, false)}</div>
        <div class="stat-trend">${state.sales.length} transacties</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Inkoop verkocht</div>
        <div class="stat-value">${fmtPrice(totalCost, false)}</div>
      </div>
      <div class="stat-card ${totalProfit >= 0 ? 'accent-green' : 'accent-danger'}">
        <div class="stat-label">Winst</div>
        <div class="stat-value">${fmtPrice(totalProfit, false)}</div>
        <div class="stat-trend ${totalProfit >= 0 ? 'up' : 'down'}">${totalMargin.toFixed(1)}% marge</div>
      </div>
      <div class="stat-card accent-amber">
        <div class="stat-label">Te verkopen</div>
        <div class="stat-value">${teVerkopen.length}<small>wijnen</small></div>
        <div class="stat-trend">${teVerkopen.reduce((s,w) => s + (Number(w.bottles)||0), 0)} flessen</div>
      </div>
    </div>
  `;

  // Te verkopen sectie
  if (teVerkopen.length > 0) {
    html += `<div class="dashboard-section"><h2>Te verkopen <small>${teVerkopen.length} wijnen</small></h2><div class="wine-grid">`;
    teVerkopen.forEach(w => html += renderWineCard(w));
    html += `</div></div>`;
  }

  // Verkoophistorie
  if (state.sales.length > 0) {
    html += `<div class="dashboard-section">
      <h2>Verkoophistorie <small>${state.sales.length} transacties</small></h2>
      <table class="data-table">
        <thead><tr><th>Datum</th><th>Wijn</th><th>Kanaal</th><th class="num">Aantal</th><th class="num">€/fl</th><th class="num">Totaal</th><th class="num">Marge</th><th></th></tr></thead>
        <tbody>`;
    const sortedSales = [...state.sales].sort((a,b) => new Date(b.date) - new Date(a.date));
    sortedSales.forEach(s => {
      const w = state.wines.find(x => x.id === s.wineId);
      const total = Number(s.qty) * Number(s.pricePerBottle);
      const cost = w ? Number(s.qty) * (Number(w.purchasePrice) || 0) : 0;
      const profit = total - cost;
      const margin = cost > 0 ? (profit / cost * 100) : 0;
      html += `<tr>
        <td>${fmtDateShort(s.date)}</td>
        <td>${w ? escapeHtml(w.producer || '') + ' ' + escapeHtml(w.name || '') + ' ' + (w.vintage || '') : 'Onbekende wijn'}</td>
        <td>${escapeHtml(s.channel || '—')}</td>
        <td class="num">${s.qty}</td>
        <td class="num">${fmtPrice(s.pricePerBottle)}</td>
        <td class="num">${fmtPrice(total)}</td>
        <td class="num ${profit >= 0 ? 'pos' : 'neg'}">${margin.toFixed(0)}%</td>
        <td><button class="btn btn-sm btn-ghost" onclick="deleteSale('${s.id}')">×</button></td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  }

  if (state.sales.length === 0 && teVerkopen.length === 0) {
    html += emptyStateHtml('◈', 'Geen verkopen', 'Markeer een wijn als "te verkopen" of registreer een transactie.', 'Wijn toevoegen');
  }

  main.innerHTML = html;
}

function deleteSale(saleId) {
  if (!confirm('Verkoop verwijderen? Voorraad wordt teruggezet.')) return;
  const sale = state.sales.find(s => s.id === saleId);
  if (sale) {
    const w = state.wines.find(x => x.id === sale.wineId);
    if (w) {
      w.bottles = (Number(w.bottles) || 0) + Number(sale.qty);
      if (w.status === 'verkocht') w.status = 'kelder';
    }
  }
  state.sales = state.sales.filter(s => s.id !== saleId);
  saveData();
  render();
  showToast('Verkoop teruggedraaid');
}

// ============ PORTFOLIO (charts) ============
function renderPortfolio(main) {
  const kelder = state.wines.filter(w => w.status === 'kelder' || w.status === 'te-verkopen');

  if (kelder.length === 0) {
    main.innerHTML = emptyStateHtml('◈', 'Geen portfolio data', 'Voeg wijnen toe aan je kelder om portfolio-analyses te zien.', 'Wijn toevoegen');
    return;
  }

  // Aggregaties
  const byCountry = {};
  const byRegion = {};
  const byType = {};
  const byVintage = {};
  const byProducer = {};
  const bySupplier = {};
  const now = new Date().getFullYear();

  kelder.forEach(w => {
    const bottles = Number(w.bottles) || 0;
    const value = wineValue(w) * bottles;
    if (bottles === 0) return;

    const c = w.country || 'Onbekend';
    byCountry[c] = (byCountry[c] || 0) + value;

    const r = w.region || w.country || 'Onbekend';
    byRegion[r] = (byRegion[r] || 0) + value;

    const t = w.type || 'Onbekend';
    byType[t] = (byType[t] || 0) + bottles;

    if (w.vintage) {
      byVintage[w.vintage] = byVintage[w.vintage] || { bottles: 0, status: getDrinkWindow(w).status };
      byVintage[w.vintage].bottles += bottles;
    }

    if (w.producer) byProducer[w.producer] = (byProducer[w.producer] || 0) + value;
    if (w.purchasedAt) bySupplier[w.purchasedAt] = (bySupplier[w.purchasedAt] || 0) + (Number(w.purchasePrice) || 0) * bottles;
  });

  // Pijplijn: aantal flessen "op dronk" per komende 10 jaar
  const pipeline = {};
  for (let y = now; y <= now + 9; y++) pipeline[y] = 0;
  kelder.forEach(w => {
    const bottles = Number(w.bottles) || 0;
    if (bottles === 0) return;
    const from = Number(w.drinkFrom) || now;
    const to = Number(w.drinkTo) || now + 10;
    for (let y = Math.max(now, from); y <= Math.min(now + 9, to); y++) {
      pipeline[y] += bottles;
    }
  });

  let html = `<div class="charts-grid">`;

  // Donut: country
  html += `<div class="chart-card"><h3>Verdeling per land <small>Waarde</small></h3>${renderDonutChart(byCountry, 'value')}</div>`;

  // Bar: type
  html += `<div class="chart-card"><h3>Per type <small>Flessen</small></h3>${renderBarChart(byType, 'bottles')}</div>`;

  // Vintage spread
  html += `<div class="chart-card" style="grid-column: 1 / -1;"><h3>Jaargang-spread <small>Flessen per jaargang, gekleurd op drinkvenster</small></h3>${renderVintageChart(byVintage)}</div>`;

  // Pijplijn
  html += `<div class="chart-card" style="grid-column: 1 / -1;"><h3>Consumptie-pijplijn <small>Flessen "op dronk" per komend jaar</small></h3>${renderPipelineChart(pipeline)}</div>`;

  // Top producers
  html += `<div class="chart-card"><h3>Top producenten <small>Op waarde</small></h3>${renderTopBarChart(byProducer, 8)}</div>`;

  // Top suppliers
  html += `<div class="chart-card"><h3>Top leveranciers <small>Op uitgaven</small></h3>${renderTopBarChart(bySupplier, 8)}</div>`;

  html += `</div>`;

  // Rendement detail
  html += renderRendementTable(kelder);

  main.innerHTML = html;
}

function renderDonutChart(data, mode) {
  const entries = Object.entries(data).sort((a,b) => b[1] - a[1]);
  const total = entries.reduce((s, [_,v]) => s + v, 0);
  if (total === 0) return '<div style="color:var(--text-faint); padding:20px;">Geen data</div>';

  const colors = ['#c9a961', '#722f37', '#6b8e4e', '#5a8db8', '#d4a14a', '#8b6db8', '#b85a4a', '#8a7548'];
  const cx = 100, cy = 100, r = 70, rInner = 45;

  let pathData = '';
  let legendHtml = '';
  let startAngle = -Math.PI / 2;

  entries.slice(0, 8).forEach(([label, value], i) => {
    const pct = value / total;
    const endAngle = startAngle + pct * Math.PI * 2;
    const x1 = cx + Math.cos(startAngle) * r;
    const y1 = cy + Math.sin(startAngle) * r;
    const x2 = cx + Math.cos(endAngle) * r;
    const y2 = cy + Math.sin(endAngle) * r;
    const x3 = cx + Math.cos(endAngle) * rInner;
    const y3 = cy + Math.sin(endAngle) * rInner;
    const x4 = cx + Math.cos(startAngle) * rInner;
    const y4 = cy + Math.sin(startAngle) * rInner;
    const large = pct > 0.5 ? 1 : 0;
    pathData += `<path d="M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} L ${x3} ${y3} A ${rInner} ${rInner} 0 ${large} 0 ${x4} ${y4} Z" fill="${colors[i % colors.length]}" stroke="var(--bg-card)" stroke-width="1"/>`;

    const valueStr = mode === 'value' ? fmtPrice(value, false) : value;
    legendHtml += `<div class="donut-legend-item">
      <div class="donut-legend-color" style="background:${colors[i % colors.length]}"></div>
      <div class="donut-legend-label">${escapeHtml(label)}</div>
      <div class="donut-legend-value">${(pct * 100).toFixed(0)}%</div>
    </div>`;
    startAngle = endAngle;
  });

  return `<div class="donut-wrap">
    <svg class="donut-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">${pathData}
      <text x="100" y="95" text-anchor="middle" fill="var(--gold-bright)" font-family="Cormorant Garamond" font-size="20">${mode === 'value' ? fmtPrice(total, false) : total}</text>
      <text x="100" y="115" text-anchor="middle" fill="var(--text-faint)" font-family="Inter" font-size="10" letter-spacing="0.15em">TOTAAL</text>
    </svg>
    <div class="donut-legend">${legendHtml}</div>
  </div>`;
}

function renderBarChart(data, unit) {
  const entries = Object.entries(data).sort((a,b) => b[1] - a[1]);
  const max = Math.max(...entries.map(([_,v]) => v), 1);
  let html = '<div class="bar-chart">';
  entries.forEach(([label, value]) => {
    const pct = (value / max) * 100;
    html += `<div class="bar-row">
      <div class="bar-label">${escapeHtml(label)}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
      <div class="bar-value">${unit === 'price' ? fmtPrice(value, false) : value}</div>
    </div>`;
  });
  html += '</div>';
  return html;
}

function renderTopBarChart(data, limit) {
  const entries = Object.entries(data).sort((a,b) => b[1] - a[1]).slice(0, limit);
  if (entries.length === 0) return '<div style="color:var(--text-faint); padding:20px;">Geen data</div>';
  const max = Math.max(...entries.map(([_,v]) => v), 1);
  let html = '<div class="bar-chart">';
  entries.forEach(([label, value]) => {
    const pct = (value / max) * 100;
    html += `<div class="bar-row">
      <div class="bar-label" title="${escapeHtml(label)}">${escapeHtml(label.length > 18 ? label.slice(0,16) + '…' : label)}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
      <div class="bar-value">${fmtPrice(value, false)}</div>
    </div>`;
  });
  html += '</div>';
  return html;
}

function renderVintageChart(data) {
  const years = Object.keys(data).map(Number).filter(y => y > 1900).sort();
  if (years.length === 0) return '<div style="color:var(--text-faint); padding:20px;">Geen jaargang-data</div>';
  const min = years[0], max = years[years.length-1];
  const allYears = [];
  for (let y = min; y <= max; y++) allYears.push(y);
  const maxBottles = Math.max(...Object.values(data).map(d => d.bottles), 1);

  let html = '<div style="overflow-x:auto; padding: 0 4px;"><div class="vintage-chart" style="min-width:' + (allYears.length * 24) + 'px;">';
  allYears.forEach(y => {
    const d = data[y];
    const bottles = d ? d.bottles : 0;
    const height = (bottles / maxBottles) * 160;
    const status = d ? d.status : 'unknown';
    html += `<div class="vintage-bar ${status}" style="height:${Math.max(2, height)}px;" title="${y}: ${bottles} flessen">
      <div class="vintage-tooltip">${y}: ${bottles} fl.</div>
      <div class="vintage-label">${y}</div>
    </div>`;
  });
  html += '</div></div>';
  return html;
}

function renderPipelineChart(pipeline) {
  const years = Object.keys(pipeline).map(Number).sort();
  const max = Math.max(...Object.values(pipeline), 1);
  let html = '<div style="display:grid; grid-template-columns: repeat(' + years.length + ', 1fr); gap: 4px; align-items: flex-end; height: 160px; padding-bottom: 24px;">';
  years.forEach(y => {
    const v = pipeline[y];
    const height = (v / max) * 130;
    html += `<div style="display:flex; flex-direction:column; align-items:center; gap:4px;">
      <div style="font-size:11px; color:var(--gold); font-family:'Cormorant Garamond',serif;">${v}</div>
      <div style="width:100%; height:${Math.max(2, height)}px; background:linear-gradient(180deg, var(--gold), var(--gold-dim)); border-radius:2px 2px 0 0;"></div>
      <div style="font-size:10px; color:var(--text-faint);">${y}</div>
    </div>`;
  });
  html += '</div>';
  return html;
}

function renderRendementTable(kelder) {
  const winersLosers = kelder
    .filter(w => w.purchasePrice && w.marketPrice && (Number(w.bottles) || 0) > 0)
    .map(w => ({
      w,
      gainPct: (Number(w.marketPrice) - Number(w.purchasePrice)) / Number(w.purchasePrice) * 100,
      gainEur: (Number(w.marketPrice) - Number(w.purchasePrice)) * Number(w.bottles)
    }));

  const winners = [...winersLosers].sort((a,b) => b.gainPct - a.gainPct).slice(0, 5);
  const losers = [...winersLosers].sort((a,b) => a.gainPct - b.gainPct).slice(0, 5).filter(x => x.gainPct < 0);

  if (winners.length === 0) return '';

  let html = `<div class="dashboard-section"><h2>Rendement detail <small>Aankoop versus huidige marktprijs</small></h2><div class="charts-grid">`;

  html += `<div class="chart-card"><h3>Top winners</h3><table class="data-table"><thead><tr><th>Wijn</th><th class="num">%</th><th class="num">€</th></tr></thead><tbody>`;
  winners.forEach(({w, gainPct, gainEur}) => {
    html += `<tr onclick="openDetail('${w.id}')" style="cursor:pointer;">
      <td>${escapeHtml(w.producer || '')} ${w.vintage || ''}</td>
      <td class="num pos">+${gainPct.toFixed(0)}%</td>
      <td class="num pos">+${fmtPrice(gainEur, false)}</td>
    </tr>`;
  });
  html += `</tbody></table></div>`;

  if (losers.length > 0) {
    html += `<div class="chart-card"><h3>Verliezers</h3><table class="data-table"><thead><tr><th>Wijn</th><th class="num">%</th><th class="num">€</th></tr></thead><tbody>`;
    losers.forEach(({w, gainPct, gainEur}) => {
      html += `<tr onclick="openDetail('${w.id}')" style="cursor:pointer;">
        <td>${escapeHtml(w.producer || '')} ${w.vintage || ''}</td>
        <td class="num neg">${gainPct.toFixed(0)}%</td>
        <td class="num neg">${fmtPrice(gainEur, false)}</td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  }

  html += `</div></div>`;
  return html;
}

// ============ PRODUCENTEN ============
function renderProducenten(main) {
  const producers = {};
  state.wines.forEach(w => {
    if (!w.producer) return;
    const key = w.producer.trim();
    if (!producers[key]) {
      producers[key] = { name: key, wines: [], totalBottles: 0, totalValue: 0, totalCost: 0, ratings: [], country: w.country, region: w.region };
    }
    producers[key].wines.push(w);
    if (w.status === 'kelder' || w.status === 'te-verkopen') {
      producers[key].totalBottles += Number(w.bottles) || 0;
      producers[key].totalValue += wineTotalValue(w);
      producers[key].totalCost += wineTotalCost(w);
    }
    if (w.rating) producers[key].ratings.push(Number(w.rating));
    (w.tastings || []).forEach(t => { if (t.rating) producers[key].ratings.push(Number(t.rating)); });
  });

  const list = Object.values(producers).sort((a,b) => b.totalValue - a.totalValue);

  let html = `<div class="toolbar">
    <div class="search-box"><input type="text" id="searchProd" placeholder="Zoek producent..." oninput="filterProducenten()"></div>
    <div style="font-size:12px; color:var(--text-faint);">${list.length} producenten</div>
  </div>`;

  html += `<div id="prodList">`;
  list.forEach(p => {
    const avgRating = p.ratings.length ? (p.ratings.reduce((s,r) => s+r, 0) / p.ratings.length).toFixed(1) : '—';
    const gain = p.totalCost > 0 ? ((p.totalValue - p.totalCost) / p.totalCost * 100) : 0;
    html += `<div class="entity-row" onclick="searchByProducer('${escapeHtml(p.name).replace(/'/g, '&#39;')}')">
      <div class="entity-name">${escapeHtml(p.name)}<small>${escapeHtml([p.region, p.country].filter(Boolean).join(' · '))}</small></div>
      <div class="entity-stat"><div class="num">${p.wines.length}</div><div class="lbl">wijnen</div></div>
      <div class="entity-stat"><div class="num">${p.totalBottles}</div><div class="lbl">flessen</div></div>
      <div class="entity-stat"><div class="num">${fmtPrice(p.totalValue, false)}</div><div class="lbl">waarde</div></div>
      <div class="entity-stat"><div class="num ${gain >= 0 ? 'pos' : 'neg'}" style="color:${gain >= 0 ? 'var(--green-bright)' : 'var(--danger)'};">${avgRating} ★</div><div class="lbl">${gain ? (gain >= 0 ? '+' : '') + gain.toFixed(0) + '%' : 'gem. score'}</div></div>
    </div>`;
  });
  html += `</div>`;

  if (list.length === 0) html = emptyStateHtml('◈', 'Geen producenten', 'Voeg wijnen toe met een producentnaam.', 'Wijn toevoegen');

  main.innerHTML = html;
}

function filterProducenten() {
  const q = document.getElementById('searchProd').value.toLowerCase();
  document.querySelectorAll('#prodList .entity-row').forEach(row => {
    row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}

function searchByProducer(name) {
  state.currentView = 'kelder';
  render();
  setTimeout(() => {
    const search = document.getElementById('searchKelder');
    if (search) { search.value = name; filterKelder(); }
  }, 100);
}

// ============ LEVERANCIERS ============
function renderLeveranciers(main) {
  // Aggregate from wine.purchasedAt + manual suppliers
  const supplierMap = {};
  state.suppliers.forEach(s => {
    supplierMap[s.name.toLowerCase()] = { ...s, wines: [], totalSpent: 0, totalBottles: 0 };
  });
  state.wines.forEach(w => {
    if (!w.purchasedAt) return;
    const key = w.purchasedAt.toLowerCase();
    if (!supplierMap[key]) {
      supplierMap[key] = { id: null, name: w.purchasedAt, wines: [], totalSpent: 0, totalBottles: 0 };
    }
    supplierMap[key].wines.push(w);
    supplierMap[key].totalSpent += (Number(w.purchasePrice) || 0) * (Number(w.bottles) || 0);
    supplierMap[key].totalBottles += Number(w.bottles) || 0;
  });

  const list = Object.values(supplierMap).sort((a,b) => b.totalSpent - a.totalSpent);

  let html = `<div class="toolbar">
    <div class="search-box"><input type="text" id="searchSup" placeholder="Zoek leverancier..." oninput="filterLeveranciers()"></div>
    <button class="btn btn-primary" onclick="openSupplierEdit(null)">+ Leverancier toevoegen</button>
  </div>`;

  html += `<div id="supList">`;
  list.forEach(s => {
    html += `<div class="entity-row" onclick="searchBySupplier('${escapeHtml(s.name).replace(/'/g, '&#39;')}')">
      <div class="entity-name">${escapeHtml(s.name)}${s.contact ? `<small>${escapeHtml(s.contact)}</small>` : ''}</div>
      <div class="entity-stat"><div class="num">${s.wines.length}</div><div class="lbl">aankopen</div></div>
      <div class="entity-stat"><div class="num">${s.totalBottles}</div><div class="lbl">flessen</div></div>
      <div class="entity-stat"><div class="num">${fmtPrice(s.totalSpent, false)}</div><div class="lbl">uitgaven</div></div>
      <div class="entity-stat">${s.id ? `<button class="btn btn-sm" onclick="event.stopPropagation(); openSupplierEdit('${s.id}')">Bewerken</button>` : ''}</div>
    </div>`;
  });
  html += `</div>`;

  if (list.length === 0) html = emptyStateHtml('◈', 'Geen leveranciers', 'Voeg leveranciers toe of registreer aankopen.', 'Leverancier toevoegen', 'openSupplierEdit(null)');

  main.innerHTML = html;
}

// ============ BUDGET ============
function renderBudget(main) {
  const currentYear = new Date().getFullYear();

  let html = `<div class="toolbar">
    <h2 style="font-family:'Cormorant Garamond',serif; font-size:22px; color:var(--gold-bright); margin:0;">Aankoopbudgetten</h2>
    <button class="btn btn-primary" style="margin-left:auto;" onclick="openBudgetEdit()">+ Budget instellen</button>
  </div>`;

  // Current year budget overview
  const cy = state.budgets.find(b => Number(b.year) === currentYear);
  if (cy) {
    const spent = state.wines.filter(w => w.purchaseDate && new Date(w.purchaseDate).getFullYear() === currentYear)
      .reduce((s, w) => s + wineTotalCost(w), 0);
    const remaining = Number(cy.targetEur) - spent;
    const pct = Math.min(100, spent / Number(cy.targetEur) * 100);
    const isOver = spent > Number(cy.targetEur);

    html += `<div class="chart-card" style="margin-bottom:24px;">
      <h3>Budget ${currentYear} <small>${isOver ? 'OVERSCHREDEN' : (remaining > 0 ? fmtPrice(remaining, false) + ' resterend' : 'op')}</small></h3>
      <div class="budget-bar"><div class="budget-fill ${isOver ? 'over' : ''}" style="width:${pct}%;">${fmtPrice(spent, false)} / ${fmtPrice(cy.targetEur, false)}</div></div>
      ${cy.notes ? `<div style="margin-top:12px; font-size:13px; color:var(--text-dim); font-style:italic;">${escapeHtml(cy.notes)}</div>` : ''}
    </div>`;
  } else {
    html += `<div class="chart-card" style="margin-bottom:24px; text-align:center;">
      <p style="color:var(--text-dim);">Geen budget ingesteld voor ${currentYear}</p>
      <button class="btn btn-primary" style="margin-top:12px;" onclick="openBudgetEdit(${currentYear})">+ Stel budget voor ${currentYear} in</button>
    </div>`;
  }

  // Year overview table
  const yearData = {};
  state.wines.forEach(w => {
    if (!w.purchaseDate) return;
    const y = new Date(w.purchaseDate).getFullYear();
    yearData[y] = yearData[y] || { spent: 0, bottles: 0, wines: 0 };
    yearData[y].spent += wineTotalCost(w);
    yearData[y].bottles += Number(w.bottles) || 0;
    yearData[y].wines += 1;
  });

  const years = Object.keys(yearData).map(Number).sort((a,b) => b - a);
  if (years.length > 0) {
    html += `<div class="chart-card">
      <h3>Aankopen per jaar</h3>
      <table class="data-table">
        <thead><tr><th>Jaar</th><th class="num">Budget</th><th class="num">Uitgegeven</th><th class="num">Δ</th><th class="num">Wijnen</th><th class="num">Flessen</th><th></th></tr></thead>
        <tbody>`;
    years.forEach(y => {
      const d = yearData[y];
      const budget = state.budgets.find(b => Number(b.year) === y);
      const budgetVal = budget ? Number(budget.targetEur) : 0;
      const diff = budgetVal > 0 ? budgetVal - d.spent : 0;
      html += `<tr>
        <td>${y}</td>
        <td class="num">${budget ? fmtPrice(budgetVal) : '—'}</td>
        <td class="num">${fmtPrice(d.spent)}</td>
        <td class="num ${diff >= 0 ? 'pos' : 'neg'}">${budget ? (diff >= 0 ? '+' : '') + fmtPrice(diff) : '—'}</td>
        <td class="num">${d.wines}</td>
        <td class="num">${d.bottles}</td>
        <td><button class="btn btn-sm" onclick="openBudgetEdit(${y})">${budget ? 'Bewerken' : '+ Budget'}</button></td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  }

  main.innerHTML = html;
}

function renderWijnkaart(main) {
  const kelder = state.wines.filter(w => (w.status === 'kelder' || w.status === 'te-verkopen') && (Number(w.bottles) || 0) > 0);

  // Group by type then region
  const grouped = {};
  const typeOrder = ['mousserend', 'wit', 'oranje', 'rosé', 'rood', 'zoet', 'versterkt'];
  const typeLabels = {
    mousserend: 'Mousserend & Champagne',
    wit: 'Witte wijnen',
    rosé: 'Rosé',
    oranje: 'Oranje wijnen',
    rood: 'Rode wijnen',
    zoet: 'Dessertwijnen',
    versterkt: 'Versterkte wijnen'
  };

  kelder.forEach(w => {
    const t = w.type || 'rood';
    const r = w.region || w.country || 'Overig';
    if (!grouped[t]) grouped[t] = {};
    if (!grouped[t][r]) grouped[t][r] = [];
    grouped[t][r].push(w);
  });

  let html = `<div class="toolbar">
    <h2 style="font-family:'Cormorant Garamond',serif; font-size:22px; color:var(--gold-bright); margin:0;">Wijnkaart</h2>
    <div style="font-size:12px; color:var(--text-faint);">Verkoopprijzen incl. ${settings.vatRate}% BTW</div>
    <button class="btn btn-primary" style="margin-left:auto;" onclick="printWijnkaart()">🖨 Printen</button>
    <button class="btn" onclick="exportWijnkaart()">⬇ Export PDF</button>
  </div>`;

  html += `<div id="wijnkaart-print">`;

  typeOrder.forEach(t => {
    if (!grouped[t]) return;
    html += `<div class="wine-list-section"><h3>${typeLabels[t]}</h3>`;
    const regions = Object.keys(grouped[t]).sort();
    regions.forEach(r => {
      html += `<div style="font-family:'Cormorant Garamond',serif; font-size:14px; color:var(--gold); font-style:italic; margin: 14px 0 8px 0; letter-spacing:0.05em;">${escapeHtml(r)}</div>`;
      const wines = grouped[t][r].sort((a,b) => (a.producer||'').localeCompare(b.producer||''));
      wines.forEach(w => {
        const prices = calcRestaurantPrices(w);
        html += `<div class="wine-list-item">
          <div>
            <div class="wine-list-name"><strong>${escapeHtml(w.producer || '')}</strong> ${escapeHtml(w.name || '')} ${w.vintage ? `<span style="color:var(--gold-dim);">${w.vintage}</span>` : ''}</div>
            <div class="wine-list-detail">${escapeHtml([w.grapes, w.alcohol ? w.alcohol + '%' : ''].filter(Boolean).join(' · '))}</div>
          </div>
          <div class="wine-list-stock">${w.bottles} fl.${prices.glassPrice > 0 ? ' · glas ' + fmtPrice(prices.glassPrice, false) : ''}</div>
          <div class="wine-list-price">${fmtPrice(prices.sellInVat, false)}</div>
        </div>`;
      });
    });
    html += `</div>`;
  });

  html += `</div>`;

  if (kelder.length === 0) html = emptyStateHtml('◈', 'Lege wijnkaart', 'Voeg wijnen toe aan je kelder.', 'Wijn toevoegen');

  main.innerHTML = html;
}

async function analyzeQuickPhoto() {
  if (!state.quickPhoto) { showToast('Eerst foto toevoegen', true); return; }
  if (!settings.apiKey) {
    showToast('Etiket-herkenning vereist een API-key — vul handmatig in of stel een sleutel in', true);
    setTimeout(openSettings, 1200);
    return;
  }
  const status = document.getElementById('qaAiStatus');
  status.className = 'ai-status';
  status.innerHTML = `<div class="ai-spinner"></div><div>Etiket wordt geanalyseerd...</div>`;
  try {
    const parsed = await callAIRecognition(state.quickPhoto);
    const name = [parsed.producer, parsed.name, parsed.vintage].filter(Boolean).join(' ');
    if (name) document.getElementById('qa_quickName').value = name;
    state.aiRecognizedData = parsed;
    status.className = 'ai-status success';
    status.innerHTML = `<div style="color:var(--green); font-size:18px;">✓</div><div>${escapeHtml(name || 'Etiket herkend')}${lastCallCostBadge()}</div>`;
  } catch (e) {
    status.className = 'ai-status error';
    status.innerHTML = `<div style="color:var(--danger); font-size:18px;">!</div><div>${escapeHtml(e.message)}</div>`;
  }
}

function quickSave(openDetailAfter = false) {
  const quickName = document.getElementById('qa_quickName').value.trim();
  const status = document.getElementById('qa_status').value;
  if (!state.quickPhoto && !quickName) { showToast('Voeg foto toe of vul naam in', true); return; }

  let producer = '', name = '', vintage = '';
  const aiData = state.aiRecognizedData || {};
  if (aiData.producer || aiData.name) {
    producer = aiData.producer || '';
    name = aiData.name || '';
    vintage = aiData.vintage || '';
  } else if (quickName) {
    const match = quickName.match(/\b(19|20)\d{2}\b/);
    if (match) {
      vintage = match[0];
      const rest = quickName.replace(match[0], '').trim();
      const parts = rest.split(/\s+/);
      if (parts.length > 1) {
        producer = parts.slice(0, Math.ceil(parts.length / 2)).join(' ');
        name = parts.slice(Math.ceil(parts.length / 2)).join(' ');
      } else producer = rest;
    } else producer = quickName;
  }

  const data = {
    id: uid(), status,
    photo: state.quickPhoto,
    producer, name, vintage,
    type: aiData.type || inferTypeFromName(quickName) || 'rood',
    country: aiData.country || '',
    region: aiData.region || '',
    grapes: aiData.grapes || '',
    alcohol: aiData.alcohol || '',
    classification: aiData.classification || '',
    drinkFrom: aiData.drinkFrom || '',
    drinkPeak: aiData.drinkPeak || '',
    drinkTo: aiData.drinkTo || '',
    pairings: aiData.pairings || '',
    servingTemp: aiData.servingTemp || '',
    decanting: aiData.decanting || '',
    bottles: status === 'kelder' || status === 'te-verkopen' ? 1 : 0,
    format: '0.75', closure: 'kurk', priority: '1',
    tastings: [], priceHistory: [],
    createdAt: new Date().toISOString(),
    updatedAt: new Date().toISOString()
  };

  state.wines.push(data);
  saveData();
  state.quickPhoto = null;
  state.aiRecognizedData = null;
  closeModal('quickAddModal');
  render();

  // Light validation feedback after save — non-blocking, just informational toast
  const issues = validateWineData(data);
  if (issues.sanity.length > 0) {
    showToast(`Toegevoegd · ${issues.sanity[0]}`, false);
  } else {
    showToast('Toegevoegd');
  }

  if (openDetailAfter) setTimeout(() => openEditWine(data.id), 300);
  // Gentle backup nudge after delay
  setTimeout(() => { if (typeof maybeShowExportReminder === 'function') maybeShowExportReminder(); }, 1500);
}

function updatePriceCalc() {
  const buyEx = Number(document.getElementById('f_purchasePrice').value) || 0;
  const margin = Number(document.getElementById('f_marginPct').value) || settings.defaultMarginPct;
  const glasses = Number(document.getElementById('f_glassFraction').value) || settings.defaultGlassFraction;
  const vat = Number(settings.vatRate) / 100;
  const sellEx = buyEx * (1 + margin / 100);
  const sellIn = sellEx * (1 + vat);
  const glass = glasses > 0 ? sellIn / glasses : 0;
  const calc = document.getElementById('priceCalc');
  if (calc) {
    calc.innerHTML = `<div style="display:grid; grid-template-columns:repeat(4,1fr); gap:12px; font-size:12px;">
      <div><div style="color:var(--gold-dim); font-size:10px; letter-spacing:0.1em; text-transform:uppercase;">Inkoop ex BTW</div><div style="font-family:'Cormorant Garamond',serif; font-size:16px; color:var(--text);">${fmtPrice(buyEx)}</div></div>
      <div><div style="color:var(--gold-dim); font-size:10px; letter-spacing:0.1em; text-transform:uppercase;">Verkoop ex</div><div style="font-family:'Cormorant Garamond',serif; font-size:16px; color:var(--text);">${fmtPrice(sellEx)}</div></div>
      <div><div style="color:var(--gold-dim); font-size:10px; letter-spacing:0.1em; text-transform:uppercase;">Kaartprijs incl ${settings.vatRate}%</div><div style="font-family:'Cormorant Garamond',serif; font-size:18px; color:var(--gold);">${fmtPrice(sellIn)}</div></div>
      <div><div style="color:var(--gold-dim); font-size:10px; letter-spacing:0.1em; text-transform:uppercase;">Per glas</div><div style="font-family:'Cormorant Garamond',serif; font-size:16px; color:var(--gold);">${fmtPrice(glass)}</div></div>
    </div>`;
  }
}

// ============ WINE VALIDATION ============
// Returns { blocking: [...], warnings: [...], sanity: [...] }
// blocking = save absolutely refused
// warnings = save allowed, surface non-blocking caveats (missing recommended fields)
// sanity = save allowed after user confirms (weird values like vintage 2050, drinkFrom > drinkTo)
function validateWineData(data) {
  const issues = { blocking: [], warnings: [], sanity: [] };
  const currentYear = new Date().getFullYear();

  // ----- BLOCKING -----
  if (!data.producer && !data.name) {
    issues.blocking.push('Vul minstens producent of naam in.');
  }
  if (!data.status) {
    issues.blocking.push('Kies een status (Wensenlijst, Kelder, etc.).');
  }

  // ----- WARNINGS (missing recommended fields) -----
  if (!data.vintage) {
    issues.warnings.push('Geen jaargang ingevuld — drinkvenster en zoeken werken minder goed.');
  }
  if (!data.type) {
    issues.warnings.push('Geen type (rood/wit/etc.) gekozen — pairing en filters werken minder goed.');
  }
  if (data.status === 'kelder' && !data.purchasePrice) {
    issues.warnings.push('Geen aankoopprijs voor wijn in kelder — portfolio-waarde wordt onderschat.');
  }
  if (data.status === 'kelder' && (!data.bottles || Number(data.bottles) === 0)) {
    issues.warnings.push('Status is "Kelder" maar aantal flessen is 0 of leeg.');
  }

  // ----- SANITY (suspicious values) -----
  const vintage = Number(data.vintage);
  if (data.vintage && !isNaN(vintage)) {
    if (vintage > currentYear + 1) {
      issues.sanity.push(`Jaargang ${vintage} ligt in de toekomst — typefout?`);
    }
    if (vintage < 1800) {
      issues.sanity.push(`Jaargang ${vintage} is onwaarschijnlijk oud — typefout?`);
    }
  }

  const dFrom = Number(data.drinkFrom);
  const dPeak = Number(data.drinkPeak);
  const dTo = Number(data.drinkTo);
  if (data.drinkFrom && data.drinkTo && !isNaN(dFrom) && !isNaN(dTo)) {
    if (dFrom > dTo) {
      issues.sanity.push(`Drinkvenster omgedraaid: van ${dFrom} tot ${dTo}. Vermoedelijk bedoeld: van ${dTo} tot ${dFrom}.`);
    }
  }
  if (data.drinkPeak && !isNaN(dPeak)) {
    if (data.drinkFrom && !isNaN(dFrom) && dPeak < dFrom) {
      issues.sanity.push(`Top-jaar ${dPeak} ligt vóór begin van drinkvenster (${dFrom}).`);
    }
    if (data.drinkTo && !isNaN(dTo) && dPeak > dTo) {
      issues.sanity.push(`Top-jaar ${dPeak} ligt ná einde van drinkvenster (${dTo}).`);
    }
  }

  // Negative values
  const checkNonNegative = (val, label) => {
    const n = Number(val);
    if (val !== '' && val != null && !isNaN(n) && n < 0) {
      issues.sanity.push(`${label} mag niet negatief zijn (${n}).`);
    }
  };
  checkNonNegative(data.bottles, 'Aantal flessen');
  checkNonNegative(data.purchasePrice, 'Aankoopprijs');
  checkNonNegative(data.marketPrice, 'Marktprijs');
  checkNonNegative(data.alcohol, 'Alcoholpercentage');
  checkNonNegative(data.minStock, 'Minimum voorraad');

  // Alcohol upper sanity (above 25% is fortified, but >50% is wrong)
  if (data.alcohol && !isNaN(Number(data.alcohol)) && Number(data.alcohol) > 50) {
    issues.sanity.push(`Alcoholpercentage ${data.alcohol}% is onwaarschijnlijk hoog voor wijn.`);
  }

  // Stock vs sales consistency (only for editing existing wines)
  if (data.id) {
    const sold = (state.sales || []).filter(s => s.wineId === data.id).reduce((sum, s) => sum + (Number(s.qty) || 0), 0);
    const currentBottles = Number(data.bottles) || 0;
    if (sold > 0 && currentBottles < 0) {
      issues.sanity.push(`Voorraad onder 0 (${currentBottles}fl) — verkoop overstijgt aankoop?`);
    }
  }

  return issues;
}

// Pretty modal for displaying validation issues
function showValidationModal(issues, onConfirm, onCancel) {
  const hasBlocking = issues.blocking.length > 0;
  const hasSanity = issues.sanity.length > 0;
  const hasWarnings = issues.warnings.length > 0;

  let html = `<div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">${hasBlocking ? 'Niet opgeslagen' : (hasSanity ? 'Controleer even' : 'Tip')}</h2>
      <button class="modal-close" onclick="closeValidationModal()">×</button>
    </div>
    <div class="modal-body">`;

  if (hasBlocking) {
    html += `<div style="margin-bottom: 18px;">
      <div style="font-family:'Cormorant Garamond',serif; font-size: 16px; color: var(--danger); margin-bottom: 10px;"><strong>De wijn kan zo niet bewaard worden:</strong></div>
      <ul style="margin-left: 18px; line-height: 1.7;">`;
    issues.blocking.forEach(msg => { html += `<li style="color: var(--text-soft); font-family:'Cormorant Garamond',serif;">${escapeHtml(msg)}</li>`; });
    html += `</ul></div>`;
  }

  if (hasSanity) {
    html += `<div style="margin-bottom: 18px;">
      <div style="font-family:'Cormorant Garamond',serif; font-size: 16px; color: var(--amber); margin-bottom: 10px;"><strong>Mogelijke typefouten:</strong></div>
      <ul style="margin-left: 18px; line-height: 1.7;">`;
    issues.sanity.forEach(msg => { html += `<li style="color: var(--text-soft); font-family:'Cormorant Garamond',serif;">${escapeHtml(msg)}</li>`; });
    html += `</ul></div>`;
  }

  if (hasWarnings && !hasBlocking) {
    html += `<div style="margin-bottom: 18px;">
      <div style="font-family:'Cormorant Garamond',serif; font-size: 14px; color: var(--text-dim); margin-bottom: 10px; font-style: italic;">Aandachtspunten (de wijn kan wel bewaard worden):</div>
      <ul style="margin-left: 18px; line-height: 1.7;">`;
    issues.warnings.forEach(msg => { html += `<li style="color: var(--text-dim); font-size: 14px; font-family:'Cormorant Garamond',serif;">${escapeHtml(msg)}</li>`; });
    html += `</ul></div>`;
  }

  html += `</div><div class="modal-footer">`;
  if (hasBlocking) {
    html += `<button class="btn" onclick="closeValidationModal()" style="margin-left:auto;">Terug naar formulier</button>`;
  } else {
    html += `<button class="btn" onclick="closeValidationModal()">Terug aanpassen</button>
             <button class="btn btn-primary" onclick="confirmValidationModal()" style="margin-left:auto;">Toch opslaan</button>`;
  }
  html += `</div></div>`;

  let backdrop = document.getElementById('validationModal');
  if (!backdrop) {
    backdrop = document.createElement('div');
    backdrop.id = 'validationModal';
    backdrop.className = 'modal-backdrop';
    document.body.appendChild(backdrop);
  }
  backdrop.innerHTML = html;
  backdrop.classList.add('active');
  state._validationOnConfirm = onConfirm;
  state._validationOnCancel = onCancel;
}

function closeValidationModal() {
  const m = document.getElementById('validationModal');
  if (m) m.classList.remove('active');
  if (state._validationOnCancel) state._validationOnCancel();
  state._validationOnConfirm = null;
  state._validationOnCancel = null;
}

function confirmValidationModal() {
  const m = document.getElementById('validationModal');
  if (m) m.classList.remove('active');
  const fn = state._validationOnConfirm;
  state._validationOnConfirm = null;
  state._validationOnCancel = null;

}

    },

    rating: state.currentRating,
    drinkDate: get('f_drinkDate'),

    rebuy: get('f_rebuy'),

    priceHistory: state.editingId ? (state.wines.find(w => w.id === state.editingId)?.priceHistory || []) : [],
    updatedAt: new Date().toISOString()
  };
  // Run validation
  const issues = validateWineData(data);
  if (issues.blocking.length > 0 || issues.sanity.length > 0 || issues.warnings.length > 0) {

    showValidationModal(issues,

function proceedSaveWine(data) {

  // Track price history
  const existing = state.editingId ? state.wines.find(w => w.id === state.editingId) : null;
  if (data.marketPrice && (!existing || existing.marketPrice !== data.marketPrice)) {
    data.priceHistory = data.priceHistory || [];
    data.priceHistory.push({ date: new Date().toISOString().slice(0,10), price: Number(data.marketPrice) });
  }

  if (state.editingId) {
    const idx = state.wines.findIndex(w => w.id === state.editingId);
    if (idx >= 0) { data.createdAt = state.wines[idx].createdAt; state.wines[idx] = data; }
  } else {
    data.createdAt = new Date().toISOString();
    state.wines.push(data);
  }
  saveData();
  closeModal('wineModal');
  render();
  showToast('Opgeslagen');
  // After a delay, gently nudge for backup if applicable (won't spam — only shows once per session)
  setTimeout(() => { if (typeof maybeShowExportReminder === 'function') maybeShowExportReminder(); }, 1500);
}

// ============ PHOTO ============
// Compressie-instellingen: kaarten tonen ~120px, detail ~400px. 1000px is ruim
// voldoende (ook voor AI-etiketherkenning) en houdt localStorage binnen
// Safari's ~5MB-limiet. Grotere/kwalitatievere opslag liep tegen quota aan.
const PHOTO_MAX_DIM = 1000;
const PHOTO_QUALITY = 0.72;

function recompressDataUrl(dataUrl, maxDim = PHOTO_MAX_DIM, quality = PHOTO_QUALITY) {
  return new Promise((resolve) => {
    let done = false;
    const finish = (val) => { if (!done) { done = true; resolve(val); } };
    // Vangnet: als de afbeelding om welke reden dan ook nooit laadt (webview die
    // data-URL's blokkeert, decode-fout zonder event), mag de import NOOIT hangen.
    const guard = setTimeout(() => finish(dataUrl), 3000);
    try {
      const img = new Image();
      img.onload = () => {
        clearTimeout(guard);
        try {
          let { width, height } = img;
          if (width > maxDim || height > maxDim) {
            const scale = maxDim / Math.max(width, height);
            width = Math.round(width * scale); height = Math.round(height * scale);
          }
          const canvas = document.createElement('canvas');
          canvas.width = width; canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.imageSmoothingEnabled = true;
          ctx.imageSmoothingQuality = 'high';
          ctx.drawImage(img, 0, 0, width, height);
          const out = canvas.toDataURL('image/jpeg', quality);
          // Behoud het origineel als hercompressie niet kleiner uitpakt
          finish(out.length < dataUrl.length ? out : dataUrl);
        } catch (e) { finish(dataUrl); }
      };
      img.onerror = () => { clearTimeout(guard); finish(dataUrl); };
      img.src = dataUrl;
    } catch (e) { clearTimeout(guard); finish(dataUrl); }
  });
}

// Hercomprimeer te grote wijnfoto's (bv. uit oudere back-ups die foto's op
// 1600px/0.88 bewaarden). Retourneert het aantal bespaarde tekens.
async function compressWinePhotos(wines, thresholdChars = 250 * 1024) {
  let saved = 0;
  for (const w of (wines || [])) {
    if (w.photo && typeof w.photo === 'string' && w.photo.length > thresholdChars) {
      const before = w.photo.length;
      w.photo = await recompressDataUrl(w.photo);
      saved += before - w.photo.length;
    }
  }
  return saved;
}

function loadPhotoFromFile(file, callback) {
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const maxDim = PHOTO_MAX_DIM;
      let { width, height } = img;
      if (width > maxDim || height > maxDim) {
        const scale = maxDim / Math.max(width, height);
        width *= scale; height *= scale;
      }
      canvas.width = width; canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(img, 0, 0, width, height);
      callback(canvas.toDataURL('image/jpeg', PHOTO_QUALITY));
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function handlePhotoUpload(e) {
  const file = e.target.files[0];
