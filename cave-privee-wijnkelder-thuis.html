<style>

:root {
  /* MOED core palette — refined */
  --bg: #050505;
  --bg-shade: #0a0807;
  --bg-elevated: #131110;
  --bg-card: #161210;
  --bg-input: #1c1815;
  --bg-glass: rgba(20, 16, 12, 0.6);

  --border: #2a221b;
  --border-soft: #1f1a14;
  --border-gold: #4a3d28;
  --border-gold-bright: #6b563a;

  /* Gold spectrum — warmer for Winery: wine in candlelight */
  --gold-deep: #8a6f3d;
  --gold-base: #b8954d;
  --gold: #d4b878;
  --gold-bright: #ebd5a3;
  --gold-pale: #f5e4bc;

  /* Wine accents */
  --wine: #722f37;
  --wine-deep: #4a1e24;
  --wine-bright: #a04450;

  /* Functional */
  --text: #ede4d3;
  --text-soft: #c9b89a;
  --text-dim: #8a7d68;
  --text-faint: #5a5142;

  --green: #7a9a5e;
  --green-bright: #a5c485;
  --amber: #d4a14a;
  --danger: #c4685a;
  --blue: #6a93b8;

  --shadow-gold: 0 0 0 1px rgba(212, 184, 120, 0.15);
  --shadow-deep: 0 24px 60px rgba(0, 0, 0, 0.6), 0 8px 24px rgba(0, 0, 0, 0.4);
  --shadow-card: 0 1px 0 rgba(212, 184, 120, 0.04) inset, 0 12px 32px rgba(0, 0, 0, 0.5);
}

/* ============ LIGHT THEME ============ */
/* Inspired by parchment / aged paper — warm cream with brown ink and wine accents */
[data-theme="light"] {
  --bg: #f5efe2;
  --bg-shade: #ede4d0;
  --bg-elevated: #faf5e8;
  --bg-card: #fffaf0;
  --bg-input: #fffaee;
  --bg-glass: rgba(245, 239, 226, 0.7);

  --border: #d4c5a3;
  --border-soft: #e3d6b7;
  --border-gold: #b8954d;
  --border-gold-bright: #a07a35;

  /* Gold spectrum — donkerder voor leesbaarheid op licht */
  --gold-deep: #6b4f1d;
  --gold-base: #8a6c2d;
  --gold: #a07a35;
  --gold-bright: #7a5520;
  --gold-pale: #5c3f15;

  --wine: #5a1f24;
  --wine-deep: #3a0f15;
  --wine-bright: #722f37;

  --text: #2a1f12;
  --text-soft: #4a3a25;
  --text-dim: #6f5d42;
  --text-faint: #9a8a70;

  --green: #4a6a3a;
  --green-bright: #5a7e48;
  --amber: #a07a35;
  --danger: #a13d2e;
  --blue: #3e6486;

  --shadow-gold: 0 0 0 1px rgba(138, 108, 45, 0.15);
  --shadow-deep: 0 8px 30px rgba(74, 58, 37, 0.15), 0 2px 10px rgba(74, 58, 37, 0.08);
  --shadow-card: 0 1px 0 rgba(255, 255, 255, 0.7) inset, 0 4px 18px rgba(74, 58, 37, 0.1);
}
/* Atmosfeer-laag: in licht modus subtiele warme parchment-textuur i.p.v. donker glow */
[data-theme="light"] body::before {
  background:
    radial-gradient(ellipse at 50% 0%, rgba(212, 184, 120, 0.12), transparent 70%),
    radial-gradient(ellipse at 50% 100%, rgba(184, 149, 77, 0.06), transparent 60%);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* Atmospheric layer — vintage candlelight glow */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 800px 600px at 15% 0%, rgba(212, 184, 120, 0.06), transparent 60%),
    radial-gradient(ellipse 700px 800px at 85% 100%, rgba(114, 47, 55, 0.08), transparent 60%),
    radial-gradient(circle at 50% 50%, rgba(212, 184, 120, 0.015), transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* Subtle paper-grain texture */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.015) 2px, rgba(0,0,0,0.015) 3px);
  pointer-events: none;
  z-index: 0;
  opacity: 0.5;
}

.app { position: relative; z-index: 1; }

/* ========== HEADER & BRANDING ========== */
header {
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(5,5,5,0.96) 0%, rgba(10,8,7,0.92) 100%);
  backdrop-filter: blur(24px);
  position: sticky;
  top: 0;
  z-index: 50;
  position: relative;
}
[data-theme="light"] header {
  background: linear-gradient(180deg, rgba(250, 245, 232, 0.96) 0%, rgba(237, 228, 208, 0.92) 100%);
}

/* Gold hairline under header */
header::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 50%;
  transform: translateX(-50%);
  width: 320px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-base), var(--gold), var(--gold-base), transparent);
  opacity: 0.45;
}

.header-inner {
  max-width: 1600px;
  margin: 0 auto;
  padding: 22px 36px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  flex-wrap: wrap;
}

/* === Logo === */
.brand {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.brand-top {
  display: flex;
  align-items: center;
  gap: 14px;
}

.brand-ornament {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--gold-base);
  font-size: 9px;
  letter-spacing: 0.3em;
}
.brand-ornament::before,
.brand-ornament::after {
  content: '';
  width: 14px;
  height: 1px;
  background: var(--gold-base);
  opacity: 0.6;
}

.brand-mark {
  font-family: 'Italiana', serif;
  font-size: 32px;
  letter-spacing: 0.32em;
  color: var(--gold);
  line-height: 1;
  text-shadow: 0 0 28px rgba(212, 184, 120, 0.15);
}
.brand-mark .brand-dot {
  color: var(--gold-base);
  margin-left: -0.22em; /* compenseert letter-spacing tussen M en · */
  margin-right: -0.05em; /* houdt · dicht bij OED */
  font-size: 22px;
  vertical-align: top;
  line-height: 1;
}

.brand-tier {
  font-family: 'Italiana', serif;
  font-size: 14px;
  letter-spacing: 0.35em;
  color: var(--gold-base);
  margin-left: 6px;
  padding-left: 14px;
  border-left: 1px solid var(--border-gold);
  line-height: 1;
}

.brand-tagline {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 12px;
  color: var(--text-dim);
  letter-spacing: 0.18em;
  text-transform: lowercase;
  padding-left: 30px;
}

/* === Mode Switch === */
.mode-switch {
  display: flex;
  background: var(--bg-input);
  border: 1px solid var(--border-gold);
  border-radius: 2px;
  padding: 3px;
  box-shadow: var(--shadow-gold);
  position: relative;
}
.mode-switch::before,
.mode-switch::after {
  content: '◆';
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  color: var(--gold-base);
  font-size: 6px;
}
.mode-switch::before { left: -14px; }
.mode-switch::after { right: -14px; }

.mode-btn {
  background: none;
  border: none;
  color: var(--text-dim);
  padding: 8px 18px;
  cursor: pointer;
  font-size: 11px;
  letter-spacing: 0.2em;
  border-radius: 1px;
  font-family: 'Inter', sans-serif;
  transition: all 0.25s ease;
  text-transform: uppercase;
  font-weight: 500;
  position: relative;
}
.mode-btn.active {
  background: linear-gradient(135deg, var(--gold-deep) 0%, var(--gold) 50%, var(--gold-base) 100%);
  color: #1a0f08;
  box-shadow:
    0 1px 0 rgba(255, 255, 255, 0.15) inset,
    0 -1px 0 rgba(0, 0, 0, 0.3) inset,
    0 0 16px rgba(212, 184, 120, 0.3);
  text-shadow: 0 1px 0 rgba(255, 255, 255, 0.2);
}
.mode-btn:not(.active):hover {
  color: var(--gold);
  background: rgba(212, 184, 120, 0.05);
}

.header-actions {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}

/* === Tabs === */
nav.tabs {
  max-width: 1600px;
  margin: 0 auto;
  padding: 0 36px;
  display: flex;
  gap: 2px;
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  scrollbar-width: none;
}
nav.tabs::-webkit-scrollbar { display: none; }

.tab {
  background: none;
  border: none;
  color: var(--text-dim);
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px;
  letter-spacing: 0.18em;
  padding: 18px 22px;
  cursor: pointer;
  position: relative;
  transition: all 0.25s ease;
  white-space: nowrap;
  text-transform: uppercase;
  font-weight: 400;
}
.tab:hover { color: var(--text-soft); }
.tab.active {
  color: var(--gold-bright);
  font-weight: 500;
}
.tab.active::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 22px;
  right: 22px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  box-shadow: 0 0 8px rgba(212, 184, 120, 0.4);
}
.tab.active::before {
  content: '◆';
  position: absolute;
  bottom: -3px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 5px;
  color: var(--gold);
}

.tab-count {
  display: inline-block;
  margin-left: 8px;
  padding: 2px 8px;
  background: rgba(212, 184, 120, 0.08);
  border: 1px solid var(--border-gold);
  border-radius: 12px;
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  color: var(--gold-base);
  letter-spacing: 0.05em;
  font-weight: 500;
}

main {
  max-width: 1600px;
  margin: 0 auto;
  padding: 32px 36px 60px;
}

/* === Buttons === */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: 1px solid var(--border-gold);
  background: var(--bg-glass);
  color: var(--text-soft);
  padding: 10px 18px;
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 400;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: all 0.25s ease;
  border-radius: 1px;
  white-space: nowrap;
  text-transform: uppercase;
  position: relative;
}
.btn:hover {
  border-color: var(--gold);
  background: rgba(212, 184, 120, 0.08);
  color: var(--gold-bright);
  box-shadow: 0 0 0 1px rgba(212, 184, 120, 0.12);
}

.btn-primary {
  background: linear-gradient(135deg, var(--gold-deep) 0%, var(--gold) 50%, var(--gold-base) 100%);
  color: #1a0f08;
  border-color: var(--gold);
  font-weight: 500;
  box-shadow:
    0 1px 0 rgba(255, 255, 255, 0.15) inset,
    0 0 24px rgba(212, 184, 120, 0.15);
  text-shadow: 0 1px 0 rgba(255, 255, 255, 0.15);
}
.btn-primary:hover {
  background: linear-gradient(135deg, var(--gold-base) 0%, var(--gold-bright) 50%, var(--gold) 100%);
  color: #0a0805;
  box-shadow:
    0 1px 0 rgba(255, 255, 255, 0.25) inset,
    0 0 32px rgba(212, 184, 120, 0.3);
}

.btn-danger {
  border-color: var(--danger);
  color: var(--danger);
}
.btn-danger:hover {
  background: rgba(196, 104, 90, 0.1);
  border-color: var(--danger);
  color: #d8826f;
}

.btn-sm { padding: 6px 12px; font-size: 11px; letter-spacing: 0.08em; }
.btn-icon {
  padding: 8px;
  width: 44px;
  height: 44px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
}
.btn-ghost { border-color: transparent; background: transparent; }
.btn-ghost:hover { border-color: var(--border-gold); }

/* Export/Import knoppen — meer aanwezig dan iconen */
.btn-export {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  font-size: 11px;
  letter-spacing: 0.1em;
  position: relative;
}
.btn-export-icon {
  font-size: 14px;
  color: var(--gold);
}
.btn-export-secondary {
  background: transparent;
}
.btn-export-secondary .btn-export-icon {
  color: var(--gold-base);
}
.btn-export:hover .btn-export-icon { color: var(--gold-bright); }

/* Waarschuwingsstip op de bewaar-knop als er geen recente back-up is */
.export-warn-dot {
  position: absolute;
  top: 4px; right: 4px;
  width: 8px; height: 8px;
  background: #c45a3a;
  border-radius: 50%;
  box-shadow: 0 0 0 2px var(--bg-elevated), 0 0 8px rgba(196, 90, 58, 0.6);
  animation: warnPulse 2s ease-in-out infinite;
}
@keyframes warnPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* Op mobiel: labels verbergen, alleen icoon laten zien */
@media (max-width: 900px) {
  .btn-export-label { display: none; }
  .btn-export { padding: 8px 10px; }
}

/* === Toolbar === */
.toolbar {
  display: flex;
  gap: 12px;
  align-items: center;
  margin-bottom: 26px;
  flex-wrap: wrap;
}

.search-box {
  flex: 1;
  min-width: 220px;
  position: relative;
}
.search-box input {
  width: 100%;
  background: var(--bg-input);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 11px 16px 11px 42px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px;
  font-style: italic;
  border-radius: 1px;
  transition: all 0.2s;
}
.search-box input::placeholder { color: var(--text-faint); }
.search-box input:focus {
  outline: none;
  border-color: var(--gold-base);
  background: var(--bg-input);
  box-shadow: 0 0 0 2px rgba(212, 184, 120, 0.25);
}
[data-theme="light"] .search-box input:focus {
  background: #fffaee;
  box-shadow: 0 0 0 2px rgba(138, 108, 45, 0.3);
}
.search-box::before {
  content: '⌕';
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--gold-base);
  font-size: 18px;
}

.filter-pill {
  background: var(--bg-input);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 8px 16px;
  border-radius: 20px;
  font-size: 11px;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
  font-weight: 500;
}
.filter-pill:hover {
  border-color: var(--border-gold);
  color: var(--text-soft);
}
.filter-pill.active {
  background: rgba(212, 184, 120, 0.1);
  border-color: var(--gold);
  color: var(--gold-bright);
  box-shadow: 0 0 0 1px rgba(212, 184, 120, 0.12);
}

.sort-select {
  background: var(--bg-input);
  border: 1px solid var(--border);
  color: var(--text-soft);
  padding: 8px 14px;
  border-radius: 1px;
  font-size: 12px;
  font-family: 'Inter', sans-serif;
  letter-spacing: 0.05em;
}

/* === Wine Cards === */
.wine-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 22px;
}

.wine-card {
  background: linear-gradient(180deg, var(--bg-card) 0%, var(--bg-shade) 100%);
  border: 1px solid var(--border);
  border-radius: 2px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  display: flex;
  flex-direction: column;
}
.wine-card:hover {
  border-color: var(--border-gold);
  transform: translateY(-3px);
  box-shadow: var(--shadow-card);
}
.wine-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent 10%, var(--gold-base) 30%, var(--gold) 50%, var(--gold-base) 70%, transparent 90%);
  opacity: 0;
  transition: opacity 0.3s;
  z-index: 1;
}
.wine-card:hover::before { opacity: 1; }

.wine-image {
  width: 100%;
  aspect-ratio: 4 / 3;
  background:
    radial-gradient(ellipse at center, #2a221a 0%, #14100b 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
[data-theme="light"] .wine-image {
  background:
    radial-gradient(ellipse at center, #ede0bd 0%, #d4c099 100%);
}
[data-theme="light"] .wine-image::after {
  background: linear-gradient(180deg, transparent 50%, rgba(74, 58, 37, 0.18) 100%);
}
.wine-image::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,0.4) 100%);
  pointer-events: none;
}
.wine-image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.wine-image-placeholder {
  font-family: 'Italiana', serif;
  font-size: 72px;
  color: var(--border-gold-bright);
  letter-spacing: 0.05em;
  opacity: 0.6;
}

.wine-type-badge {
  position: absolute;
  top: 12px;
  right: 12px;
  padding: 4px 10px;
  background: rgba(5, 5, 5, 0.88);
  backdrop-filter: blur(8px);
  border: 1px solid var(--border-gold);
  border-radius: 1px;
  font-size: 9px;
  color: var(--gold);
  letter-spacing: 0.25em;
  text-transform: uppercase;
  z-index: 2;
  font-weight: 500;
}
.wine-corked-badge {
  position: absolute;
  top: 12px;
  left: 12px;
  padding: 3px 9px;
  background: rgba(196, 104, 90, 0.9);
  color: white;
  border-radius: 1px;
  font-size: 10px;
  letter-spacing: 0.12em;
  z-index: 2;
  text-transform: uppercase;
}
.wine-status-badge {
  position: absolute;
  bottom: 12px;
  left: 12px;
  padding: 4px 10px;
  background: rgba(5, 5, 5, 0.92);
  backdrop-filter: blur(8px);
  border: 1px solid var(--border-gold);
  border-radius: 1px;
  font-size: 9px;
  color: var(--gold-bright);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  z-index: 2;
  font-weight: 500;
}
.wine-status-badge.sold {
  color: var(--green);
  border-color: var(--green);
  background: rgba(122, 154, 94, 0.15);
}
.wine-status-badge.for-sale {
  color: var(--amber);
  border-color: var(--amber);
  background: rgba(212, 161, 74, 0.12);
}

.wine-body {
  padding: 16px 18px 18px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 5px;
  position: relative;
}

.wine-producer {
  font-size: 10px;
  color: var(--gold-base);
  letter-spacing: 0.22em;
  text-transform: uppercase;
  font-weight: 500;
}
.wine-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  font-weight: 500;
  line-height: 1.15;
  color: var(--text);
  letter-spacing: 0.01em;
}
.wine-meta {
  display: flex;
  gap: 10px;
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 4px;
  align-items: center;
  flex-wrap: wrap;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
}
.wine-meta-divider {
  width: 3px;
  height: 3px;
  background: var(--gold-base);
  border-radius: 50%;
  opacity: 0.5;
}

.wine-footer {
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  position: relative;
}
.wine-footer::before {
  content: '◆';
  position: absolute;
  top: -4px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 6px;
  color: var(--gold-base);
  background: var(--bg-card);
  padding: 0 6px;
}

.wine-bottles {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px;
  color: var(--gold);
  font-weight: 500;
  line-height: 1;
}
.wine-bottles small {
  font-family: 'Inter', sans-serif;
  font-size: 9px;
  color: var(--text-faint);
  letter-spacing: 0.18em;
  margin-left: 3px;
  text-transform: uppercase;
  font-weight: 500;
}

.wine-location {
  font-size: 10px;
  color: var(--text-faint);
  font-style: italic;
  font-family: 'Cormorant Garamond', serif;
  letter-spacing: 0.05em;
}

.wine-rating {
  display: flex;
  align-items: center;
  gap: 2px;
}
.star {
  color: var(--gold);
  font-size: 14px;
  text-shadow: 0 0 4px rgba(212, 184, 120, 0.3);
}
.star.empty {
  color: var(--border-gold);
  text-shadow: none;
}
.rating-trend {
  font-size: 12px;
  margin-left: 4px;
  font-weight: 600;
}
.rating-trend.up { color: var(--green, #6fae6f); }
.rating-trend.down { color: var(--danger, #b5564f); }
.rating-trend.flat { color: var(--text-dim, #999); }

.window-status {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 10px;
  padding: 4px 9px;
  border-radius: 1px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-weight: 500;
  font-family: 'Inter', sans-serif;
}
.window-status::before {
  content: '';
  width: 5px;
  height: 5px;
  border-radius: 50%;
}
.window-ready { background: rgba(122, 154, 94, 0.15); color: var(--green-bright); }
.window-ready::before { background: var(--green); box-shadow: 0 0 6px rgba(122, 154, 94, 0.5); }
.window-peak { background: rgba(212, 184, 120, 0.18); color: var(--gold-bright); }
.window-peak::before { background: var(--gold); box-shadow: 0 0 8px rgba(212, 184, 120, 0.6); }
.window-aging { background: rgba(212, 161, 74, 0.12); color: var(--amber); }
.window-aging::before { background: var(--amber); }
.window-past { background: rgba(196, 104, 90, 0.12); color: var(--danger); }
.window-past::before { background: var(--danger); }
.window-unknown { background: var(--bg-input); color: var(--text-faint); }
.window-unknown::before { background: var(--text-faint); }

.rebuy-badge {
  display: inline-block;
  padding: 2px 8px;
  background: rgba(122, 154, 94, 0.15);
  color: var(--green-bright);
  border: 1px solid var(--green);
  border-radius: 10px;
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-left: 4px;
  font-weight: 500;
}
.allocation-badge {
  display: inline-block;
  padding: 2px 8px;
  background: rgba(106, 147, 184, 0.15);
  color: var(--blue);
  border: 1px solid var(--blue);
  border-radius: 10px;
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-weight: 500;
}

/* === Empty State === */
.empty-state {
  text-align: center;
  padding: 90px 30px;
  color: var(--text-faint);
}
.empty-state-icon {
  font-family: 'Italiana', serif;
  font-size: 84px;
  color: var(--border-gold-bright);
  margin-bottom: 20px;
  opacity: 0.5;
}
.empty-state h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px;
  font-weight: 400;
  color: var(--text-soft);
  margin-bottom: 12px;
  letter-spacing: 0.04em;
}
.empty-state p {
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px;
  font-style: italic;
  max-width: 420px;
  margin: 0 auto 28px;
  line-height: 1.7;
  color: var(--text-dim);
}

/* === Modals === */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.82);
  backdrop-filter: blur(12px);
  z-index: 100;
  display: none;
  align-items: flex-start;
  justify-content: center;
  padding: 18px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.modal-backdrop.active { display: flex; }
[data-theme="light"] .modal-backdrop {
  background: rgba(74, 58, 37, 0.4);
}

.modal {
  background: var(--bg-elevated);
  border: 1px solid var(--border-gold);
  border-radius: 3px;
  max-width: 960px;
  width: 100%;
  position: relative;
  box-shadow: var(--shadow-deep);
  margin: auto;
  /* Modal must never exceed viewport height — body scrolls internally */
  max-height: calc(100vh - 36px);
  max-height: calc(100dvh - 36px);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.modal::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-base), var(--gold), var(--gold-base), transparent);
}
.modal-narrow { max-width: 620px; }
.modal-wide { max-width: 1220px; }

.modal-header {
  padding: 22px 32px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--bg-elevated);
  z-index: 2;
  border-radius: 3px 3px 0 0;
  flex-shrink: 0;
}
.modal-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px;
  font-weight: 500;
  color: var(--gold-bright);
  letter-spacing: 0.04em;
}
.modal-close {
  background: none;
  border: 1px solid transparent;
  color: var(--text-dim);
  font-size: 24px;
  cursor: pointer;
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 1px;
  transition: all 0.2s;
}
.modal-close:hover {
  color: var(--gold);
  background: var(--bg-input);
  border-color: var(--border-gold);
}
.modal-body {
  padding: 28px 32px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  flex: 1 1 auto;
  min-height: 0; /* needed for flex children to allow shrink/scroll */
}
.modal-footer {
  padding: 20px 32px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
  background: var(--bg-shade);
  border-radius: 0 0 3px 3px;
  flex-shrink: 0;
}

/* === Form === */
.form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
.form-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
.form-grid.cols-4 { grid-template-columns: repeat(4, 1fr); }
.form-row { grid-column: 1 / -1; }

.field { display: flex; flex-direction: column; gap: 6px; }
.field label {
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--gold-base);
  text-transform: uppercase;
  font-weight: 500;
  font-family: 'Inter', sans-serif;
}
.field input,
.field select,
.field textarea {
  background: var(--bg-input);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 12px;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  border-radius: 1px;
  transition: all 0.2s;
  font-weight: 300;
}
.field input:focus,
.field select:focus,
.field textarea:focus {
  outline: none;
  border-color: var(--gold-base);
  background: var(--bg-input);
  box-shadow: 0 0 0 2px rgba(212, 184, 120, 0.25);
}
[data-theme="light"] .field input:focus,
[data-theme="light"] .field select:focus,
[data-theme="light"] .field textarea:focus {
  background: #fffaee;
  box-shadow: 0 0 0 2px rgba(138, 108, 45, 0.3);
}
.field textarea {
  resize: vertical;
  min-height: 70px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px;
  line-height: 1.5;
}
.field-hint {
  font-size: 10px;
  color: var(--text-faint);
  font-style: italic;
  font-family: 'Cormorant Garamond', serif;
}

/* === Section headers === */
.section-header {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  font-weight: 500;
  color: var(--gold);
  margin: 26px 0 14px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border-gold);
  letter-spacing: 0.08em;
  display: flex;
  align-items: center;
  gap: 12px;
  text-transform: uppercase;
}
.section-header::before {
  content: '◆';
  font-size: 8px;
  color: var(--gold-base);
}
.section-header:first-child { margin-top: 0; }

.collapsible {
  border: 1px solid var(--border);
  border-radius: 2px;
  margin: 20px 0;
  overflow: hidden;
}
.collapsible-header {
  padding: 14px 18px;
  background: var(--bg-input);
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px;
  color: var(--gold);
  letter-spacing: 0.08em;
  transition: all 0.2s;
  text-transform: uppercase;
  font-weight: 500;
}
.collapsible-header:hover {
  background: rgba(212, 184, 120, 0.06);
}
.collapsible-header::after {
  content: '+';
  font-size: 22px;
  color: var(--gold-base);
  transition: transform 0.2s;
  font-weight: 300;
}
.collapsible.open .collapsible-header::after {
  transform: rotate(45deg);
}
.collapsible-body {
  display: none;
  padding: 20px 18px;
  background: var(--bg-card);
}
.collapsible.open .collapsible-body { display: block; }

/* === Photo upload & crop === */
.photo-upload {
  border: 1px dashed var(--border-gold);
  border-radius: 3px;
  padding: 28px;
  text-align: center;
  background: var(--bg-input);
  cursor: pointer;
  transition: all 0.25s;
  position: relative;
  min-height: 200px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.photo-upload:hover {
  border-color: var(--gold);
  background: rgba(212, 184, 120, 0.04);
}
.photo-upload.has-image {
  padding: 0;
  border-style: solid;
  overflow: hidden;
  display: block;
}
.photo-upload.has-image img {
  width: 100%;
  max-height: 360px;
  object-fit: contain;
  display: block;
  background: var(--bg);
}
.photo-upload input[type="file"] { display: none; }

.photo-icon {
  font-family: 'Italiana', serif;
  font-size: 52px;
  color: var(--gold-base);
  margin-bottom: 8px;
  opacity: 0.7;
}
.photo-placeholder-content p {
  color: var(--text-soft);
  font-size: 15px;
  margin-bottom: 5px;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
}
.photo-placeholder-content small {
  color: var(--text-faint);
  font-size: 12px;
  letter-spacing: 0.05em;
}
.photo-toolbar {
  display: flex;
  gap: 10px;
  padding: 11px;
  background: var(--bg-elevated);
  border-top: 1px solid var(--border-gold);
  justify-content: center;
  flex-wrap: wrap;
}

.crop-container {
  position: relative;
  display: inline-block;
  max-width: 100%;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
}
.crop-container img {
  display: block;
  max-width: 100%;
  max-height: 70vh;
  pointer-events: none;
}
.crop-overlay {
  position: absolute;
  inset: 0;
  cursor: crosshair;
}
.crop-box {
  position: absolute;
  border: 2px solid var(--gold);
  box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.6);
  cursor: move;
}
.crop-handle {
  position: absolute;
  width: 14px;
  height: 14px;
  background: var(--gold);
  border: 2px solid var(--bg);
  border-radius: 50%;
}
.crop-handle.nw { top: -8px; left: -8px; cursor: nw-resize; }
.crop-handle.ne { top: -8px; right: -8px; cursor: ne-resize; }
.crop-handle.sw { bottom: -8px; left: -8px; cursor: sw-resize; }
.crop-handle.se { bottom: -8px; right: -8px; cursor: se-resize; }

/* === AI status === */
.ai-status {
  background: linear-gradient(135deg, rgba(212, 184, 120, 0.08) 0%, rgba(114, 47, 55, 0.05) 100%);
  border: 1px solid var(--border-gold);
  padding: 14px 18px;
  border-radius: 2px;
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 14px;
  font-size: 13px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px;
  font-style: italic;
}
.ai-status.error { border-color: var(--danger); background: rgba(196, 104, 90, 0.08); }
.ai-status.success { border-color: var(--green); background: rgba(122, 154, 94, 0.08); }
.ai-spinner {
  width: 20px;
  height: 20px;
  border: 2px solid var(--border-gold);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* === Rating === */
.rating-input { display: flex; gap: 4px; }
.rating-input button {
  background: none;
  border: none;
  color: var(--border-gold);
  font-size: 28px;
  cursor: pointer;
  padding: 0;
  line-height: 1;
  transition: all 0.15s;
}
.rating-input button:hover { transform: scale(1.15); color: var(--gold-base); }
.rating-input button.active {
  color: var(--gold);
  text-shadow: 0 0 8px rgba(212, 184, 120, 0.4);
}

/* === Stats === */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 32px;
}
.stat-card {
  background: linear-gradient(180deg, var(--bg-card) 0%, var(--bg-shade) 100%);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 22px 24px;
  position: relative;
  overflow: hidden;
  transition: all 0.25s;
}
.stat-card:hover {
  border-color: var(--border-gold);
}
.stat-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 3px;
  height: 100%;
  background: linear-gradient(180deg, var(--gold-base), var(--gold));
  box-shadow: 0 0 12px rgba(212, 184, 120, 0.3);
}
.stat-card.accent-green::before {
  background: linear-gradient(180deg, var(--green), var(--green-bright));
  box-shadow: 0 0 12px rgba(122, 154, 94, 0.3);
}
.stat-card.accent-blue::before {
  background: linear-gradient(180deg, #4a7ba8, var(--blue));
  box-shadow: 0 0 12px rgba(106, 147, 184, 0.3);
}
.stat-card.accent-amber::before {
  background: linear-gradient(180deg, #b8841f, var(--amber));
  box-shadow: 0 0 12px rgba(212, 161, 74, 0.3);
}
.stat-card.accent-danger::before {
  background: linear-gradient(180deg, #8b4234, var(--danger));
  box-shadow: 0 0 12px rgba(196, 104, 90, 0.3);
}

.stat-label {
  font-size: 10px;
  color: var(--gold-base);
  letter-spacing: 0.22em;
  text-transform: uppercase;
  margin-bottom: 8px;
  font-weight: 500;
  font-family: 'Inter', sans-serif;
}
.stat-value {
  font-family: 'Cormorant Garamond', serif;
  font-size: 36px;
  font-weight: 500;
  color: var(--text);
  line-height: 1;
  letter-spacing: 0.01em;
}
.stat-value small {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 13px;
  color: var(--text-dim);
  font-weight: 300;
  margin-left: 8px;
}
.stat-trend {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 8px;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
}
.stat-trend.up { color: var(--green-bright); font-style: normal; font-family: 'Inter', sans-serif; letter-spacing: 0.05em; }
.stat-trend.down { color: var(--danger); font-style: normal; font-family: 'Inter', sans-serif; letter-spacing: 0.05em; }

/* === Dashboard sections === */
.dashboard-section { margin-bottom: 36px; }
.dashboard-section h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 500;
  color: var(--gold-bright);
  margin-bottom: 16px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  display: flex;
  align-items: baseline;
  gap: 14px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border-gold);
  position: relative;
}
.dashboard-section h2::before {
  content: '◆';
  font-size: 8px;
  color: var(--gold-base);
  margin-right: -4px;
}
.dashboard-section h2 small {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 13px;
  color: var(--text-dim);
  font-weight: 400;
  letter-spacing: 0.04em;
  text-transform: none;
}
.dashboard-section h2 .section-action {
  margin-left: auto;
  font-size: 11px;
}

/* === Notifications === */
.notification-list { display: grid; gap: 10px; }
.notification {
  background: linear-gradient(90deg, var(--bg-card) 0%, var(--bg-shade) 100%);
  border: 1px solid var(--border);
  border-left: 3px solid var(--gold);
  padding: 14px 18px;
  border-radius: 1px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  cursor: pointer;
  transition: all 0.2s;
}
.notification:hover {
  border-color: var(--border-gold);
  border-left-color: var(--gold-bright);
  background: linear-gradient(90deg, rgba(212, 184, 120, 0.04) 0%, var(--bg-shade) 100%);
}
.notification.urgent { border-left-color: var(--danger); }
.notification.aging { border-left-color: var(--amber); }
.notification.peak { border-left-color: var(--gold-bright); }
.notification.info { border-left-color: var(--blue); }
.notification.success { border-left-color: var(--green); }

.notification-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px;
  color: var(--text);
  letter-spacing: 0.01em;
}
.notification-text small {
  font-family: 'Cormorant Garamond', serif;
  display: block;
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 3px;
  font-style: italic;
}
.notification-meta {
  font-size: 12px;
  color: var(--gold-base);
  text-align: right;
  flex-shrink: 0;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
}

/* === Tasting entries === */
.tasting-entry {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-left: 2px solid var(--gold-base);
  border-radius: 2px;
  padding: 14px 18px;
  margin-bottom: 10px;
}
.claude-note {
  background: linear-gradient(135deg, rgba(212,184,120,0.05), rgba(114,47,55,0.03));
  border: 1px solid var(--border-gold);
  border-left: 2px solid var(--gold-bright);
  border-radius: 2px;
  padding: 14px 18px;
  margin-bottom: 10px;
}
.claude-note-empty {
  background: var(--bg-card);
  border-style: dashed;
  border-left-style: solid;
}
.claude-note-head {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}
.claude-note-badge {
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--gold-bright);
  padding: 2px 8px;
  border: 1px solid var(--gold-base);
  border-radius: 8px;
  background: rgba(212,184,120,0.08);
}
.claude-note-quality, .claude-note-readiness {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 13px;
  color: var(--gold);
}
.claude-note-readiness { color: var(--text-dim); }
.claude-note-body {
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px;
  line-height: 1.65;
  color: var(--text);
}
.claude-note-body p { margin: 0 0 9px; }
.claude-note-body p:last-child { margin-bottom: 0; }
.claude-note-sect {
  color: var(--gold-bright);
  font-weight: 600;
  letter-spacing: 0.02em;
}

.tasting-entry-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 6px;
  flex-wrap: wrap;
  gap: 10px;
}
.tasting-date {
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px;
  color: var(--gold);
  font-style: italic;
}
.tasting-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 14px;
  line-height: 1.6;
  color: var(--text);
}
.tasting-text strong {
  color: var(--gold-bright);
  font-weight: 500;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  font-size: 11px;
  font-family: 'Inter', sans-serif;
}
.tasting-meta {
  font-size: 10px;
  color: var(--text-faint);
  margin-top: 6px;
  letter-spacing: 0.05em;
  font-style: italic;
  font-family: 'Cormorant Garamond', serif;
}

/* === Detail view === */
.detail-hero {
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 26px;
  margin-bottom: 20px;
}
.detail-hero-photo {
  width: 100%;
  aspect-ratio: 3 / 4;
  background: radial-gradient(ellipse at center, #2a221a 0%, #14100b 100%);
  border-radius: 3px;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  border: 1px solid var(--border-gold);
}
.detail-hero-photo::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, transparent 60%, rgba(0,0,0,0.4) 100%);
  pointer-events: none;
}
.detail-hero-photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.detail-hero-photo .empty-photo {
  font-family: 'Italiana', serif;
  font-size: 84px;
  color: var(--border-gold-bright);
  opacity: 0.5;
}
.detail-hero-info {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.detail-headline {
  font-family: 'Cormorant Garamond', serif;
  font-size: 30px;
  line-height: 1.1;
  color: var(--text);
  letter-spacing: 0.01em;
  font-weight: 500;
}
.detail-headline-producer {
  font-size: 11px;
  color: var(--gold-base);
  letter-spacing: 0.28em;
  text-transform: uppercase;
  margin-bottom: 6px;
  font-weight: 500;
}
.detail-tagline {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  color: var(--text-soft);
  font-size: 15px;
  letter-spacing: 0.02em;
}
.detail-key-stats {
  display: flex;
  gap: 22px;
  margin-top: 12px;
  flex-wrap: wrap;
}
.detail-key-stat .key {
  font-size: 9px;
  color: var(--gold-base);
  letter-spacing: 0.22em;
  text-transform: uppercase;
  font-weight: 500;
}
.detail-key-stat .val {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  color: var(--gold);
  margin-top: 4px;
  font-weight: 500;
  letter-spacing: 0.01em;
}
.detail-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  gap: 14px;
}
.detail-label {
  font-size: 10px;
  color: var(--gold-base);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  flex-shrink: 0;
  font-weight: 500;
}
.detail-value {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px;
  color: var(--text);
  text-align: right;
  letter-spacing: 0.01em;
}
.detail-value.value-large {
  font-size: 20px;
  color: var(--gold);
  font-weight: 500;
}

/* === Radar === */
.radar-container {
  display: flex;
  justify-content: center;
  padding: 12px;
}
.radar-svg {
  max-width: 360px;
  width: 100%;
}
.radar-grid {
  stroke: var(--border-gold);
  fill: none;
}
.radar-axis {
  stroke: var(--border);
  stroke-width: 1;
}
.radar-area {
  fill: url(#radarGrad);
  stroke: var(--gold);
  stroke-width: 2;
  fill-opacity: 0.4;
  filter: drop-shadow(0 0 6px rgba(212, 184, 120, 0.3));
}
.radar-point {
  fill: var(--gold-bright);
}
.radar-label {
  fill: var(--text-dim);
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 13px;
  text-anchor: middle;
}

/* === Charts === */
.chart-card {
  background: linear-gradient(180deg, var(--bg-card) 0%, var(--bg-shade) 100%);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 24px 26px;
  position: relative;
}
.chart-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 32px;
  right: 32px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-base), transparent);
}
.chart-card h3 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  color: var(--gold-bright);
  margin-bottom: 16px;
  letter-spacing: 0.1em;
  display: flex;
  justify-content: space-between;
  align-items: center;
  text-transform: uppercase;
  font-weight: 500;
}
.chart-card h3 small {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 12px;
  color: var(--text-dim);
  font-weight: 400;
  letter-spacing: 0.04em;
  text-transform: none;
}
.charts-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
  margin-bottom: 26px;
}
.charts-grid.cols-1 { grid-template-columns: 1fr; }

/* === Donut === */
.donut-wrap {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
  align-items: center;
}
.donut-svg {
  width: 100%;
  max-width: 240px;
}
.donut-legend {
  display: flex;
  flex-direction: column;
  gap: 8px;
  font-size: 13px;
}
.donut-legend-item {
  display: flex;
  align-items: center;
  gap: 10px;
}
.donut-legend-color {
  width: 12px;
  height: 12px;
  border-radius: 1px;
  flex-shrink: 0;
}
.donut-legend-label {
  color: var(--text-dim);
  flex: 1;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
}
.donut-legend-value {
  color: var(--gold);
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px;
  font-weight: 500;
}

/* === Bars === */
.bar-chart { display: flex; flex-direction: column; gap: 8px; }
.bar-row {
  display: grid;
  grid-template-columns: 100px 1fr 70px;
  gap: 12px;
  align-items: center;
  font-size: 13px;
}
.bar-label {
  color: var(--text-dim);
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
}
.bar-track {
  background: var(--bg-input);
  height: 20px;
  border-radius: 1px;
  overflow: hidden;
  position: relative;
  border: 1px solid var(--border-soft);
}
.bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold-deep), var(--gold), var(--gold-bright));
  border-radius: 1px;
  transition: width 0.5s ease;
  min-width: 2px;
  box-shadow: 0 0 8px rgba(212, 184, 120, 0.2);
}
.bar-fill.green { background: linear-gradient(90deg, var(--green), var(--green-bright)); }
.bar-fill.amber { background: linear-gradient(90deg, #b8801f, var(--amber)); }
.bar-fill.danger { background: linear-gradient(90deg, #8b3a2c, var(--danger)); }
.bar-value {
  color: var(--gold);
  text-align: right;
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px;
  font-weight: 500;
}

/* === Vintage chart === */
.vintage-chart {
  display: flex;
  gap: 3px;
  align-items: flex-end;
  height: 180px;
  padding: 0 4px;
  overflow-x: auto;
}
.vintage-bar {
  flex: 1;
  min-width: 20px;
  background: var(--gold-deep);
  border-radius: 1px 1px 0 0;
  position: relative;
  cursor: pointer;
  transition: all 0.2s;
}
.vintage-bar:hover {
  background: var(--gold);
  box-shadow: 0 0 12px rgba(212, 184, 120, 0.3);
}
.vintage-bar .vintage-label {
  position: absolute;
  bottom: -24px;
  left: 0;
  right: 0;
  text-align: center;
  font-size: 9px;
  color: var(--text-faint);
  transform: rotate(-45deg);
  transform-origin: center;
  white-space: nowrap;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
}
.vintage-bar .vintage-tooltip {
  position: absolute;
  bottom: 100%;
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg-elevated);
  border: 1px solid var(--gold-base);
  padding: 5px 10px;
  border-radius: 1px;
  font-size: 11px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
  margin-bottom: 6px;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  color: var(--gold);
  z-index: 5;
}
.vintage-bar:hover .vintage-tooltip { opacity: 1; }
.vintage-bar.ready { background: var(--green); }
.vintage-bar.peak { background: var(--gold-bright); }
.vintage-bar.aging { background: var(--amber); }
.vintage-bar.past { background: var(--danger); }

/* === Entity rows === */
.entity-row {
  display: grid;
  grid-template-columns: 1fr 90px 90px 110px 110px;
  gap: 16px;
  align-items: center;
  padding: 14px 18px;
  background: linear-gradient(90deg, var(--bg-card) 0%, var(--bg-shade) 100%);
  border: 1px solid var(--border);
  border-radius: 1px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: all 0.2s;
}
.entity-row:hover {
  border-color: var(--border-gold);
  background: linear-gradient(90deg, rgba(212, 184, 120, 0.04) 0%, var(--bg-shade) 100%);
}
.entity-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px;
  color: var(--text);
  letter-spacing: 0.02em;
}
.entity-name small {
  display: block;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 12px;
  color: var(--text-faint);
  margin-top: 3px;
}
.entity-stat { text-align: right; }
.entity-stat .num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px;
  color: var(--gold);
  font-weight: 500;
}
.entity-stat .lbl {
  font-size: 9px;
  color: var(--gold-base);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-weight: 500;
}

/* === Wijnkaart === */
.wine-list-section { margin-bottom: 32px; }
.wine-list-section h3 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  color: var(--gold-bright);
  margin-bottom: 16px;
  letter-spacing: 0.18em;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border-gold);
  text-transform: uppercase;
  font-weight: 500;
  text-align: center;
  position: relative;
}
.wine-list-section h3::before,
.wine-list-section h3::after {
  content: '◆';
  font-size: 10px;
  color: var(--gold-base);
  margin: 0 14px;
  vertical-align: middle;
}

.wine-list-item {
  display: grid;
  grid-template-columns: 1fr auto auto;
  gap: 18px;
  padding: 12px 0;
  align-items: baseline;
  border-bottom: 1px dotted var(--border-gold);
}
.wine-list-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px;
  color: var(--text);
  letter-spacing: 0.02em;
}
.wine-list-name strong {
  color: var(--gold);
  font-weight: 500;
  letter-spacing: 0.04em;
}
.wine-list-detail {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 3px;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
}
.wine-list-price {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  color: var(--gold);
  white-space: nowrap;
  font-weight: 500;
}
.wine-list-stock {
  font-size: 11px;
  color: var(--text-faint);
  white-space: nowrap;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
}

/* === Tables === */
.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.data-table th,
.data-table td {
  padding: 11px 14px;
  border-bottom: 1px solid var(--border);
  text-align: left;
}
.data-table th {
  font-size: 10px;
  color: var(--gold-base);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-weight: 500;
  font-family: 'Inter', sans-serif;
}
.data-table td {
  color: var(--text);
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px;
  letter-spacing: 0.01em;
}
.data-table tr:hover { background: rgba(212, 184, 120, 0.04); }
.data-table .num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px;
  text-align: right;
  font-weight: 500;
}
.data-table .pos { color: var(--green-bright); }
.data-table .neg { color: var(--danger); }

/* === AI insight card === */
.ai-insight-card {
  background: linear-gradient(135deg, rgba(212, 184, 120, 0.06) 0%, rgba(114, 47, 55, 0.04) 100%);
  border: 1px solid var(--border-gold);
  border-radius: 2px;
  padding: 24px 26px;
  margin-bottom: 18px;
  position: relative;
}
.ai-insight-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.ai-insight-card h3 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 19px;
  color: var(--gold-bright);
  margin-bottom: 14px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-weight: 500;
  display: flex;
  align-items: baseline;
  gap: 12px;
}
.ai-insight-card h3::before {
  content: '◆';
  font-size: 9px;
  color: var(--gold-base);
}
.ai-insight-card .insight-content {
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px;
  line-height: 1.75;
  color: var(--text);
  white-space: pre-wrap;
  letter-spacing: 0.01em;
}

/* === Budget bar === */
.budget-bar {
  background: var(--bg-input);
  height: 28px;
  border-radius: 1px;
  overflow: hidden;
  position: relative;
  border: 1px solid var(--border-soft);
}
.budget-fill {
  background: linear-gradient(90deg, var(--gold-deep), var(--gold), var(--gold-bright));
  height: 100%;
  border-radius: 1px;
  transition: width 0.5s;
  display: flex;
  align-items: center;
  padding: 0 12px;
  font-size: 13px;
  color: #1a0f08;
  font-weight: 500;
  font-family: 'Cormorant Garamond', serif;
  letter-spacing: 0.04em;
  box-shadow: 0 0 12px rgba(212, 184, 120, 0.3);
}
.budget-fill.over {
  background: linear-gradient(90deg, #8b3a2c, var(--danger));
  color: white;
}

/* === Settings === */
.settings-section { margin-bottom: 26px; }
.settings-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
  gap: 16px;
}
.settings-row:last-child { border-bottom: none; }
.settings-label {
  font-size: 14px;
  color: var(--text);
  font-family: 'Cormorant Garamond', serif;
  letter-spacing: 0.02em;
}
.settings-desc {
  font-size: 12px;
  color: var(--text-faint);
  margin-top: 4px;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
}

/* === Toast === */
.toast {
  position: fixed;
  bottom: 26px;
  right: 26px;
  background: var(--bg-elevated);
  border: 1px solid var(--gold);
  color: var(--text);
  padding: 14px 22px;
  border-radius: 2px;
  font-size: 13px;
  z-index: 200;
  transform: translateY(140%);
  transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 12px 28px rgba(0, 0, 0, 0.5), 0 0 24px rgba(212, 184, 120, 0.15);
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px;
  font-style: italic;
  letter-spacing: 0.02em;
}
.toast.show { transform: translateY(0); }
.toast.error { border-color: var(--danger); }

/* === Responsive === */
@media (max-width: 900px) {
  .charts-grid { grid-template-columns: 1fr; }
  .entity-row { grid-template-columns: 1fr; gap: 6px; }
  .entity-stat { text-align: left; }
}

/* ========== MOBILE NAVIGATION ========== */
/* Default: hide bottom nav and FAB on desktop */
.bottom-nav, .fab, .mobile-drawer, .mobile-drawer-backdrop {
  display: none;
}

/* Hamburger button shown in tab bar on mobile — hidden on desktop */
.tab.mobile-more { display: none; }

@media (max-width: 900px) {
  /* Bottom navigation bar — fixed at viewport bottom */
  .bottom-nav {
    display: flex;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(180deg, rgba(20, 16, 12, 0.96) 0%, rgba(10, 8, 7, 0.98) 100%);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border-gold);
    z-index: 80;
    /* Safe area for iPhones with home indicator */
    padding-bottom: env(safe-area-inset-bottom, 0);
    box-shadow: 0 -8px 24px rgba(0,0,0,0.4);
  }
  [data-theme="light"] .bottom-nav {
    background: linear-gradient(180deg, rgba(250, 245, 232, 0.96) 0%, rgba(237, 228, 208, 0.98) 100%);
    box-shadow: 0 -4px 18px rgba(74, 58, 37, 0.1);
  }
  .bottom-nav-item {
    flex: 1;
    background: transparent;
    border: none;
    padding: 10px 4px 12px;
    color: var(--text-dim);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    letter-spacing: 0.05em;
    transition: color 0.15s;
    min-height: 56px; /* Apple HIG: 44pt minimum tap target */
    position: relative;
  }
  .bottom-nav-item .bnav-icon {
    font-size: 20px;
    line-height: 1;
    font-family: 'Italiana', serif;
    color: var(--gold-base);
    transition: color 0.15s;
  }
  .bottom-nav-item.active {
    color: var(--gold-bright);
  }
  .bottom-nav-item.active .bnav-icon {
    color: var(--gold);
  }
  .bottom-nav-item.active::before {
    content: '';
    position: absolute;
    top: 0;
    left: 30%;
    right: 30%;
    height: 2px;
    background: var(--gold);
  }
  .bottom-nav-item .bnav-badge {
    position: absolute;
    top: 4px;
    right: 50%;
    transform: translateX(14px);
    background: var(--gold);
    color: var(--bg);
    font-size: 9px;
    font-weight: 600;
    border-radius: 8px;
    padding: 1px 5px;
    min-width: 14px;
    text-align: center;
    line-height: 1.3;
  }

  /* Floating action button */
  .fab {
    display: flex;
    position: fixed;
    bottom: calc(70px + env(safe-area-inset-bottom, 0));
    right: 18px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-bright) 100%);
    border: none;
    color: var(--bg);
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 79;
    box-shadow: 0 6px 20px rgba(212, 184, 120, 0.4), 0 2px 8px rgba(0,0,0,0.3);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .fab:active {
    transform: scale(0.95);
  }
  .fab-icon {
    font-size: 28px;
    font-weight: 300;
    line-height: 1;
    color: #1a1410;
  }

  /* Hide bottom nav + FAB when modal is open (avoid overlap) */
  body:has(.modal-backdrop.active) .bottom-nav,
  body:has(.modal-backdrop.active) .fab {
    display: none;
  }

  /* Mobile drawer (hamburger menu) */
  .mobile-drawer-backdrop {
    display: block;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 99;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .mobile-drawer-backdrop.active {
    opacity: 1;
    pointer-events: auto;
  }
  .mobile-drawer {
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0;
    right: -100%;
    bottom: 0;
    width: 320px;
    max-width: 85vw;
    background: var(--bg-elevated);
    border-left: 1px solid var(--border-gold);
    z-index: 100;
    transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: -8px 0 32px rgba(0,0,0,0.5);
  }
  .mobile-drawer.active {
    right: 0;
  }
  .mobile-drawer-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .mobile-drawer-close {
    background: transparent;
    border: none;

const SETTINGS_KEY = 'cave_privee_settings_v3';
const LAST_EXPORT_KEY = 'cave_privee_last_export_v3';

  sales: [],       // {id, wineId, date, qty, pricePerBottle, channel, buyer, notes}
  budgets: [],     // {id, year, targetEur, notes}

  // Sommelier-specifieke state

  blindSessions: [], // {id, date, wineIds, guesses: {wineId: {producer, region, vintage, grape}}, results, score}
  flights: [],     // {id, date, type: 'vertical'|'horizontal', name, wineIds, notes}
  apiUsage: [],    // {id, date, model, operation, inputTokens, outputTokens, costEur}

let settings = {
  apiKey: '',

  vatRate: 21,
  defaultMarginPct: 250, // typical restaurant markup (3.5x = 250%)
  defaultGlassFraction: 5, // 5 glasses per bottle
  currency: 'EUR',
  usdToEur: 0.93, // approximate conversion for cost display
  monthlyBudgetEur: null, // user-set soft warning
};

// API pricing per million tokens (USD), verified May 2026
// Source: docs.anthropic.com/pricing
const API_PRICING = {
  'claude-opus-4-7':    { input: 5,   output: 25  },
  'claude-opus-4-6':    { input: 5,   output: 25  },
  'claude-sonnet-4-6':  { input: 3,   output: 15  },
  'claude-haiku-4-5':   { input: 1,   output: 5   },
  'claude-haiku-4-5-20251001': { input: 1, output: 5 },
};

function getPricing(model) {
  return API_PRICING[model] || API_PRICING['claude-sonnet-4-6'];
}

// Estimate cost in EUR for a single API call given usage object {input_tokens, output_tokens}
function estimateCostEur(model, usage) {
  if (!usage) return 0;
  const p = getPricing(model);
  const inputTokens = Number(usage.input_tokens) || 0;
  const outputTokens = Number(usage.output_tokens) || 0;
  const cacheReadTokens = Number(usage.cache_read_input_tokens) || 0;
  const cacheCreationTokens = Number(usage.cache_creation_input_tokens) || 0;
  // Cache reads cost 10% of input; cache creation is 1.25x (5-min) — we use the safe upper estimate
  const usdCost =
    (inputTokens * p.input / 1_000_000) +
    (outputTokens * p.output / 1_000_000) +
    (cacheReadTokens * p.input * 0.1 / 1_000_000) +
    (cacheCreationTokens * p.input * 1.25 / 1_000_000);
  return usdCost * settings.usdToEur;
}

// Record an API call into state.apiUsage
function recordAPIUsage(model, operation, usage) {
  if (!state.apiUsage) state.apiUsage = [];
  const costEur = estimateCostEur(model, usage);
  state.apiUsage.push({
    id: uid(),
    date: new Date().toISOString(),
    model,
    operation, // 'label-recognition', 'market-price', 'insight', 'pairing'
    inputTokens: Number(usage?.input_tokens) || 0,
    outputTokens: Number(usage?.output_tokens) || 0,
    costEur
  });
  // Keep only last 500 entries to avoid bloat
  if (state.apiUsage.length > 500) state.apiUsage = state.apiUsage.slice(-500);
  saveData();
  return costEur;
}

// Get spend for current month
function getCurrentMonthSpend() {
  if (!state.apiUsage) return { totalEur: 0, callCount: 0, byOperation: {} };
  const now = new Date();
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
  const thisMonth = state.apiUsage.filter(u => new Date(u.date) >= monthStart);
  const totalEur = thisMonth.reduce((s, u) => s + u.costEur, 0);
  const byOperation = {};
  thisMonth.forEach(u => {
    if (!byOperation[u.operation]) byOperation[u.operation] = { count: 0, cost: 0 };
    byOperation[u.operation].count++;
    byOperation[u.operation].cost += u.costEur;
  });
  return { totalEur, callCount: thisMonth.length, byOperation };
}

// Get the cost of the most recent API call as small string for inline status display
function lastCallCostBadge() {
  if (!state.apiUsage || state.apiUsage.length === 0) return '';
  const last = state.apiUsage[state.apiUsage.length - 1];
  // Only show if call was within last 5 seconds (otherwise we're talking about something else)
  const ageMs = new Date() - new Date(last.date);
  if (ageMs > 5000) return '';
  return ` <span style="color:var(--text-faint); font-size:11px; font-style:italic;">(${fmtCost(last.costEur)})</span>`;
}

// Format small euro cost for display: under €0.01 → "<€0,01", otherwise normal price
function fmtCost(eur) {
  if (eur == null || isNaN(Number(eur))) return '—';
  const v = Number(eur);
  if (v < 0.005) return '< € 0,01';
  if (v < 0.10) return '€ ' + v.toFixed(3).replace('.', ',');
  return fmtPrice(v);
}

// ============ INDEXEDDB-LAAG ============
// Primaire opslag. localStorage (~5MB in Safari) is te klein voor een kelder
// van 100+ wijnen met etiketfoto's; IndexedDB biedt honderden MB's.
const IDB_NAME = 'cave_privee';
const IDB_STORE = 'kv';
let idbAvailable = null; // null=onbekend, true/false na eerste poging

function idbOpen() {
  return new Promise((resolve, reject) => {
    if (typeof indexedDB === 'undefined' || !indexedDB) { reject(new Error('IndexedDB niet beschikbaar')); return; }
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = () => { req.result.createObjectStore(IDB_STORE); };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error || new Error('IDB open faalde'));
    req.onblocked = () => reject(new Error('IDB geblokkeerd'));
  });
}
async function idbSet(key, value) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).put(value, key);
    tx.oncomplete = () => { db.close(); resolve(true); };
    tx.onerror = () => { db.close(); reject(tx.error || new Error('IDB write faalde')); };
    tx.onabort = () => { db.close(); reject(tx.error || new Error('IDB abort')); };
  });
}
async function idbGet(key) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, 'readonly');
    const rq = tx.objectStore(IDB_STORE).get(key);
    rq.onsuccess = () => { db.close(); resolve(rq.result === undefined ? null : rq.result); };
    rq.onerror = () => { db.close(); reject(rq.error || new Error('IDB read faalde')); };
  });
}

function applyLoadedData(data) {
  state.wines = data.wines || [];
  state.suppliers = data.suppliers || [];
  state.sales = data.sales || [];
  state.budgets = data.budgets || [];
  state.insights = data.insights || [];
  state.openBottles = data.openBottles || [];
  state.blindSessions = data.blindSessions || [];
  state.flights = data.flights || [];
  state.apiUsage = data.apiUsage || [];
  state.currentMode = 'home';
}

async function loadDataAsync() {
  let raw = null;
  // 1. Primair: IndexedDB
  try {
    raw = await idbGet(STORAGE_KEY);
    idbAvailable = true;
  } catch (e) {
    idbAvailable = false;
  }
  // 2. Fallback + migratie: localStorage
  let migrateFromLocal = false;
  if (!raw) {
    raw = safeStorageGet(STORAGE_KEY);
    if (raw && idbAvailable) migrateFromLocal = true;
  }
  try {
    if (raw) {
      applyLoadedData(JSON.parse(raw));
    } else {
      // Legacy v2/v1 migratie (localStorage)
      const v2 = safeStorageGet('cave_privee_v2');
      if (v2) {
        state.wines = JSON.parse(v2).map(w => ({ ...w, tastings: w.tastings || [], priceHistory: w.priceHistory || [] }));
        saveData();
      } else {
        const v1 = safeStorageGet('cave_privee_v1');
        if (v1) {
          state.wines = JSON.parse(v1).map(w => ({ ...w, tastings: [], priceHistory: [] }));
          saveData();
        }
      }
    }
  } catch (e) { console.error('Load error:', e); }

  // Migratie localStorage → IndexedDB, met terugleescontrole vóór opruimen.
  // Dit maakt ~3-5MB localStorage-quota vrij; data gaat nooit verloren omdat
  // de oude kopie pas verdwijnt na geverifieerde schrijf+lees in IDB.
  if (migrateFromLocal) {
    try {
      await idbSet(STORAGE_KEY, raw);
      const back = await idbGet(STORAGE_KEY);
      if (back === raw) {
        try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
        console.log('Migratie: data verplaatst van localStorage naar IndexedDB');
      }
    } catch (e) { idbAvailable = false; /* blijf op localStorage */ }
  }

  // Instellingen blijven in localStorage (klein)
  try {
    const s = safeStorageGet(SETTINGS_KEY);
    if (s) settings = { ...settings, ...JSON.parse(s) };
  } catch (e) { console.error(e); }
}

function buildDataJson() {
  return JSON.stringify({
    wines: state.wines,
    suppliers: state.suppliers,
    sales: state.sales,
    budgets: state.budgets,
    insights: state.insights,
    openBottles: state.openBottles,
    blindSessions: state.blindSessions,
    flights: state.flights,
    apiUsage: state.apiUsage,
    currentMode: state.currentMode,
  });
}

// Schrijfketen: opeenvolgende saves blijven in volgorde, ook al zijn ze async
let _saveChain = Promise.resolve();

async function persistJson(json) {
  // Primair IDB; bij falen localStorage; bij dubbel falen: waarschuw
  try {
    await idbSet(STORAGE_KEY, json);
    idbAvailable = true;
    return true;
  } catch (e) {
    idbAvailable = false;
  }
  const ok = safeStorageSet(STORAGE_KEY, json);
  if (!ok) warnStorageBroken();
  return ok;
}

function saveData() {
  const json = buildDataJson(); // snapshot op moment van aanroep
  _saveChain = _saveChain.then(() => persistJson(json)).catch(() => {});
  return true;
}

async function saveDataAsync() {
  const json = buildDataJson();
  let result = false;
  _saveChain = _saveChain.then(async () => { result = await persistJson(json); }).catch(() => {});
  await _saveChain;
  return result;
}
function saveSettingsData() {
  return safeStorageSet(SETTINGS_KEY, JSON.stringify(settings));
}

// ============ ROBUST STORAGE LAYER ============
// Safari on file:// URLs can silently reject localStorage. Detect that.
// Track storage health and warn the user if writes fail.
let storageHealth = {
  available: null, // null=untested, true=works, false=broken
  lastError: null,
  warned: false,
};

function detectStorageHealth() {
  try {
    const testKey = '__cp_storage_test__';
    const testValue = String(Date.now());
    localStorage.setItem(testKey, testValue);
    const readBack = localStorage.getItem(testKey);
    localStorage.removeItem(testKey);
    if (readBack !== testValue) {
      storageHealth.available = false;
      storageHealth.lastError = 'Read-back mismatch';
      return false;
    }
    storageHealth.available = true;
    return true;
  } catch (e) {
    storageHealth.available = false;
    storageHealth.lastError = e.message || String(e);
    return false;
  }
}

function safeStorageSet(key, value) {
  try {
    localStorage.setItem(key, value);
    if (storageHealth.available !== true) {
      // Was broken, now works? Update.
      storageHealth.available = true;
      storageHealth.lastError = null;
    }
    return true;
  } catch (e) {
    storageHealth.available = false;
    storageHealth.lastError = e.message || String(e);
    warnStorageBroken();
    return false;
  }
}

function safeStorageGet(key) {
  try {
    return localStorage.getItem(key);
  } catch (e) {
    storageHealth.available = false;
    storageHealth.lastError = e.message || String(e);
    return null;
  }
}

function warnStorageBroken() {
  if (storageHealth.warned) return;
  storageHealth.warned = true;
  // Persist this warning visually — toast can be missed
  setTimeout(() => {
    showStorageWarningBanner();
  }, 200);
}

function showStorageWarningBanner() {
  // Don't double-render
  if (document.getElementById('storageWarnBanner')) return;
  const banner = document.createElement('div');
  banner.id = 'storageWarnBanner';
  banner.style.cssText = `
    position: fixed; top: 0; left: 0; right: 0;
    background: linear-gradient(135deg, #4a1a1a, #2a0f0f);
    color: #ffd4a8; padding: 14px 22px;
    border-bottom: 2px solid #d4b878;

    z-index: 9999; display: flex; align-items: center; gap: 14px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6);
  `;
  banner.innerHTML = `
    <span style="font-size: 20px;">⚠</span>
    <div style="flex:1;">
      <strong style="color:#d4b878;">Let op — uw browser bewaart geen gegevens</strong><br>
      <span style="font-size: 13px; opacity:0.9;">
        Uw wijzigingen verdwijnen als u de pagina sluit.
        Op Safari: activeer Develop-menu (Voorkeuren → Geavanceerd) en kies
        <em>Develop → Disable Local File Restrictions</em>.
        Alternatief: gebruik <em>Exporteer alles</em> regelmatig om uw data veilig te bewaren.
      </span>
    </div>
    <button onclick="this.parentElement.remove()" style="background:transparent; border:1px solid #d4b878; color:#d4b878; padding:6px 14px; cursor:pointer; font-family:inherit; border-radius:2px;">Begrepen</button>
  `;
  document.body.appendChild(banner);

// ============ iOS CONTEXT DETECTION & INSTALL BANNER ============
const INSTALL_HINT_DISMISSED_KEY = 'cave_privee_install_hint_dismissed_v3';

function detectIosContext() {
  const ua = navigator.userAgent || '';
  const isIos = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
  const isStandalone = window.navigator.standalone === true ||
                       window.matchMedia('(display-mode: standalone)').matches;
  // Safari user-agent contains "Safari/" but Files preview and WebViews don't
  const isSafari = /Safari\//.test(ua) && !/CriOS|FxiOS|EdgiOS/.test(ua);
  // Files-app preview uses WebKit but typically lacks Safari fingerprint
  const isFilesApp = isIos && !isSafari && !isStandalone;

  return { isIos, isStandalone, isSafari, isFilesApp };
}

function showInstallHintIfApplicable() {
  // Don't show if already dismissed
  if (safeStorageGet(INSTALL_HINT_DISMISSED_KEY) === '1') return;
  // Don't show if storage is broken (storage warning takes priority)
  if (storageHealth.available === false) return;
  // Don't stack with welcome modal
  if (document.querySelector('.modal-backdrop.active')) {
    setTimeout(showInstallHintIfApplicable, 2000);
    return;
  }

  const ctx = detectIosContext();

  // Don't bother on non-iOS or when already running as installed app
  if (!ctx.isIos) return;
  if (ctx.isStandalone) return;

  // If we're in Files-app preview (no Safari signature), show urgent message
  // If we're in Safari already, show subtle "Add to Home Screen" prompt
  const inFiles = ctx.isFilesApp;

  // Wait a moment so it doesn't appear before the welcome modal loads
  setTimeout(() => {
    if (document.getElementById('installHintBanner')) return;
    if (document.querySelector('.modal-backdrop.active')) return;

    const banner = document.createElement('div');
    banner.id = 'installHintBanner';
    banner.style.cssText = `
      position: fixed; bottom: 20px; left: 20px; right: 20px;
      max-width: 460px; margin: 0 auto;
      background: linear-gradient(135deg, #2a2118, #1a1410);
      color: var(--text-soft, #c9b89a);
      padding: 18px 22px;
      border: 1px solid #4a3d28;
      border-radius: 4px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      z-index: 9500;
      box-shadow: 0 12px 40px rgba(0,0,0,0.6);
      display: flex; gap: 14px; align-items: flex-start;
    `;

    const headerText = inFiles
      ? 'Open in Safari voor de beste ervaring'
      : 'Zet op uw beginscherm';
    const bodyText = inFiles
      ? `U opent de tool nu in de <strong>Bestanden-app</strong>. Hier worden uw wijngegevens <strong>niet bewaard</strong> en mist u functies. Open het bestand in Safari voor een werkende applicatie.`
      : `Tik op het deel-icoon <span style="font-size:16px;">⎋</span> onderaan Safari, en kies <strong>"Zet op beginscherm"</strong>. Daarna gedraagt deze tool zich als een echte app — schermvullend, met een M·OED icoontje.`;
    const helpUrl = inFiles
      ? `<div style="margin-top: 10px; font-size: 12px; color: #8a7d68; font-style: italic; line-height: 1.5;">
          <strong>Hoe?</strong> Tik op het deel-icoon <span style="font-size:14px;">⎋</span> bovenaan → kies <em>"Kopieer naar Safari"</em> of <em>"Open in Safari"</em>.
        </div>`
      : '';

    banner.innerHTML = `
      <span style="font-size: 24px; color: #d4b878;">${inFiles ? '⚠' : '⌂'}</span>
      <div style="flex: 1; line-height: 1.5;">
        <div style="color: #ebd5a3; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px;">
          ${headerText}
        </div>
        <div>${bodyText}</div>
        ${helpUrl}
        <div style="margin-top: 14px; display: flex; gap: 8px;">
          <button id="installHintDismiss" style="background: transparent; border: 1px solid #4a3d28; color: #8a7d68; padding: 6px 14px; font-family: inherit; font-size: 12px; cursor: pointer; border-radius: 2px;">Begrepen, niet meer tonen</button>
        </div>
      </div>
    `;
    document.body.appendChild(banner);

    document.getElementById('installHintDismiss').addEventListener('click', () => {
      safeStorageSet(INSTALL_HINT_DISMISSED_KEY, '1');
      banner.remove();
    });
  }, 1500);
}
function getLastExportDate() {
  const raw = safeStorageGet(LAST_EXPORT_KEY);
  if (!raw) return null;
  const d = new Date(raw);
  return isNaN(d.getTime()) ? null : d;
}

function getDaysSinceLastExport() {
  const last = getLastExportDate();
  if (!last) return null; // never exported
  const ms = new Date() - last;
  return Math.floor(ms / (1000 * 60 * 60 * 24));
}

// Update the red dot on "Bewaar als bestand" button
function updateExportWarnIndicator() {
  const dot = document.getElementById('exportWarnDot');
  if (!dot) return;
  const wineCount = (state.wines || []).length;
  // No dot if user has no data yet
  if (wineCount === 0) {
    dot.style.display = 'none';
    return;
  }
  const days = getDaysSinceLastExport();
  // Show dot if never exported, or >= 7 days
  const shouldShow = days === null || days >= EXPORT_REMINDER_DAYS;
  dot.style.display = shouldShow ? 'block' : 'none';
  if (shouldShow) {
    const msg = days === null
      ? `U heeft nog geen back-up gemaakt (${wineCount} wijn${wineCount === 1 ? '' : 'en'} in uw kelder)`
      : `${days} dagen geen back-up gemaakt`;
    dot.title = msg;
  }
}

// Soft reminder banner — shown once per session if export is overdue
let exportReminderShownThisSession = false;
function maybeShowExportReminder() {
  if (exportReminderShownThisSession) return;
  if (document.getElementById('exportReminderBanner')) return;
  const wineCount = (state.wines || []).length;
  if (wineCount === 0) return; // no data to back up yet
  const days = getDaysSinceLastExport();
  // Only nudge if it's been a while (or never)
  if (days !== null && days < EXPORT_REMINDER_DAYS) return;
  // Don't nag in the same minute the app loads — wait a bit
  setTimeout(() => {
    if (document.getElementById('exportReminderBanner')) return;
    if (document.getElementById('storageWarnBanner')) return; // don't stack banners
    // Don't show if any modal is currently open
    if (document.querySelector('.modal-backdrop.active')) {
      // Try again later
      setTimeout(maybeShowExportReminder, 60000);
      return;
    }
    const banner = document.createElement('div');
    banner.id = 'exportReminderBanner';
    banner.style.cssText = `
      position: fixed; bottom: 20px; right: 20px; max-width: 360px;
      background: linear-gradient(135deg, #2a2118, #1a1410);
      color: var(--text-soft); padding: 16px 20px;
      border: 1px solid var(--border-gold); border-radius: 3px;
      font-family: 'Cormorant Garamond', serif; font-size: 14px;
      z-index: 90; box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      display: flex; gap: 12px; align-items: flex-start;
    `;
    const msg = days === null
      ? `U heeft <strong>${wineCount} wijn${wineCount === 1 ? '' : 'en'}</strong> ingevoerd maar nog geen back-up gemaakt.`
      : `Het is <strong>${days} dagen</strong> geleden dat u uw data heeft bewaard.`;
    banner.innerHTML = `
      <span style="font-size: 22px; color: var(--gold);">⬇</span>
      <div style="flex:1;">
        <div style="color: var(--gold-bright); font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px;">Back-up aanbevolen</div>
        <div style="line-height: 1.5;">${msg} Een back-up beschermt tegen browser-resets en helpt bij overstap naar een ander apparaat.</div>
        <div style="margin-top: 12px; display: flex; gap: 8px;">
          <button onclick="exportData(); document.getElementById('exportReminderBanner')?.remove();" style="background: var(--gold); border: none; color: var(--ink); padding: 6px 14px; font-family: inherit; font-size: 12px; letter-spacing: 0.08em; cursor: pointer; border-radius: 2px;">Bewaar nu</button>
          <button onclick="document.getElementById('exportReminderBanner')?.remove();" style="background: transparent; border: 1px solid var(--border); color: var(--text-dim); padding: 6px 14px; font-family: inherit; font-size: 12px; cursor: pointer; border-radius: 2px;">Later</button>
        </div>
      </div>
    `;
    document.body.appendChild(banner);
    exportReminderShownThisSession = true;
  }, 3000);
}

// ============ UTILS ============
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
function fmtPrice(p, withCents = true) {
  if (p == null || p === '' || isNaN(Number(p))) return '—';
  const v = Number(p);
  return '€ ' + v.toFixed(withCents ? 2 : 0).replace(/\B(?=(\d{3})+(?!\d))/g, '.').replace('.', withCents ? ',' : '.');
}
function fmtNum(n, decimals = 0) {
  if (n == null || isNaN(Number(n))) return '—';
  return Number(n).toFixed(decimals).replace('.', ',');
}
function fmtDate(d) {
  if (!d) return '—';
  const dt = new Date(d);
  return dt.toLocaleDateString('nl-NL', { day:'numeric', month:'long', year:'numeric' });
}
function fmtDateShort(d) {
  if (!d) return '—';
  const dt = new Date(d);
  return dt.toLocaleDateString('nl-NL', { day:'numeric', month:'short', year:'2-digit' });
}
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function inferTypeFromName(name) {
  if (!name) return null;
  const n = name.toLowerCase();
  // Witte wijn-keywords
  const whiteKeywords = ['chardonnay', 'sauvignon blanc', 'riesling', 'pinot blanc', 'pinot gris', 'pinot grigio',
    'gewürztraminer', 'gewurztraminer', 'chenin', 'viognier', 'sémillon', 'semillon', 'albariño', 'albarino',
    'verdejo', 'grüner', 'gruner', 'vermentino', 'soave', 'sancerre', 'pouilly', 'chablis', 'montrachet',
    'meursault', 'puligny', 'chassagne', 'condrieu', 'hermitage blanc'];
  // Mousserend
  const sparklingKeywords = ['champagne', 'cava', 'prosecco', 'crémant', 'cremant', 'franciacorta', 'sekt', 'spumante', 'brut nature', 'extra brut'];
  // Rosé
  const roseKeywords = ['rosé', 'rose ', 'rosato', 'rosado', 'tavel', 'bandol rosé'];
  // Versterkt
  const fortifiedKeywords = ['port ', 'porto', 'sherry', 'jerez', 'madeira', 'marsala', 'vermouth'];
  // Zoet
  const sweetKeywords = ['sauternes', 'tokaji', 'eiswein', 'ice wine', 'late harvest', 'beerenauslese', 'trockenbeerenauslese', 'noble rot'];

  if (sparklingKeywords.some(k => n.includes(k))) return 'mousserend';
  if (roseKeywords.some(k => n.includes(k))) return 'rosé';
  if (sweetKeywords.some(k => n.includes(k))) return 'zoet';
  if (fortifiedKeywords.some(k => n.includes(k))) return 'versterkt';
  if (whiteKeywords.some(k => n.includes(k))) return 'wit';
  return null;
}
function getDrinkWindow(wine) {
  const now = new Date().getFullYear();
  const from = wine.drinkFrom ? Number(wine.drinkFrom) : null;
  const peak = wine.drinkPeak ? Number(wine.drinkPeak) : null;
  const to = wine.drinkTo ? Number(wine.drinkTo) : null;

  if (!from && !peak && !to) return { status: 'unknown', label: 'Drinkvenster ?' };

  // Buiten het venster
  if (from && now < from) return { status: 'aging', label: `Beter na ${from}` };
  if (to && now > to) return { status: 'past', label: 'Hoogtepunt voorbij' };

  // Laatste jaren vóór sluiting: drink-met-spoed, ongeacht plateau
  if (to && (to - now) <= 1) return { status: 'ready', label: `Drink vóór ${to}` };

  // Binnen het venster met een gedefinieerde piek → plateau-logica
  if (peak) {
    if (now < peak) {
      // Op dronk, maar ontwikkelt nog richting top
      return { status: 'ready', label: 'Op dronk · ontwikkelt nog' };
    }
    // now >= peak en niet in de slotfase → plateau: blijft op zijn top
    return { status: 'peak', label: 'Op zijn top' };
  }

  // Binnen venster zonder piekjaar
  return { status: 'ready', label: 'Op dronk' };
}
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.className = 'toast', 3200);
}

// Wine valuation utility
function wineValue(w) {
  return Number(w.marketPrice) || Number(w.purchasePrice) || 0;
}
function wineTotalValue(w) {
  return wineValue(w) * (Number(w.bottles) || 0);
}
function wineTotalCost(w) {
  return (Number(w.purchasePrice) || 0) * (Number(w.bottles) || 0);
}
// Restaurant pricing: from inkoopprijs excl BTW → wijnkaartprijs incl BTW
function calcRestaurantPrices(w) {
  const buyPriceExVat = Number(w.purchasePrice) || 0; // assumed ex-BTW for restaurant
  const marginPct = (w.marginPct === '' || w.marginPct == null || w.marginPct === undefined)
    ? settings.defaultMarginPct
    : Number(w.marginPct);
  const vatRate = Number(settings.vatRate) / 100;
  const sellExVat = buyPriceExVat * (1 + marginPct / 100);
  const sellInVat = sellExVat * (1 + vatRate);
  const glassFraction = (w.glassFraction === '' || w.glassFraction == null || w.glassFraction === undefined)
    ? settings.defaultGlassFraction
    : Number(w.glassFraction);
  const glassPrice = glassFraction > 0 ? sellInVat / glassFraction : 0;
  const marginEur = sellExVat - buyPriceExVat;
  return { buyPriceExVat, sellExVat, sellInVat, glassPrice, marginEur, marginPct };
}
