function openCropper(target) {
  state.cropTarget = target;
  const photo = target === 'qa' ? state.quickPhoto : state.currentPhoto;
  if (!photo) return;
  state.cropOriginal = photo;
  const content = `<div class="modal modal-wide">
    <div class="modal-header"><div class="modal-title">Bijsnijden</div><button class="modal-close" onclick="closeModal('cropModal')">×</button></div>
    <div class="modal-body" style="text-align:center;">
      <p style="color:var(--text-dim); font-size:13px; margin-bottom:14px;">Sleep om het etiket te selecteren</p>
      <div class="crop-container" id="cropContainer">
        <img id="cropImage" src="${photo}">
        <div class="crop-overlay" id="cropOverlay"></div>
        <div class="crop-box" id="cropBox">
          <div class="crop-handle nw"></div><div class="crop-handle ne"></div>
          <div class="crop-handle sw"></div><div class="crop-handle se"></div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('cropModal')">Annuleren</button>
      <button class="btn btn-primary" onclick="applyCrop()">Toepassen</button>
    </div>
  </div>`;
  openModal('cropModal', content);
  setTimeout(initCropBox, 80);
}

function initCropBox() {
  const img = document.getElementById('cropImage');
  if (!img.complete) { img.onload = initCropBox; return; }
  const r = img.getBoundingClientRect();
  const cr = img.parentElement.getBoundingClientRect();
  const offsetX = r.left - cr.left;
  const offsetY = r.top - cr.top;
  let crop = { x: offsetX + r.width * 0.1, y: offsetY + r.height * 0.1, w: r.width * 0.8, h: r.height * 0.8 };
  function renderCropBox() {
    const box = document.getElementById('cropBox');
    box.style.left = crop.x + 'px'; box.style.top = crop.y + 'px';
    box.style.width = crop.w + 'px'; box.style.height = crop.h + 'px';
  }
  renderCropBox();
  state._crop = { crop, renderCropBox };

  let dragMode = null, startX = 0, startY = 0, orig = null;
  const container = document.getElementById('cropContainer');
  const box = document.getElementById('cropBox');

  function getPos(e) { const t = e.touches ? e.touches[0] : e; const cr = container.getBoundingClientRect(); return { x: t.clientX - cr.left, y: t.clientY - cr.top }; }

  function onDown(e) {
    e.preventDefault();
    const p = getPos(e);
    const handle = e.target.classList.contains('crop-handle') ? [...e.target.classList].find(c => ['nw','ne','sw','se'].includes(c)) : null;
    if (handle) dragMode = 'resize-' + handle;
    else if (e.target === box || e.target.parentElement === box) dragMode = 'move';
    else {
      // New box from drag
      crop.x = p.x; crop.y = p.y; crop.w = 0; crop.h = 0;
      dragMode = 'resize-se';
    }
    startX = p.x; startY = p.y;
    orig = { ...crop };
  }
  function onMove(e) {
    if (!dragMode) return;
    e.preventDefault();
    const p = getPos(e);
    const dx = p.x - startX, dy = p.y - startY;
    const cr = img.parentElement.getBoundingClientRect();
    const imgRect = img.getBoundingClientRect();
    const minX = imgRect.left - cr.left, minY = imgRect.top - cr.top;
    const maxX = minX + imgRect.width, maxY = minY + imgRect.height;
    if (dragMode === 'move') {
      crop.x = Math.max(minX, Math.min(maxX - crop.w, orig.x + dx));
      crop.y = Math.max(minY, Math.min(maxY - crop.h, orig.y + dy));
    } else if (dragMode.startsWith('resize-')) {
      const corner = dragMode.split('-')[1];
      if (corner.includes('e')) crop.w = Math.max(20, Math.min(maxX - orig.x, orig.w + dx));
      if (corner.includes('s')) crop.h = Math.max(20, Math.min(maxY - orig.y, orig.h + dy));
      if (corner.includes('w')) { const nx = Math.max(minX, orig.x + dx); crop.w = orig.w + (orig.x - nx); crop.x = nx; }
      if (corner.includes('n')) { const ny = Math.max(minY, orig.y + dy); crop.h = orig.h + (orig.y - ny); crop.y = ny; }
    }
    state._crop.crop = crop; renderCropBox();
  }
  function onUp() { dragMode = null; }
  container.addEventListener('mousedown', onDown);
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
  container.addEventListener('touchstart', onDown, { passive: false });
  document.addEventListener('touchmove', onMove, { passive: false });
  document.addEventListener('touchend', onUp);
}

function applyCrop() {
  const img = document.getElementById('cropImage');
  const crop = state._crop.crop;
  const cr = img.parentElement.getBoundingClientRect();
  const imgRect = img.getBoundingClientRect();
  const scaleX = img.naturalWidth / imgRect.width;
  const scaleY = img.naturalHeight / imgRect.height;
  const offsetX = imgRect.left - cr.left, offsetY = imgRect.top - cr.top;
  const sx = (crop.x - offsetX) * scaleX;
  const sy = (crop.y - offsetY) * scaleY;
  const sw = crop.w * scaleX, sh = crop.h * scaleY;

  const canvas = document.createElement('canvas');
  // Schaal de uitsnede terug naar PHOTO_MAX_DIM zodat ook crops compact blijven
  let outW = sw, outH = sh;
  if (outW > PHOTO_MAX_DIM || outH > PHOTO_MAX_DIM) {
    const cscale = PHOTO_MAX_DIM / Math.max(outW, outH);
    outW = Math.round(outW * cscale); outH = Math.round(outH * cscale);
  }
  canvas.width = outW; canvas.height = outH;
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  const fullImg = new Image();
  fullImg.onload = () => {
    ctx.drawImage(fullImg, sx, sy, sw, sh, 0, 0, outW, outH);
    const cropped = canvas.toDataURL('image/jpeg', PHOTO_QUALITY);
    if (state.cropTarget === 'qa') {
      state.quickPhoto = cropped;
      document.getElementById('qaPhotoPreview').src = cropped;
    } else {
      state.currentPhoto = cropped;
      updatePhotoDisplay();
    }
    closeModal('cropModal');
    showToast('Bijgesneden');
  };
  fullImg.src = state.cropOriginal;
}

// ============ AI ============
async function callAIRecognition(photoDataUrl) {
  if (!settings.apiKey) throw new Error('API key nodig — Instellingen');
  const base64 = photoDataUrl.split(',')[1];
  const mediaType = photoDataUrl.match(/data:(image\/\w+);/)[1];
  const prompt = `Analyseer dit wijnetiket als ervaren sommelier. Geef ALLEEN JSON terug (geen markdown).
Velden (laat leeg als niet zichtbaar):
{
  "producer": "domein/château",
  "name": "wijnnaam/cuvée",
  "vintage": "jaargang",
  "type": "rood|wit|rosé|mousserend|zoet|versterkt|oranje",
  "country": "land",
  "region": "regio (Bordeaux — Margaux AOC)",
  "classification": "1er Cru Classé / Grand Cru / DOCG / etc.",
  "grapes": "druivenrassen",
  "alcohol": "alcohol% (nummer)",
  "drinkFrom": "jaartal vanaf",
  "drinkPeak": "jaartal optimaal",
  "drinkTo": "jaartal vóór",
  "pairings": "spijsadvies (NL)",
  "servingTemp": "serveertemp °C",
  "decanting": "decanteer-advies (NL)"
}
Vul drinkvenster in op basis van wijnstijl/jaargang/regio kennis. Bij topcuvée Bordeaux: from = vintage+8, peak = vintage+15, to = vintage+30 ongeveer. Witte Bourgogne: from = vintage+3, peak = vintage+8, to = vintage+15. Pas aan op kwaliteit. Spijsadvies en decanteren in NL.`;
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': settings.apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
    body: JSON.stringify({ model: settings.model, max_tokens: 1500, messages: [{ role: 'user', content: [
      { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
      { type: 'text', text: prompt }
    ]}]})
  });
  if (!resp.ok) {
    const t = await resp.text();
    throw new Error('API: ' + resp.status + ' — ' + t.slice(0,140));
  }
  const data = await resp.json();
  recordAPIUsage(settings.model, 'label-recognition', data.usage);
  const text = data.content[0].text;
  const match = text.match(/\{[\s\S]*\}/);
  if (!match) throw new Error('Onverwacht antwoord');
  return JSON.parse(match[0]);
}

async function analyzePhoto() {
  if (!state.currentPhoto) { showToast('Eerst foto toevoegen', true); return; }
  if (!settings.apiKey) {
    showToast('Etiket-herkenning vereist een API-key — vul handmatig in of stel een sleutel in', true);
    setTimeout(openSettings, 1200);
    return;
  }
  const status = document.getElementById('aiStatus');
  status.className = 'ai-status';
  status.innerHTML = `<div class="ai-spinner"></div><div>Etiket wordt geanalyseerd...</div>`;
  try {
    const parsed = await callAIRecognition(state.currentPhoto);
    const fields = ['producer','name','vintage','type','country','region','classification','grapes','alcohol','drinkFrom','drinkPeak','drinkTo','pairings','servingTemp','decanting'];
    fields.forEach(f => { if (parsed[f]) { const el = document.getElementById('f_' + f); if (el) el.value = parsed[f]; } });
    document.getElementById('collapseSommelier').classList.add('open');
    status.className = 'ai-status success';
    status.innerHTML = `<div style="color:var(--green); font-size:18px;">✓</div><div>${escapeHtml([parsed.producer,parsed.name,parsed.vintage].filter(Boolean).join(' '))}${lastCallCostBadge()}</div>`;
  } catch (e) {
    status.className = 'ai-status error';
    status.innerHTML = `<div style="color:var(--danger); font-size:18px;">!</div><div>${escapeHtml(e.message)}</div>`;
  }
}

async function fetchMarketPrice() {
  const producer = document.getElementById('f_producer').value.trim();
  const name = document.getElementById('f_name').value.trim();
  const vintage = document.getElementById('f_vintage').value.trim();
  if (!producer && !name) { showToast('Vul producent of naam in', true); return; }
  if (!settings.apiKey) {
    showToast('Marktprijs vereist een API-key — vul handmatig in of stel een sleutel in', true);
    setTimeout(openSettings, 1200);
    return;
  }
  const status = document.getElementById('aiStatus');
  status.className = 'ai-status';
  status.innerHTML = `<div class="ai-spinner"></div><div>Marktprijs zoeken voor ${escapeHtml([producer, name, vintage].filter(Boolean).join(' '))}...</div>`;

  try {
    const wineDesc = [producer, name, vintage].filter(Boolean).join(' ');
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': settings.apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({
        model: settings.model, max_tokens: 1024,
        messages: [{ role: 'user', content: `Wat is de huidige marktprijs in euro's per fles voor: ${wineDesc}? Gebruik je kennis van wijnprijzen (Wine-Searcher, Vinous, Idealwine, Liv-ex range). Geef ALLEEN een JSON object terug: {"priceEur": 75.00, "confidence": "high|medium|low", "note": "korte toelichting"}.` }],
        tools: [{ type: 'web_search_20250305', name: 'web_search' }]
      })
    });
    if (!resp.ok) throw new Error('API ' + resp.status);
    const data = await resp.json();
    recordAPIUsage(settings.model, 'market-price', data.usage);
    // Find text block
    const textBlock = data.content.find(c => c.type === 'text');
    const text = textBlock ? textBlock.text : '';
    const match = text.match(/\{[\s\S]*?\}/);
    if (match) {
      const result = JSON.parse(match[0]);
      if (result.priceEur) {
        document.getElementById('f_marketPrice').value = result.priceEur;
        status.className = 'ai-status success';
        status.innerHTML = `<div style="color:var(--green); font-size:18px;">✓</div><div>${fmtPrice(result.priceEur)} (${result.confidence || 'onbekend'}) — ${escapeHtml(result.note || '')}${lastCallCostBadge()}</div>`;
        if (state.currentMode === 'restaurant') updatePriceCalc();
      } else throw new Error('Geen prijs gevonden');
    } else throw new Error('Geen prijs gevonden');
  } catch (e) {
    status.className = 'ai-status error';
    status.innerHTML = `<div style="color:var(--danger); font-size:18px;">!</div><div>${escapeHtml(e.message)}</div>`;
  }
}

        <div class="field"><label>Status na deze proeverij</label>
          <select id="t_endStatus">
            <option value="auto">Auto (verlaag voorraad)</option>

            <option value="gedronken">Alles gedronken</option>

        </div>

      <button class="btn btn-primary" onclick="saveTastingEntry()" style="margin-left:auto;">Opslaan</button>
    </div>

  openModal('tastingModal', content);
  document.querySelectorAll('#tRatingInput button').forEach(b => {
    b.addEventListener('click', () => {
      const r = Number(b.dataset.rating);
      state.tastingRating = state.tastingRating === r ? 0 : r;
      document.querySelectorAll('#tRatingInput button').forEach(x => x.classList.toggle('active', Number(x.dataset.rating) <= state.tastingRating));

}

function saveTastingEntry() {
  const w = state.wines.find(x => x.id === state.tastingForId);
  if (!w) return;
  const get = id => document.getElementById(id)?.value || '';
  const entry = {
    id: uid(),
    date: get('t_date'),
    rating: state.tastingRating,
    occasion: get('t_occasion').trim(),
    companions: get('t_companions').trim(),
    nose: get('t_nose').trim(),
    palate: get('t_palate').trim(),
    corked: get('t_corked'),
    rebuy: get('t_rebuy'),
    qty: Number(get('t_qty')) || 1,
  };
  w.tastings = w.tastings || [];
  w.tastings.push(entry);
  const qty = entry.qty;
  const endStatus = get('t_endStatus');
  if (endStatus === 'auto') {
    w.bottles = Math.max(0, (Number(w.bottles) || 0) - qty);
    if ((Number(w.bottles) || 0) === 0) w.status = 'gedronken';
  } else if (endStatus === 'gedronken') {
    w.bottles = 0; w.status = 'gedronken';
  }
  w.updatedAt = new Date().toISOString();
  saveData();
  closeModal('tastingModal');
  if (state.detailWineId) openDetail(state.detailWineId);
  else render();
  showToast('Proefnotitie opgeslagen');
}

function editFromDetail() { closeModal('detailModal'); openEditWine(state.detailWineId); }
function deleteFromDetail() {
  if (!confirm('Deze wijn verwijderen?')) return;
  state.wines = state.wines.filter(w => w.id !== state.detailWineId);
  state.sales = state.sales.filter(s => s.wineId !== state.detailWineId);
  saveData();
  closeModal('detailModal');
  render();
  showToast('Verwijderd');
}
function addTastingFromDetail() { openTastingModal(state.detailWineId); }
function openSATFromDetail() { closeModal('detailModal'); openSATModal(state.detailWineId); }
function openBottleFromDetail() {
  closeModal('detailModal');
  openBottleDialog();
  // Pre-select the wine
  setTimeout(() => {
    const sel = document.getElementById('ob_wine');
    if (sel) { sel.value = state.detailWineId; updateOpenBottleSuggestion(); }
  }, 100);
}

function renderRadarChart(profile) {
  const axes = [
    { key: 'fruit', label: 'Fruit' }, { key: 'oak', label: 'Hout' },
    { key: 'tannin', label: 'Tannine' }, { key: 'acidity', label: 'Zuur' },
    { key: 'body', label: 'Body' }, { key: 'mineral', label: 'Mineraal' }
  ];
  const cx = 170, cy = 170, maxR = 110;
  let polygon = '', points = '', labels = '', grid = '', axisLines = '';
  for (let level = 0.2; level <= 1; level += 0.2) {
    let path = '';
    axes.forEach((ax, i) => {
      const angle = (Math.PI * 2 * i / axes.length) - Math.PI / 2;
      const x = cx + Math.cos(angle) * maxR * level;
      const y = cy + Math.sin(angle) * maxR * level;
      path += (i === 0 ? 'M' : 'L') + x + ',' + y + ' ';
    });
    grid += `<path d="${path}Z" class="radar-grid" stroke-opacity="${level === 1 ? 1 : 0.3}"/>`;
  }
  axes.forEach((ax, i) => {
    const angle = (Math.PI * 2 * i / axes.length) - Math.PI / 2;
    const xEnd = cx + Math.cos(angle) * maxR;
    const yEnd = cy + Math.sin(angle) * maxR;
    axisLines += `<line x1="${cx}" y1="${cy}" x2="${xEnd}" y2="${yEnd}" class="radar-axis"/>`;
    const lx = cx + Math.cos(angle) * (maxR + 18);
    const ly = cy + Math.sin(angle) * (maxR + 18) + 4;
    labels += `<text x="${lx}" y="${ly}" class="radar-label">${ax.label}</text>`;
    const val = Math.max(0, Math.min(10, Number(profile[ax.key]) || 0));
    const r = (val / 10) * maxR;
    const px = cx + Math.cos(angle) * r;
    const py = cy + Math.sin(angle) * r;
    polygon += (i === 0 ? 'M' : 'L') + px + ',' + py + ' ';
    points += `<circle cx="${px}" cy="${py}" r="3" class="radar-point"/>`;
  });
  return `<svg class="radar-svg" viewBox="0 0 340 340" xmlns="http://www.w3.org/2000/svg">
    <defs><radialGradient id="radarGrad"><stop offset="0%" stop-color="#c9a961" stop-opacity="0.5"/><stop offset="100%" stop-color="#722f37" stop-opacity="0.3"/></radialGradient></defs>
    ${grid}${axisLines}<path d="${polygon}Z" class="radar-area"/>${points}${labels}
  </svg>`;
}

function saveSale(wineId) {
  const w = state.wines.find(x => x.id === wineId);
  if (!w) return;
  const get = id => document.getElementById(id)?.value || '';
  const qty = Number(get('s_qty')) || 1;
  const price = Number(get('s_price')) || 0;
  if (qty <= 0 || qty > w.bottles) { showToast('Ongeldig aantal', true); return; }
  if (price <= 0) { showToast('Vul prijs in', true); return; }
  const sale = {
    id: uid(), wineId, date: get('s_date'),
    qty, pricePerBottle: price,
    channel: get('s_channel'), buyer: get('s_buyer').trim(),
    platform: get('s_platform') || ''
  };
  state.sales.push(sale);
  w.bottles = (Number(w.bottles) || 0) - qty;
  if (w.bottles === 0) w.status = 'verkocht';
  saveData();
  closeModal('saleModal');
  if (state.detailWineId) openDetail(state.detailWineId);
  else render();
  showToast('Verkoop geregistreerd');
}

// ============ AI INSIGHTS ============
async function generateInsight(type, userQuestion) {
  if (!settings.apiKey) {
    showToast('Wijnadvies vereist een API-key — stel een sleutel in', true);
    setTimeout(openSettings, 1200);
    return;
  }
  if (state.wines.filter(w => w.status === 'kelder').length === 0) { showToast('Voeg eerst wijnen toe', true); return; }

  showToast('Claude denkt na...');
  const nowYear = new Date().getFullYear();
  // Build cellar summary including drink windows and tasting notes
  const kelder = state.wines.filter(w => w.status === 'kelder');
  const portfolio = kelder.map(w => {
    const tastings = (w.tastings || []).map(t => ({
      datum: t.date, score: t.rating,
      neus: t.noseNotes || t.appearance, smaak: t.palateNotes,
      conclusie: t.conclusion || t.freeNotes
    })).filter(t => t.neus || t.smaak || t.score);
    return {
      producent: w.producer, naam: w.name, jaargang: w.vintage,
      type: w.type, regio: w.region, land: w.country, classificatie: w.classification,
      druiven: w.grapes, flessen: w.bottles,
      drinkVanaf: w.drinkFrom, drinkTop: w.drinkPeak, drinkVoor: w.drinkTo,
      serveertemp: w.servingTemp, decanteren: w.decanting,
      score: w.rating, proefnotities: tastings.length ? tastings : undefined
    };
  });

  const persona = `Je adviseert een ervaren wijnkenner met formele wijndiploma's (WSET-niveau). Spreek hem aan als kenner — geen basisuitleg, wel scherpe, onderbouwde inzichten. Antwoord in vloeiend, professioneel Nederlands. Het huidige jaar is ${nowYear}.`;

  let prompt = '';
  let title = '';
  if (type === 'drinkstrategie') {
    title = 'Drinkstrategie';
    prompt = `${persona}

Analyseer de drinkvensters van deze kelder en geef een concrete drinkstrategie:
1. NU OPENEN — flessen op hun top of die hun venster naderen; benoem waarom
2. DREIGT VOORBIJ — wijnen waarvan het venster (bijna) verstreken is; drinken of afschrijven?
3. LATEN LIGGEN — wat heeft nog bewaartijd nodig en tot wanneer
4. SPREIDING — is er een drinkvenster-piek die problemen geeft, en hoe te spreiden

Kelder: ${JSON.stringify(portfolio).slice(0, 9000)}`;
  } else if (type === 'proefadvies') {
    title = 'Proefadvies';
    prompt = `${persona}

Geef per opvallende wijn (max 8, kies de interessantste) een kort proef- en serveeradvies: optimale serveertemperatuur, decanteer-advies, waar op te letten in neus en smaak gezien producent/jaargang/regio, en of de wijn nu al openheid toont of nog gesloten is. Sluit af met 2-3 wijnen die zich nu het best laten proeven.

Kelder: ${JSON.stringify(portfolio).slice(0, 9000)}`;
  } else if (type === 'vintage') {
    title = 'Jaargang-inzicht';
    prompt = `${persona}

Beoordeel de jaargangen in deze kelder. Geef per belangrijke regio/jaargang-combinatie een korte kwaliteitsbeoordeling op basis van erkende vintage-reports: was dit een sterke jaargang voor die regio? Welke wijnen zijn naar verwachting topexemplaren van hun jaargang, welke zijn relatief zwak of vroeg-rijpend? Wees concreet.

Kelder: ${JSON.stringify(portfolio).slice(0, 9000)}`;
  } else if (type === 'vraag') {
    title = userQuestion ? ('Vraag: ' + userQuestion.slice(0, 60) + (userQuestion.length > 60 ? '…' : '')) : 'Vraag aan Claude';
    prompt = `${persona}

De kenner stelt de volgende vraag over zijn eigen kelder. Beantwoord concreet en onderbouwd, en verwijs waar relevant naar specifieke flessen uit de kelder.

VRAAG: ${userQuestion || ''}

Kelder: ${JSON.stringify(portfolio).slice(0, 9000)}`;
  }

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': settings.apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: settings.model, max_tokens: 3000, messages: [{ role: 'user', content: prompt }] })
    });
    if (!resp.ok) { const t = await resp.text(); throw new Error('API ' + resp.status + ': ' + t.slice(0, 200)); }
    const data = await resp.json();
    recordAPIUsage(settings.model, 'insight', data.usage);
    const text = data.content[0].text;
    state.insights.push({ id: uid(), date: new Date().toISOString(), type, title, content: text });
    saveData();
    render();
    showToast('Advies gegenereerd' + (state.apiUsage.length > 0 ? ' · ' + fmtCost(state.apiUsage[state.apiUsage.length-1].costEur) : ''));
  } catch (e) {
    showToast('Fout: ' + e.message, true);
  }
}

// ============ CLAUDE PROEFNOTITIE (ter vergelijking) ============
function formatClaudeNote(text) {
  // Zet **kop** en sectiekoppen om naar lichte opmaak; rest als alinea's
  let safe = escapeHtml(text);
  safe = safe.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Regels die met een bekende SAT-sectie beginnen vetten we
  safe = safe.replace(/^(Aanblik|Neus|Smaak|Conclusie|Conclusies|Kwaliteit|Drinkrijpheid|Serveeradvies|BLIC)\s*[:\-]/gim,
    '<span class="claude-note-sect">$1:</span>');
  return safe.split(/\n{2,}/).map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
}

async function generateClaudeNote(wineId) {
  const w = state.wines.find(x => x.id === wineId);
  if (!w) return;
  if (!settings.apiKey) {
    showToast('Proefnotitie vereist een API-key — stel een sleutel in', true);
    setTimeout(openSettings, 1200);
    return;
  }
  showToast('Claude proeft mee...');

  const facts = {
    producent: w.producer, naam: w.name, jaargang: w.vintage, type: w.type,
    regio: w.region, land: w.country, classificatie: w.classification,
    druiven: w.grapes, alcohol: w.alcohol
  };

  const prompt = `Je bent een ervaren sommelier (WSET-gediplomeerd). Schrijf een verwachte proefnotitie voor onderstaande wijn volgens de WSET Systematic Approach to Tasting. Je hebt de wijn niet fysiek voor je; baseer je op producent, jaargang, regio, druiven en klassering, en op je kennis van die stijl en jaargang. Wees concreet en eerlijk over onzekerheid; dit is een verwachting bedoeld om naast een eigen waarneming te leggen.

Schrijf in vloeiend Nederlands en volg exact deze structuur:
Aanblik: helderheid, intensiteit, kleur.
Neus: conditie, intensiteit, ontwikkeling, primaire/secundaire/tertiaire aroma's.
Smaak: zoet, zuur, tannine, alcohol, body, smaakintensiteit, afdronk/lengte.
Conclusie: kwaliteitsoordeel met BLIC-argumentatie (Balance, Length, Intensity, Complexity) en drinkrijpheid.
Serveeradvies: temperatuur, decanteren, glas.

Wijn: ${JSON.stringify(facts)}

Geef je antwoord als JSON, zonder markdown:
{"quality":"<kwaliteitsniveau in 1-3 woorden, bv. 'Zeer goed'>","readiness":"<drinkrijpheid in 1-3 woorden, bv. 'Op dronk' / 'Nog te jong'>","note":"<de volledige proefnotitie als tekst met de secties op aparte regels>"}`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': settings.apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: settings.model, max_tokens: 1600, messages: [{ role: 'user', content: prompt }] })
    });
    if (!resp.ok) { const t = await resp.text(); throw new Error('API ' + resp.status + ': ' + t.slice(0, 200)); }
    const data = await resp.json();
    recordAPIUsage(settings.model, 'insight', data.usage);
    let raw = data.content[0].text.trim().replace(/^```json\s*/i, '').replace(/```$/,'').trim();
    let parsed;
    try { parsed = JSON.parse(raw); }
    catch (e) { parsed = { quality: '', readiness: '', note: raw }; }

    const wine = state.wines.find(x => x.id === wineId);
    if (!wine) return;
    wine.claudeNote = {
      date: new Date().toISOString(),
      quality: parsed.quality || '',
      readiness: parsed.readiness || '',
      content: parsed.note || raw
    };
    saveData();
    if (state.detailWineId === wineId) openDetail(wineId);
    showToast('Proefnotitie gereed' + (state.apiUsage.length > 0 ? ' · ' + fmtCost(state.apiUsage[state.apiUsage.length-1].costEur) : ''));
  } catch (e) {
    showToast('Fout: ' + e.message, true);
  }
}

function deleteClaudeNote(wineId) {
  if (!confirm("Claude's proefnotitie verwijderen?")) return;
  const w = state.wines.find(x => x.id === wineId);
  if (!w) return;
  delete w.claudeNote;
  saveData();
  if (state.detailWineId === wineId) openDetail(wineId);
}

function resetUsageTracking() {
  if (!confirm('Verbruiksgeschiedenis wissen? Dit beïnvloedt geen kosten bij Anthropic, alleen de lokale tracking in deze tool.')) return;
  state.apiUsage = [];
  saveData();
  closeModal('settingsModal');
  openSettings();
  showToast('Verbruiksgeschiedenis gewist');
}

function saveSettings() {
  settings.apiKey = document.getElementById('set_apiKey').value.trim();
  settings.model = document.getElementById('set_model').value;
  settings.vatRate = Number(document.getElementById('set_vat').value) || 21;
  settings.defaultMarginPct = Number(document.getElementById('set_margin').value) || 250;
  settings.defaultGlassFraction = Number(document.getElementById('set_glass').value) || 5;
  saveSettingsData();
  closeModal('settingsModal');
  render();
  showToast('Instellingen opgeslagen');
}

function wipeAll() {
  if (!confirm('Weet je zeker dat je ALLE data wilt verwijderen? Dit kan niet ongedaan worden gemaakt.')) return;
  if (!confirm('Echt zeker? Maak eerst een export voor backup.')) return;
  state.wines = []; state.suppliers = []; state.sales = []; state.budgets = []; state.insights = [];
  state.openBottles = []; state.blindSessions = []; state.flights = [];
  state.apiUsage = [];
  saveData();
  closeModal('settingsModal');
  render();
  showToast('Alle data gewist');
}

// "Nieuwe lege start": back-up bestand maken, daarna wissen + welkomstmelding tonen
function freshStart() {
  const wineCount = state.wines.length;
  const hasAnyData = wineCount > 0 || state.suppliers.length > 0 || state.sales.length > 0;

  let confirmMsg;
  if (hasAnyData) {
    confirmMsg = `Nieuwe lege start?\n\n` +
      `1. Er wordt eerst een back-up-bestand gedownload met al uw huidige data (${wineCount} wijn${wineCount === 1 ? '' : 'en'}).\n` +
      `2. Daarna wordt alle data gewist.\n` +
      `3. De tool herstart met een lege staat en de welkomstmelding.\n\n` +
      `U kunt later met "Open bestand" uw oude data terugzetten.`;
  } else {
    confirmMsg = 'Nieuwe lege start? De welkomstmelding verschijnt opnieuw.';
  }

  if (!confirm(confirmMsg)) return;

  // Step 1: export (only if there's data worth backing up)
  if (hasAnyData) {
    try {
      exportData();
    } catch (e) {
      if (!confirm('Back-up mislukt: ' + (e.message || 'onbekende fout') + '\n\nToch doorgaan met wissen? Uw data gaat dan onherroepelijk verloren.')) {
        return;
      }
    }
  }

  // Step 2: clear all state
  state.wines = []; state.suppliers = []; state.sales = []; state.budgets = []; state.insights = [];
  state.openBottles = []; state.blindSessions = []; state.flights = [];
  state.apiUsage = [];
  state.currentMode = 'home';
  state.currentView = 'dashboard';

  // Step 3: clear persistent keys including onboarded flag so welcome modal returns
  try {
    localStorage.removeItem(STORAGE_KEY);
    localStorage.removeItem(LAST_EXPORT_KEY);
    localStorage.removeItem(ONBOARDED_KEY);
  } catch (e) { /* ignore */ }

  // Step 4: clear IndexedDB (primaire opslag) en herlaad daarna
  closeModal('settingsModal');
  const reload = () => setTimeout(() => location.reload(), 300);
  try {
    const delReq = indexedDB.deleteDatabase(IDB_NAME);
    delReq.onsuccess = reload;
    delReq.onerror = reload;
    delReq.onblocked = reload;
    // Vangnet: herlaad sowieso na 2s
    setTimeout(reload, 2000);
  } catch (e) { reload(); }
}

// ============ EXPORT / IMPORT ============
function exportData() {
  const data = {
    version: 3, exportDate: new Date().toISOString(),
    wines: state.wines, suppliers: state.suppliers,
    sales: state.sales, budgets: state.budgets, insights: state.insights,
    openBottles: state.openBottles, blindSessions: state.blindSessions, flights: state.flights,
    apiUsage: state.apiUsage,
    settings: { ...settings, apiKey: undefined }
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const filename = `cave-privee-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
  // Onthoud datum van laatste export voor de waarschuwingsstip
  safeStorageSet(LAST_EXPORT_KEY, new Date().toISOString());
  updateExportWarnIndicator();
  const wineCount = state.wines.length;
  showToast(`Bestand "${filename}" bewaard · ${wineCount} wijn${wineCount === 1 ? '' : 'en'}`);
}

// Globale referentie + DOM-koppeling: iOS Safari kan een losse, niet-gekoppelde
// file-input weggooien (garbage collection) vóórdat onchange vuurt. Symptoom:
// kiezer opent, bestand gekozen, maar er gebeurt niets.
let _importInput = null;

function importFromFile(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onerror = () => { showToast('Kon bestand niet lezen', true); resolve(false); };
    reader.onload = async ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!confirm(`Importeer ${(data.wines||[]).length} wijnen, ${(data.suppliers||[]).length} leveranciers, ${(data.sales||[]).length} verkopen? Bestaande data wordt overschreven.`)) { resolve(false); return; }

        // Foto's uit oudere back-ups kunnen 500KB+ per stuk zijn; dat overschrijdt
        // Safari's localStorage-limiet (~5MB UTF-16). Hercomprimeer vóór opslaan.
        const photoCount = (data.wines || []).filter(w => w.photo && w.photo.length > 250 * 1024).length;
        if (photoCount > 0) {
          showToast(`Foto's optimaliseren (${photoCount})...`);
          const saved = await compressWinePhotos(data.wines);
          if (saved > 0) console.log(`Import: ${(saved/1024/1024).toFixed(2)}M tekens bespaard door foto-hercompressie`);
        }

        state.wines = data.wines || [];
        state.suppliers = data.suppliers || [];
        state.sales = data.sales || [];
        state.budgets = data.budgets || [];
        state.insights = data.insights || [];
        state.openBottles = data.openBottles || [];
        state.blindSessions = data.blindSessions || [];
        state.flights = data.flights || [];
        state.apiUsage = data.apiUsage || [];
        const ok = await saveDataAsync();
        if (!ok) {
          showToast('Import gelukt, maar opslaan faalde. Controleer of de browser opslag toestaat (geen priv\u00e9modus).', true);
          render();
          resolve(false);
          return;
        }
        // Een import betekent dat de gebruiker een actuele bestandskopie heeft
        // — als de export-datum recenter is dan onze tracking, gebruik die
        if (data.exportDate) {
          const importDate = new Date(data.exportDate);
          if (!isNaN(importDate.getTime())) {
            safeStorageSet(LAST_EXPORT_KEY, data.exportDate);
          }
        }
        render();
        updateExportWarnIndicator();
        const wineCount = state.wines.length;
        showToast(`Bestand geladen · ${wineCount} wijn${wineCount === 1 ? '' : 'en'}`);
        resolve(true);
      } catch (e) { showToast('Ongeldig bestand: ' + (e.message || e), true); resolve(false); }
    };
    reader.readAsText(file);
  });
}

function importData() {
  // Hergebruik/opruimen van eventueel eerdere input
  if (_importInput && _importInput.parentNode) _importInput.parentNode.removeChild(_importInput);
  const input = document.createElement('input');
  input.type = 'file';
  // Ruim accept: iOS kan .json-bestanden grijs maken bij strikte MIME-matching
  input.accept = '.json,application/json,text/plain,text/json';
  input.style.cssText = 'position:fixed; left:-9999px; top:0; opacity:0;';
  input.onchange = e => {
    const file = e.target.files && e.target.files[0];
    if (file) importFromFile(file);
    if (input.parentNode) input.parentNode.removeChild(input);
    _importInput = null;
  };
  document.body.appendChild(input);
  _importInput = input; // referentie vasthouden tegen GC
  input.click();
}

// ---- SERVICE VIEW (vanavond / open flessen) ----
function renderService(main) {
  const openBottles = state.openBottles.filter(b => !b.closedAt);
  const kelder = state.wines.filter(w => w.status === 'kelder');

  let html = `
    <div class="toolbar">

      <button class="btn btn-primary" style="margin-left:auto;" onclick="openBottleDialog()">+ Fles openen</button>
    </div>
  `;

  if (openBottles.length === 0) {
    // Empty state — clear distinction from Kelder
    html += `<div class="ai-insight-card" style="text-align:center; padding: 50px 32px;">
      <div style="font-family:'Italiana', serif; font-size: 40px; color: var(--gold-base); margin-bottom: 18px;">⟁</div>
      <h3 style="justify-content:center; font-family:'Cormorant Garamond', serif; font-size: 22px; color: var(--gold-bright); margin-bottom: 14px;">U heeft nog geen flessen open</h3>
      <div style="font-family:'Cormorant Garamond',serif; font-style:italic; color:var(--text-dim); margin: 0 auto; max-width: 480px; font-size: 15px; line-height: 1.6;">
        Deze pagina houdt bij welke flessen u onlangs heeft <strong>geopend</strong> — zodat u weet hoeveel dagen ze nog goed zijn, hoeveel glazen er nog inzitten, en welke u zou moeten opdrinken.
        <br><br>
        Klik op <strong>+ Fles openen</strong> wanneer u een fles uit de kelder neemt om te drinken.
      </div>
    </div>`;
  } else {
    html += `<div class="dashboard-section"><h2>Nu open <small>${openBottles.length} fles${openBottles.length === 1 ? '' : 'sen'}</small></h2><div class="open-bottles-grid">`;
    openBottles.forEach(b => {
      const w = state.wines.find(x => x.id === b.wineId);
      if (!w) return;
      const openedDate = new Date(b.openedAt);
      const daysOpen = Math.floor((new Date() - openedDate) / (1000 * 60 * 60 * 24));
      const expectedDays = b.expectedDays || getRecommendedOpenDays(w);
      const pctUsed = Math.min(100, (daysOpen / expectedDays) * 100);
      const isWarning = daysOpen >= expectedDays - 1 && daysOpen < expectedDays;
      const isOver = daysOpen >= expectedDays;
      const status = isOver ? 'over' : isWarning ? 'warning' : 'fresh';

      const glassesLeft = b.totalGlasses ? Math.max(0, b.totalGlasses - (b.glassesPoured || 0)) : null;

      html += `<div class="open-bottle-card ${status}">
        <div class="open-bottle-header">
          <div>
            <div style="font-size:10px; color:var(--gold-base); letter-spacing:0.2em; text-transform:uppercase;">${escapeHtml(w.producer || '')}</div>
            <div style="font-family:'Cormorant Garamond',serif; font-size:18px; color:var(--text); margin-top:3px;">${escapeHtml(w.name || '')} ${w.vintage || ''}</div>
            ${w.type ? `<div style="font-size:11px; color:var(--text-dim); font-style:italic; margin-top:2px;">${escapeHtml(w.type)} · ${escapeHtml(w.region || w.country || '')}</div>` : ''}
          </div>
          <button class="btn btn-sm btn-ghost" onclick="closeBottle('${b.id}')" title="Fles sluiten">×</button>
        </div>

          <div class="open-bottle-meta">
            <div><span style="color:var(--gold-base);">Geopend:</span> ${fmtDateShort(b.openedAt)} <span style="color:var(--text-faint);">(${daysOpen}d geleden)</span></div>
            ${glassesLeft !== null ? `<div><span style="color:var(--gold-base);">Glazen:</span> ${b.glassesPoured || 0} / ${b.totalGlasses} <span style="color:var(--text-faint);">(${glassesLeft} resterend)</span></div>` : ''}
          </div>
          <div class="freshness-bar">
            <div class="freshness-fill ${status}" style="width:${pctUsed}%;"></div>
            <div class="freshness-label">${isOver ? 'OVER HOUDBAARHEID' : `Dag ${daysOpen} van ${expectedDays}`}</div>
          </div>
          ${b.notes ? `<div style="font-family:'Cormorant Garamond',serif; font-style:italic; font-size:12px; color:var(--text-dim); margin-top:8px;">${escapeHtml(b.notes)}</div>` : ''}
          <div class="open-bottle-actions">
            <button class="btn btn-sm" onclick="pourGlass('${b.id}')">+ Glas inschenken</button>
            <button class="btn btn-sm" onclick="openTastingModal('${w.id}')">+ Proefnotitie</button>
            <button class="btn btn-sm btn-ghost" onclick="openDetail('${w.id}')">Details</button>
          </div>
        </div>
      </div>`;
    });
    html += `</div></div>`;
  }

  // Drink-nu suggesties — compact format, duidelijk anders dan kelder-kaarten
  const drinkNow = kelder.filter(w => {
    const dw = getDrinkWindow(w);
    return (dw.status === 'peak' || dw.status === 'ready') && (Number(w.bottles) || 0) > 0;
  }).slice(0, 5);

  if (drinkNow.length > 0) {
    html += `<div class="dashboard-section" style="margin-top: 36px;">
      <h2 style="font-size: 14px; letter-spacing: 0.18em;">SUGGESTIES OM TE OPENEN <small>wijnen op drinkmoment</small></h2>

          <div style="font-family:'Cormorant Garamond',serif; font-size:16px; color:var(--text);">${escapeHtml(w.name || '')} · ${w.vintage || ''}</div>
        </div>
        <div style="font-size: 11px; color: ${dw.status === 'peak' ? 'var(--green-bright)' : 'var(--gold-base)'}; font-style: italic; white-space: nowrap;">
          ${dw.status === 'peak' ? '★ op top' : '✓ drinkrijp'} · ${w.bottles}fl
        </div>
        <button class="btn btn-sm btn-primary" onclick="openBottleDialogFor('${w.id}')" style="white-space: nowrap;">Open fles</button>
      </div>`;
    });
    html += `</div></div>`;
  }

  main.innerHTML = html;
}

function getRecommendedOpenDays(wine) {
  // Heuristic by type
  const t = (wine.type || '').toLowerCase();
  if (t === 'mousserend') return 2;
  if (t === 'wit') return 3;
  if (t === 'rosé') return 3;
  if (t === 'oranje') return 4;
  if (t === 'rood') {
    const tannin = Number(wine.profile?.tannin) || 5;
    return tannin >= 7 ? 5 : 3;
  }
  if (t === 'zoet' || t === 'versterkt') return 14;
  return 3;
}

function openBottleDialogFor(wineId) {
  openBottleDialog();
  // Pre-select the wine after modal renders
  setTimeout(() => {
    const sel = document.getElementById('ob_wine');
    if (sel) { sel.value = wineId; if (typeof updateOpenBottleSuggestion === 'function') updateOpenBottleSuggestion(); }
  }, 100);
}

          <select id="ob_pourFirst"><option value="0">Nee, alleen openen</option><option value="1" selected>Ja, 1 glas</option></select>
        </div>
        <div class="field form-row"><label>Notitie</label><textarea id="ob_notes" rows="2" placeholder="Voor wie, gelegenheid, eerste indruk..."></textarea></div>
      </div>
      <div id="ob_suggestion" style="margin-top:14px; padding:10px 14px; background:var(--bg-input); border-radius:2px; font-family:'Cormorant Garamond',serif; font-style:italic; color:var(--text-dim); font-size:13px; display:none;"></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('openBottleModal')">Annuleren</button>
      <button class="btn btn-primary" onclick="saveOpenBottle()" style="margin-left:auto;">Open fles</button>
    </div>
  </div>`;
  openModal('openBottleModal', content);
}

function updateOpenBottleSuggestion() {
  const wineId = document.getElementById('ob_wine').value;
  const w = state.wines.find(x => x.id === wineId);
  const sug = document.getElementById('ob_suggestion');
  if (!w) { sug.style.display = 'none'; return; }
  const days = getRecommendedOpenDays(w);
  document.getElementById('ob_expectedDays').value = days;
  let advice = `Geadviseerde houdbaarheid: ${days} dagen na openen (op basis van type).`;
  if (w.servingTemp) advice += ` Serveer op ${w.servingTemp}.`;
  if (w.decanting) advice += ` ${w.decanting}.`;
  sug.textContent = advice;
  sug.style.display = 'block';
}

function saveOpenBottle() {
  const wineId = document.getElementById('ob_wine').value;
  if (!wineId) { showToast('Kies een wijn', true); return; }
  const w = state.wines.find(x => x.id === wineId);
  if (!w || (Number(w.bottles) || 0) < 1) { showToast('Geen flessen beschikbaar', true); return; }
  const pourFirst = Number(document.getElementById('ob_pourFirst').value);

  const bottle = {
    id: uid(),
    wineId,
    openedAt: document.getElementById('ob_openedAt').value || new Date().toISOString(),
    expectedDays: Number(document.getElementById('ob_expectedDays').value) || 3,
    totalGlasses: Number(document.getElementById('ob_totalGlasses').value) || 5,
    glassesPoured: pourFirst,
    notes: document.getElementById('ob_notes').value.trim(),
    closedAt: null
  };
  state.openBottles.push(bottle);
  w.bottles = Math.max(0, (Number(w.bottles) || 0) - 1);
  saveData();
  closeModal('openBottleModal');
  render();
  showToast('Fles geopend');
}

function pourGlass(bottleId) {
  const b = state.openBottles.find(x => x.id === bottleId);
  if (!b) return;
  b.glassesPoured = (b.glassesPoured || 0) + 1;
  if (b.totalGlasses && b.glassesPoured >= b.totalGlasses) {
    if (confirm('Laatste glas ingeschonken. Fles automatisch sluiten?')) {
      b.closedAt = new Date().toISOString();
    }
  }
  saveData();
  render();
  showToast('Glas ingeschonken');
}

function closeBottle(bottleId) {
  const b = state.openBottles.find(x => x.id === bottleId);
  if (!b) return;
  const action = confirm('Fles sluiten?\n\n[OK] = sluiten (afgemaakt of weggegooid)\n[Annuleren] = niets doen');
  if (!action) return;
  b.closedAt = new Date().toISOString();
  saveData();
  render();
  showToast('Fles gesloten');
}

async function runPairing() {
  const dish = document.getElementById('pair_dish').value.trim();
  if (!dish) { showToast('Beschrijf het gerecht', true); return; }
  if (!settings.apiKey) {
    showToast('Pairing-engine vereist een API-key — stel een sleutel in', true);
    setTimeout(openSettings, 1200);
    return;
  }

  const guests = Number(document.getElementById('pair_guests').value) || 2;
  const budget = Number(document.getElementById('pair_budget').value);
  const prefType = document.getElementById('pair_prefType').value;
  const style = document.getElementById('pair_style').value;

  // Build cellar context — only available wines
  const available = state.wines.filter(w => w.status === 'kelder' && (Number(w.bottles) || 0) > 0)
    .filter(w => !prefType || w.type === prefType)
    .filter(w => !budget || !w.purchasePrice || Number(w.purchasePrice) <= budget * 1.2);

  if (available.length === 0) {
    document.getElementById('pairResults').innerHTML = `<div class="ai-insight-card"><div class="insight-content">Geen wijnen in kelder voldoen aan filters. Verbreed criteria.</div></div>`;
    return;
  }

  const cellarSummary = available.map(w => ({
    id: w.id, producent: w.producer, naam: w.name, jaargang: w.vintage,
    type: w.type, regio: w.region, land: w.country, druiven: w.grapes,
    flessen: w.bottles, alcohol: w.alcohol, prijs: w.purchasePrice,
    profile: w.profile, pairings: w.pairings
  }));

  document.getElementById('pairResults').innerHTML = `<div class="ai-insight-card"><div style="display:flex; align-items:center; gap:14px;"><div class="ai-spinner"></div><div style="font-family:'Cormorant Garamond',serif; font-style:italic;">AI denkt na over de juiste combinatie...</div></div></div>`;

  const prompt = `Je bent een ervaren sommelier. Een gast wil ${guests} pers. genieten van: "${dish}".
${budget ? `Budget: ca. €${budget} per fles. ` : ''}${prefType ? `Voorkeur: ${prefType} wijn. ` : ''}${style === 'klassiek' ? 'Stijl: klassieke/conservatieve pairing (zoals een boek het zou voorschrijven). ' : style === 'gewaagd' ? 'Stijl: gewaagde/contrasterende pairing (verrassing). ' : ''}

Beschikbare wijnen uit de eigen kelder:
${JSON.stringify(cellarSummary).slice(0, 7000)}

Geef in vloeiend Nederlands een ranking van de TOP 3 wijnen uit deze kelder die het best bij dit gerecht passen. Vermeld voor elke aanbeveling:
1. Wijn-naam (exact zoals in lijst)
2. Wine-ID (zoals in lijst, voor referentie)
3. Korte pairing-redenering (max 3 zinnen) — focus op smaakdimensies (zuur, tannine, body, aroma's) i.r.t. het gerecht
4. Serveertip (serveertemp, decanteren, glas, moment in maaltijd)

Format als JSON:
{
  "topPick": "wine-id van favoriet",
  "reasoning": "korte intro waarom dit gerecht deze pairing-uitdaging heeft",
  "recommendations": [
    {"wineId": "id", "rank": 1, "reasoning": "...", "tip": "..."},
    {"wineId": "id", "rank": 2, "reasoning": "...", "tip": "..."},
    {"wineId": "id", "rank": 3, "reasoning": "...", "tip": "..."}
  ]
}

Geef ALLEEN de JSON terug. Geen markdown, geen voorgaande tekst.`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': settings.apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: settings.model, max_tokens: 2500, messages: [{ role: 'user', content: prompt }] })
    });
    if (!resp.ok) throw new Error('API ' + resp.status);
    const data = await resp.json();
    recordAPIUsage(settings.model, 'pairing', data.usage);
    const text = data.content[0].text;
    const match = text.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('Geen geldig antwoord');
    const result = JSON.parse(match[0]);
    state.pairingResults = { dish, guests, budget, prefType, style, result, timestamp: new Date().toISOString() };
    renderPairResults();
  } catch (e) {
    document.getElementById('pairResults').innerHTML = `<div class="ai-insight-card" style="border-color:var(--danger);"><div class="insight-content" style="color:var(--danger);">Fout: ${escapeHtml(e.message)}</div></div>`;
  }
}

function initiateBlindProef() {
  const selected = Array.from(document.querySelectorAll('input[name="blindWine"]:checked')).map(i => i.value);
  if (selected.length === 0) { showToast('Selecteer minstens één wijn', true); return; }
  state.blindCurrent = {
    id: uid(),
    date: new Date().toISOString(),
    wineIds: selected,
    currentIndex: 0,
    guesses: {},

function scoreBlindGuess(guess, wine) {
  const breakdown = [];

  // Type — 10 punten
  let typePoints = 0;
  if (guess.type && wine.type) {
    typePoints = guess.type.toLowerCase() === wine.type.toLowerCase() ? 10 : 0;
  }
  breakdown.push({ aspect: 'Type', guess: guess.type, actual: wine.type, points: typePoints });

  // Land — 15 punten
  let countryPoints = 0;
  if (guess.country && wine.country) {
    countryPoints = guess.country.toLowerCase().includes(wine.country.toLowerCase()) ||
                    wine.country.toLowerCase().includes(guess.country.toLowerCase()) ? 15 : 0;
  }
  breakdown.push({ aspect: 'Land', guess: guess.country, actual: wine.country, points: countryPoints });

  // Regio — 20 punten (partial match toegestaan)
  let regionPoints = 0;
  if (guess.region && wine.region) {
    const g = guess.region.toLowerCase();
    const a = wine.region.toLowerCase();
    if (g === a) regionPoints = 20;
    else if (g.includes(a.split(' ')[0]) || a.includes(g.split(' ')[0])) regionPoints = 12;
    else if (g.split(' ').some(w => a.includes(w))) regionPoints = 6;
  }
  breakdown.push({ aspect: 'Regio', guess: guess.region, actual: wine.region, points: regionPoints });

  // Druiven — 20 punten (woord-match)
  let grapePoints = 0;
  if (guess.grapes && wine.grapes) {
    const g = guess.grapes.toLowerCase();
    const a = wine.grapes.toLowerCase();
    const gWords = g.split(/[\s,;]+/);
    const aWords = a.split(/[\s,;]+/);
    const matches = gWords.filter(w => w.length > 3 && aWords.some(aw => aw.includes(w) || w.includes(aw)));
    if (matches.length >= 2) grapePoints = 20;
    else if (matches.length === 1) grapePoints = 12;
  }
  breakdown.push({ aspect: 'Druif', guess: guess.grapes, actual: wine.grapes, points: grapePoints });

  // Jaargang — 15 punten (±2 jaar)
  let vintagePoints = 0;
  if (guess.vintage && wine.vintage) {
    const diff = Math.abs(Number(guess.vintage) - Number(wine.vintage));
    if (diff === 0) vintagePoints = 15;
    else if (diff <= 1) vintagePoints = 10;
    else if (diff <= 2) vintagePoints = 6;
    else if (diff <= 4) vintagePoints = 2;
  }
  breakdown.push({ aspect: 'Jaargang', guess: guess.vintage, actual: wine.vintage, points: vintagePoints });

  // Producent — 15 punten (zelden goed)
  let producerPoints = 0;
  if (guess.producer && wine.producer) {
    const g = guess.producer.toLowerCase();
    const a = wine.producer.toLowerCase();
    if (g === a) producerPoints = 15;
    else if (g.includes(a) || a.includes(g)) producerPoints = 10;
  }
  breakdown.push({ aspect: 'Producent', guess: guess.producer, actual: wine.producer, points: producerPoints });

  // Prijs — 5 punten
  let pricePoints = 0;
  if (guess.priceCat && wine.purchasePrice) {
    const p = Number(wine.purchasePrice);
    const cats = { lowest: [0, 25], low: [25, 50], mid: [50, 100], high: [100, 250], premium: [250, Infinity] };
    const range = cats[guess.priceCat];
    if (range && p >= range[0] && p < range[1]) pricePoints = 5;
  }
  breakdown.push({ aspect: 'Prijsklasse', guess: guess.priceCat, actual: wine.purchasePrice ? fmtPrice(wine.purchasePrice, false) : '', points: pricePoints });

  const total = breakdown.reduce((s, b) => s + b.points, 0);
  return { total, breakdown };
}

function blindNext() {
  state.blindCurrent.currentIndex++;
  state.blindCurrent.phase = 'tasting';
  render();
}

function finalizeBlindSession() {
  const b = state.blindCurrent;
  let total = 0;
  const wineScores = {};
  b.wineIds.forEach(id => {
    const w = state.wines.find(x => x.id === id);
    if (w && b.guesses[id]) {
      const score = scoreBlindGuess(b.guesses[id], w);
      wineScores[id] = score.total;
      total += score.total;
    }
  });
  const avg = b.wineIds.length > 0 ? Math.round(total / b.wineIds.length) : 0;
  const session = {
    id: b.id, date: b.date, wineIds: b.wineIds, guesses: b.guesses,
    wineScores, totalScore: avg
  };
  state.blindSessions.push(session);
  state.blindCurrent = null;
  saveData();
  render();
  showToast(`Sessie opgeslagen — gemiddelde ${avg}/100`);
}

function cancelBlindSession() {
  if (!confirm('Sessie afbreken? Voortgang gaat verloren.')) return;
  state.blindCurrent = null;
  render();
}

function deleteBlindSession(id) {
  if (!confirm('Sessie verwijderen?')) return;
  state.blindSessions = state.blindSessions.filter(s => s.id !== id);
  saveData();
  render();
}

function reviewBlindSession(id) {
  const s = state.blindSessions.find(x => x.id === id);
  if (!s) return;
  let html = `<div class="modal modal-wide">
    <div class="modal-header"><div class="modal-title">Blind-proef ${fmtDate(s.date)} — ${s.totalScore}/100</div>
      <button class="modal-close" onclick="closeModal('blindReviewModal')">×</button></div>
    <div class="modal-body">`;

  s.wineIds.forEach((wid, idx) => {
    const w = state.wines.find(x => x.id === wid);
    const guess = s.guesses[wid] || {};
    const wineScore = s.wineScores?.[wid];
    if (!w) return;
    const score = scoreBlindGuess(guess, w);
    html += `<div class="ai-insight-card" style="margin-bottom:14px;">
      <h3>${idx + 1}. ${escapeHtml(w.producer || '')} ${escapeHtml(w.name || '')} ${w.vintage || ''} <span style="color:var(--gold); margin-left:auto; font-weight:300;">${score.total}/100</span></h3>
      <table class="data-table">
        <thead><tr><th>Aspect</th><th>Gok</th><th>Werkelijk</th><th class="num">Punten</th></tr></thead>
        <tbody>${score.breakdown.map(b => `<tr><td>${b.aspect}</td><td><em>${escapeHtml(b.guess || '—')}</em></td><td>${escapeHtml(b.actual || '—')}</td><td class="num">${b.points > 0 ? '+' + b.points : b.points || '0'}</td></tr>`).join('')}</tbody>
      </table>
      ${guess.notes ? `<div style="margin-top:10px; font-family:'Cormorant Garamond',serif; font-style:italic; color:var(--text-dim); font-size:13px;">"${escapeHtml(guess.notes)}"</div>` : ''}
    </div>`;
  });

  html += `</div><div class="modal-footer"><button class="btn" onclick="closeModal('blindReviewModal')" style="margin-left:auto;">Sluiten</button></div></div>`;
  openModal('blindReviewModal', html);
}

function saveFlight(existingId) {
  const wineIds = Array.from(document.querySelectorAll('input[name="flightWine"]:checked')).map(i => i.value);
  if (wineIds.length < 2) { showToast('Selecteer minstens 2 wijnen', true); return; }
  const data = {
    id: existingId || uid(),
    type: document.getElementById('fl_type').value,
    date: document.getElementById('fl_date').value || new Date().toISOString().slice(0,10),
    name: document.getElementById('fl_name').value.trim() || 'Degustatie',
    wineIds,
    notes: document.getElementById('fl_notes').value.trim()
  };
  if (existingId) {
    const i = state.flights.findIndex(f => f.id === existingId);
    if (i >= 0) state.flights[i] = data;
  } else {
    state.flights.push(data);
  }
  saveData();
  closeModal('flightModal');
  render();
  showToast('Degustatie opgeslagen');
}

function deleteFlight(id) {

  saveData();
  closeModal('flightModal');
  render();
}

function saveSATTasting() {
  const w = state.wines.find(x => x.id === state.satForWineId);
  if (!w) return;
  const get = id => document.getElementById(id)?.value || '';
  const getChecked = name => Array.from(document.querySelectorAll(`input[name="${name}"]:checked`)).map(i => i.value);

  const sat = {
    clarity: get('sat_clarity'),
    intensity: get('sat_intensity'),
    color: get('sat_color'),
    appOther: getChecked('sat_appOther'),
    condition: get('sat_condition'),
    noseIntensity: get('sat_noseIntensity'),
    development: get('sat_development'),
    aromaPrimary: getChecked('sat_primary'),
    aromaSecondary: getChecked('sat_secondary'),
    aromaTertiary: getChecked('sat_tertiary'),
    noseNote: get('sat_noseNote').trim(),
    sweetness: get('sat_sweetness'),
    palAcidity: get('sat_palAcidity'),
    palTannin: get('sat_palTannin'),
    palAlcohol: get('sat_palAlcohol'),
    palBody: get('sat_palBody'),
    palIntensity: get('sat_palIntensity'),
    finish: get('sat_finish'),
    palateNote: get('sat_palateNote').trim(),
    quality: get('sat_quality'),
    readiness: get('sat_readiness'),
    qualityReasoning: get('sat_qualityReasoning').trim(),
  };

  const entry = {
    id: uid(),
    date: get('sat_date'),
    rating: state.tastingRating,
    occasion: get('sat_occasion').trim(),
    nose: sat.noseNote,
    palate: sat.palateNote,
    sat: sat,
    method: 'WSET-SAT'
  };

  w.tastings = w.tastings || [];
  w.tastings.push(entry);
  w.updatedAt = new Date().toISOString();
  saveData();
  closeModal('satModal');
  if (state.detailWineId) openDetail(state.detailWineId);
  else render();
  showToast('SAT-notitie opgeslagen');
}

// ============ SAT-EXTENDED DETAIL VIEW ============

      ${sat.sweetness ? `<div><span style="color:var(--gold-dim); font-size:10px; letter-spacing:0.1em; text-transform:uppercase;">Zoet</span><br>${escapeHtml(sat.sweetness)}</div>` : ''}
      ${sat.palAcidity ? `<div><span style="color:var(--gold-dim); font-size:10px; letter-spacing:0.1em; text-transform:uppercase;">Zuur</span><br>${escapeHtml(sat.palAcidity)}</div>` : ''}
      ${sat.palTannin ? `<div><span style="color:var(--gold-dim); font-size:10px; letter-spacing:0.1em; text-transform:uppercase;">Tannine</span><br>${escapeHtml(sat.palTannin)}</div>` : ''}
      ${sat.palBody ? `<div><span style="color:var(--gold-dim); font-size:10px; letter-spacing:0.1em; text-transform:uppercase;">Body</span><br>${escapeHtml(sat.palBody)}</div>` : ''}
      ${sat.finish ? `<div><span style="color:var(--gold-dim); font-size:10px; letter-spacing:0.1em; text-transform:uppercase;">Lengte</span><br>${escapeHtml(sat.finish)}</div>` : ''}
    </div>
    ${aromaAll.length > 0 ? `<div style="margin-top:10px;"><span style="color:var(--gold-dim); font-size:10px; letter-spacing:0.1em; text-transform:uppercase;">Aroma's</span><br><span style="font-family:'Cormorant Garamond',serif; font-style:italic; font-size:12px; color:var(--text);">${aromaAll.map(escapeHtml).join(' · ')}</span></div>` : ''}
    ${sat.quality ? `<div style="margin-top:10px;"><span style="color:var(--gold-dim); font-size:10px; letter-spacing:0.1em; text-transform:uppercase;">Conclusie</span><br><span style="font-family:'Cormorant Garamond',serif; font-size:13px; color:var(--gold-bright);">${escapeHtml(sat.quality)}</span>${sat.readiness ? ' <span style="color:var(--text-dim);">· ' + escapeHtml(sat.readiness) + '</span>' : ''}</div>` : ''}
    ${sat.qualityReasoning ? `<div style="margin-top:8px; font-family:'Cormorant Garamond',serif; font-style:italic; font-size:12px; color:var(--text-dim); line-height:1.5;">"${escapeHtml(sat.qualityReasoning)}"</div>` : ''}
  </div>`;
}


// ============ THEME (LICHT / DONKER) ============
const THEME_KEY = 'cave_privee_theme_v3';

function getPreferredTheme() {
  // 1. Gebruiker-keuze heeft prioriteit
  const stored = safeStorageGet(THEME_KEY);
  if (stored === 'light' || stored === 'dark') return stored;
  // 2. Volg systeem-voorkeur
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
    return 'light';
  }
  return 'dark';
}

function applyTheme(theme) {
  const root = document.documentElement;
  if (theme === 'light') {
    root.setAttribute('data-theme', 'light');
  } else {
    root.removeAttribute('data-theme');
  }
  // Update icon: zon in donker-modus (klik voor licht), maan in licht-modus (klik voor donker)
  const icon = document.getElementById('themeIcon');
  if (icon) icon.textContent = theme === 'light' ? '☾' : '☀';
  const btn = document.getElementById('themeToggleBtn');
  if (btn) btn.title = theme === 'light' ? 'Schakel naar donker thema' : 'Schakel naar licht thema';
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
  const next = current === 'light' ? 'dark' : 'light';
  applyTheme(next);
  safeStorageSet(THEME_KEY, next);
}

// Listen to system theme changes (alleen als gebruiker geen voorkeur heeft opgeslagen)
if (window.matchMedia) {
  window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', e => {
    const stored = safeStorageGet(THEME_KEY);
    if (!stored) applyTheme(e.matches ? 'light' : 'dark');
  });
}

  closeModal('welcomeModal');

}

function finishWelcomeAndSettings() {
  localStorage.setItem(ONBOARDED_KEY, '1');
  closeModal('welcomeModal');
  openSettings();
}

function finishWelcomeAndImport() {
  localStorage.setItem(ONBOARDED_KEY, '1');
  closeModal('welcomeModal');
  // Trigger the existing import flow
  if (typeof importData === 'function') importData();
  else showToast('Importfunctie niet beschikbaar', true);
}

// Mark AI-required buttons visually when no key is present
function updateAIButtonStates() {
  const hasKey = !!settings.apiKey;
  document.querySelectorAll('.btn.ai-required').forEach(btn => {
    btn.classList.toggle('no-key', !hasKey);
    if (!hasKey) {
      btn.title = 'Vereist API-key (klik om in te stellen)';
    } else {
      btn.title = '';
    }
  });
}

// ============ INIT ============
(async function boot() {
  detectStorageHealth();
  applyTheme(getPreferredTheme());
  await loadDataAsync();
  render();
  updateAIButtonStates();
  updateExportWarnIndicator();
  showWelcomeIfFirstTime();
  // Waarschuwingsbanner alleen als BEIDE opslaglagen falen
  if (storageHealth.available === false && idbAvailable !== true) {
    setTimeout(showStorageWarningBanner, 500);
  } else {
    // Only nudge for export reminder if storage works (otherwise main warning takes priority)
    maybeShowExportReminder();
  }
  // Show iOS install hint (Files-app vs Safari) if applicable
  showInstallHintIfApplicable();
})();
</script>
